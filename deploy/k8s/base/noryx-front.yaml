apiVersion: v1
kind: ConfigMap
metadata:
  name: noryx-front
  labels:
    app: noryx-front
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>NoryxLab</title>
        <style>
          :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
          body { margin: 0; min-height: 100vh; background: #ffffff; color: #111111; }
          .wrap { max-width: 980px; margin: 48px auto; padding: 0 16px; }
          h1 { margin: 0 0 8px; font-size: 42px; letter-spacing: 0.02em; }
          p { margin: 0 0 16px; color: #4b5563; }
          .row { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0 16px; }
          button { border: 1px solid #d1d5db; background: #f9fafb; color: #111827; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
          input { border: 1px solid #d1d5db; background: #fff; color: #111827; border-radius: 8px; padding: 8px 10px; min-width: 180px; }
          button.primary { background: #111827; color: #fff; border-color: #111827; }
          button:disabled { opacity: 0.5; cursor: default; }
          .meta { font-size: 14px; color: #374151; margin-bottom: 16px; }
          .cards { display: grid; grid-template-columns: 1fr; gap: 14px; }
          .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; }
          h3 { margin: 0 0 8px; font-size: 16px; }
          pre { margin: 0; background: #0b1220; color: #dbeafe; border-radius: 10px; padding: 10px; overflow: auto; min-height: 120px; font-size: 12px; }
          a { color: #0f172a; text-underline-offset: 3px; }
        </style>
        <script src="/auth/js/keycloak.js"></script>
      </head>
      <body>
        <main class="wrap">
          <h1>NoryxLab</h1>
          <p>Community Edition - minimal front pod</p>
          <div class="row">
            <button id="login" class="primary">Login Keycloak</button>
            <button id="logout">Logout</button>
            <button id="loadUsers">Load Users</button>
            <button id="loadModules">Load Modules</button>
            <button id="loadProjects">Load Projects</button>
            <a href="/swagger">Open API Swagger</a>
          </div>
          <div class="row">
            <input id="projectName" placeholder="New project name" />
            <button id="createProject">Create Project</button>
            <input id="workspaceProjectId" placeholder="Workspace projectId" />
            <input id="workspaceName" placeholder="Workspace name (optional)" />
            <button id="createWorkspace">Create Workspace</button>
            <button id="loadWorkspaces">Load Workspaces</button>
            <input id="deleteWorkspaceId" placeholder="workspaceId to delete" />
            <button id="deleteWorkspace">Delete Workspace</button>
          </div>
          <div id="meta" class="meta">Not authenticated</div>
          <section class="cards">
            <div class="card">
              <h3>/api/v1/admin/users</h3>
              <pre id="usersOut">-</pre>
            </div>
            <div class="card">
              <h3>/api/v1/admin/modules</h3>
              <pre id="modulesOut">-</pre>
            </div>
            <div class="card">
              <h3>/api/v1/projects</h3>
              <pre id="projectsOut">-</pre>
            </div>
            <div class="card">
              <h3>/api/v1/workspaces</h3>
              <pre id="workspacesOut">-</pre>
            </div>
          </section>
        </main>
        <script>
          const keycloak = new Keycloak({
            url: window.location.origin + '/auth',
            realm: 'noryx',
            clientId: 'noryx-api'
          });

          const meta = document.getElementById('meta');
          const usersOut = document.getElementById('usersOut');
          const modulesOut = document.getElementById('modulesOut');
          const projectsOut = document.getElementById('projectsOut');
          const workspacesOut = document.getElementById('workspacesOut');
          const loginBtn = document.getElementById('login');
          const logoutBtn = document.getElementById('logout');
          const usersBtn = document.getElementById('loadUsers');
          const modulesBtn = document.getElementById('loadModules');
          const projectsBtn = document.getElementById('loadProjects');
          const createProjectBtn = document.getElementById('createProject');
          const projectNameInput = document.getElementById('projectName');
          const createWorkspaceBtn = document.getElementById('createWorkspace');
          const loadWorkspacesBtn = document.getElementById('loadWorkspaces');
          const workspaceProjectIdInput = document.getElementById('workspaceProjectId');
          const workspaceNameInput = document.getElementById('workspaceName');
          const deleteWorkspaceIdInput = document.getElementById('deleteWorkspaceId');
          const deleteWorkspaceBtn = document.getElementById('deleteWorkspace');

          function setMeta(text) { meta.textContent = text; }
          function pretty(node, data) { node.textContent = JSON.stringify(data, null, 2); }
          function authHeader() { return { Authorization: 'Bearer ' + keycloak.token }; }

          function setButtons(enabled) {
            logoutBtn.disabled = !enabled;
            usersBtn.disabled = !enabled;
            modulesBtn.disabled = !enabled;
            projectsBtn.disabled = !enabled;
            createProjectBtn.disabled = !enabled;
            createWorkspaceBtn.disabled = !enabled;
            loadWorkspacesBtn.disabled = !enabled;
            deleteWorkspaceBtn.disabled = !enabled;
          }

          async function callJSON(url, options = {}) {
            const headers = { ...(options.headers || {}), ...authHeader() };
            const res = await fetch(url, { ...options, headers });
            const body = await res.json().catch(() => ({}));
            if (!res.ok) throw body;
            return body;
          }

          async function ensureWebSession() {
            await callJSON('/api/v1/auth/session', { method: 'POST' });
          }

          loginBtn.onclick = () => keycloak.login();
          logoutBtn.onclick = async () => {
            try { await fetch('/api/v1/auth/session', { method: 'DELETE' }); } catch (_) {}
            keycloak.logout({ redirectUri: window.location.origin + '/' });
          };

          usersBtn.onclick = async () => {
            try { pretty(usersOut, await callJSON('/api/v1/admin/users')); }
            catch (e) { pretty(usersOut, e); }
          };

          modulesBtn.onclick = async () => {
            try { pretty(modulesOut, await callJSON('/api/v1/admin/modules')); }
            catch (e) { pretty(modulesOut, e); }
          };

          projectsBtn.onclick = async () => {
            try { pretty(projectsOut, await callJSON('/api/v1/projects')); }
            catch (e) { pretty(projectsOut, e); }
          };

          createProjectBtn.onclick = async () => {
            try {
              const name = projectNameInput.value.trim();
              if (!name) throw { error: 'projectName is required' };
              const created = await callJSON('/api/v1/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
              });
              pretty(projectsOut, created);
              workspaceProjectIdInput.value = created.id || workspaceProjectIdInput.value;
            } catch (e) {
              pretty(projectsOut, e);
            }
          };

          loadWorkspacesBtn.onclick = async () => {
            try { pretty(workspacesOut, await callJSON('/api/v1/workspaces')); }
            catch (e) { pretty(workspacesOut, e); }
          };

          createWorkspaceBtn.onclick = async () => {
            try {
              const projectId = workspaceProjectIdInput.value.trim();
              if (!projectId) throw { error: 'workspace projectId is required' };
              const payload = { projectId };
              const name = workspaceNameInput.value.trim();
              if (name) payload.name = name;
              const created = await callJSON('/api/v1/workspaces', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              pretty(workspacesOut, created);
              await ensureWebSession();
              if (created.accessUrl) {
                window.open(created.accessUrl, '_blank', 'noopener,noreferrer');
              }
            } catch (e) {
              pretty(workspacesOut, e);
            }
          };

          deleteWorkspaceBtn.onclick = async () => {
            try {
              const workspaceId = deleteWorkspaceIdInput.value.trim();
              if (!workspaceId) throw { error: 'workspaceId is required' };
              const res = await fetch('/api/v1/workspaces/' + encodeURIComponent(workspaceId), {
                method: 'DELETE',
                headers: authHeader()
              });
              if (!res.ok) throw await res.json().catch(() => ({ error: 'delete failed' }));
              pretty(workspacesOut, { deleted: workspaceId });
            } catch (e) {
              pretty(workspacesOut, e);
            }
          };

          keycloak.init({ onLoad: 'check-sso', pkceMethod: 'S256', checkLoginIframe: false }).then((authenticated) => {
            if (!authenticated) {
              setMeta('Not authenticated');
              setButtons(false);
              return;
            }
            setMeta('Authenticated as ' + (keycloak.tokenParsed?.preferred_username || keycloak.tokenParsed?.email || keycloak.tokenParsed?.sub));
            setButtons(true);
            ensureWebSession().catch((err) => {
              pretty(usersOut, { sessionError: String(err) });
            });
          }).catch((err) => {
            setMeta('Keycloak init error');
            pretty(usersOut, { error: String(err) });
            setButtons(false);
          });
        </script>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noryx-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noryx-front
  template:
    metadata:
      labels:
        app: noryx-front
    spec:
      containers:
        - name: noryx-front
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: front-content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: front-content
          configMap:
            name: noryx-front
---
apiVersion: v1
kind: Service
metadata:
  name: noryx-front
spec:
  selector:
    app: noryx-front
  ports:
    - port: 80
      targetPort: 80
