apiVersion: v1
kind: ConfigMap
metadata:
  name: noryx-front
  labels:
    app: noryx-front
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>NoryxLab CE</title>
        <style>
          :root {
            --bg: #f5f7fb;
            --panel: #ffffff;
            --line: #d8deea;
            --text: #1f2937;
            --muted: #64748b;
            --nav: #111827;
            --navText: #dbe3f4;
            --accent: #2563eb;
            --accentSoft: #dbeafe;
            --success: #047857;
            --danger: #b91c1c;
            --font: "IBM Plex Sans", "Segoe UI", sans-serif;
          }
          * { box-sizing: border-box; }
          body { margin: 0; background: linear-gradient(180deg, #eef2f8 0%, #f8fafc 100%); color: var(--text); font-family: var(--font); }
          .app { min-height: 100vh; display: grid; grid-template-columns: 260px 1fr; }
          .nav {
            background: linear-gradient(180deg, #0f172a 0%, #1f2937 100%);
            color: var(--navText);
            padding: 24px 18px;
            border-right: 1px solid #0b1220;
          }
          .brand { font-size: 24px; font-weight: 700; letter-spacing: 0.03em; margin-bottom: 8px; }
          .edition { font-size: 12px; color: #9fb0cf; margin-bottom: 20px; }
          .status { background: rgba(148, 163, 184, 0.16); border: 1px solid rgba(148, 163, 184, 0.25); border-radius: 10px; padding: 10px; font-size: 13px; margin-bottom: 22px; }
          .nav h4 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #93a4c7; }
          .nav ul { list-style: none; margin: 0 0 18px; padding: 0; }
          .nav li { padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; background: rgba(255,255,255,0.04); font-size: 14px; }
          .main { padding: 22px; }
          .header {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
          }
          .title { margin: 0; font-size: 24px; letter-spacing: 0.02em; }
          .sub { margin: 4px 0 0; color: var(--muted); font-size: 14px; }
          .actions { display: flex; flex-wrap: wrap; gap: 8px; }
          .btn {
            border: 1px solid var(--line);
            background: #f8fafc;
            color: #0f172a;
            border-radius: 9px;
            padding: 8px 12px;
            font-weight: 600;
            cursor: pointer;
          }
          .btn:hover { background: #eef2ff; }
          .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
          .btn.good { background: #ecfdf5; border-color: #bbf7d0; color: var(--success); }
          .btn.warn { background: #fef2f2; border-color: #fecaca; color: var(--danger); }
          .btn:disabled { opacity: 0.55; cursor: default; }
          .grid { margin-top: 14px; display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px; }
          .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
          }
          .span-6 { grid-column: span 6; }
          .span-4 { grid-column: span 4; }
          .span-8 { grid-column: span 8; }
          .span-12 { grid-column: span 12; }
          .card h3 { margin: 0 0 10px; font-size: 15px; letter-spacing: 0.02em; }
          .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
          input {
            border: 1px solid var(--line);
            border-radius: 9px;
            padding: 9px 10px;
            min-width: 170px;
            background: #fff;
          }
          .metric {
            background: var(--accentSoft);
            border: 1px solid #bfdbfe;
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
            color: #1e3a8a;
          }
          pre {
            margin: 0;
            background: #0b1220;
            color: #dbeafe;
            border-radius: 10px;
            padding: 10px;
            overflow: auto;
            min-height: 120px;
            font-size: 12px;
          }
          a { color: #1e40af; text-underline-offset: 3px; font-weight: 600; }
          @media (max-width: 1100px) {
            .app { grid-template-columns: 1fr; }
            .nav { border-right: none; border-bottom: 1px solid #22304a; }
            .span-6, .span-4, .span-8 { grid-column: span 12; }
          }
        </style>
        <script src="/auth/js/keycloak.js"></script>
      </head>
      <body>
        <div class="app">
          <aside class="nav">
            <div class="brand">NoryxLab</div>
            <div class="edition">Community Edition Console</div>
            <div class="status" id="meta">Not authenticated</div>
            <h4>Workspace Platform</h4>
            <ul>
              <li>Project-centric model</li>
              <li>Jupyter workspace runtime</li>
              <li>Keycloak OIDC auth</li>
              <li>Kubernetes execution plane</li>
            </ul>
            <h4>Navigation</h4>
            <ul>
              <li><a href="/swagger">Open API Swagger</a></li>
            </ul>
          </aside>

          <main class="main">
            <section class="header">
              <div>
                <h1 class="title">Datalab Control Plane</h1>
                <p class="sub">Bootstrap UI inspired by Domino console layout</p>
              </div>
              <div class="actions">
                <button id="login" class="btn primary">Login Keycloak</button>
                <button id="logout" class="btn">Logout</button>
              </div>
            </section>

            <section class="grid">
              <article class="card span-4">
                <h3>Cluster Module Status</h3>
                <div class="row">
                  <button id="loadModules" class="btn good">Load Modules</button>
                </div>
                <pre id="modulesOut">-</pre>
              </article>

              <article class="card span-4">
                <h3>Admin Users (Keycloak)</h3>
                <div class="row">
                  <button id="loadUsers" class="btn good">Load Users</button>
                </div>
                <pre id="usersOut">-</pre>
              </article>

              <article class="card span-4">
                <h3>Session</h3>
                <div class="metric">API session cookie is required for workspace web proxy (`/workspaces/{id}`)</div>
              </article>

              <article class="card span-6">
                <h3>Projects</h3>
                <div class="metric">At first login, backend auto-creates a default project for the authenticated user.</div>
                <div class="row">
                  <input id="projectName" placeholder="New project name" />
                  <button id="createProject" class="btn primary">Create Project</button>
                  <button id="loadProjects" class="btn">Load Projects</button>
                </div>
                <pre id="projectsOut">-</pre>
              </article>

              <article class="card span-6">
                <h3>Workspaces (Jupyter)</h3>
                <div class="row">
                  <input id="workspaceProjectId" placeholder="Workspace projectId" />
                  <input id="workspaceName" placeholder="Workspace name (optional)" />
                </div>
                <div class="row">
                  <button id="createWorkspace" class="btn primary">Create Workspace</button>
                  <button id="loadWorkspaces" class="btn">Load Workspaces</button>
                </div>
                <div class="row">
                  <input id="deleteWorkspaceId" placeholder="workspaceId to delete" />
                  <button id="deleteWorkspace" class="btn warn">Delete Workspace</button>
                </div>
                <pre id="workspacesOut">-</pre>
              </article>

              <article class="card span-12">
                <h3>Runtime Policy</h3>
                <div class="metric">Current baseline: one pod + one service per workspace, fixed resources request=limit 500m CPU / 512Mi RAM, image `harbor.lan/noryx-ce/noryx-workspace-jupyter:0.1.0`.</div>
              </article>
            </section>
          </main>
        </div>

        <script>
          const keycloak = new Keycloak({
            url: window.location.origin + '/auth',
            realm: 'noryx',
            clientId: 'noryx-api'
          });

          const meta = document.getElementById('meta');
          const usersOut = document.getElementById('usersOut');
          const modulesOut = document.getElementById('modulesOut');
          const projectsOut = document.getElementById('projectsOut');
          const workspacesOut = document.getElementById('workspacesOut');

          const loginBtn = document.getElementById('login');
          const logoutBtn = document.getElementById('logout');
          const usersBtn = document.getElementById('loadUsers');
          const modulesBtn = document.getElementById('loadModules');
          const projectsBtn = document.getElementById('loadProjects');
          const createProjectBtn = document.getElementById('createProject');
          const projectNameInput = document.getElementById('projectName');
          const createWorkspaceBtn = document.getElementById('createWorkspace');
          const loadWorkspacesBtn = document.getElementById('loadWorkspaces');
          const workspaceProjectIdInput = document.getElementById('workspaceProjectId');
          const workspaceNameInput = document.getElementById('workspaceName');
          const deleteWorkspaceIdInput = document.getElementById('deleteWorkspaceId');
          const deleteWorkspaceBtn = document.getElementById('deleteWorkspace');

          function setMeta(text) { meta.textContent = text; }
          function pretty(node, data) { node.textContent = JSON.stringify(data, null, 2); }
          function authHeader() { return { Authorization: 'Bearer ' + keycloak.token }; }

          function setButtons(enabled) {
            logoutBtn.disabled = !enabled;
            usersBtn.disabled = !enabled;
            modulesBtn.disabled = !enabled;
            projectsBtn.disabled = !enabled;
            createProjectBtn.disabled = !enabled;
            createWorkspaceBtn.disabled = !enabled;
            loadWorkspacesBtn.disabled = !enabled;
            deleteWorkspaceBtn.disabled = !enabled;
          }

          async function callJSON(url, options = {}) {
            const headers = { ...(options.headers || {}), ...authHeader() };
            const res = await fetch(url, { ...options, headers });
            const body = await res.json().catch(() => ({}));
            if (!res.ok) throw body;
            return body;
          }

          async function ensureWebSession() {
            await callJSON('/api/v1/auth/session', { method: 'POST' });
          }

          async function refreshProjects() {
            const body = await callJSON('/api/v1/projects');
            pretty(projectsOut, body);
            const first = body?.items?.[0];
            if (first?.id) {
              workspaceProjectIdInput.value = first.id;
            }
            return body;
          }

          async function refreshWorkspaces() {
            const body = await callJSON('/api/v1/workspaces');
            pretty(workspacesOut, body);
            return body;
          }

          loginBtn.onclick = () => keycloak.login();
          logoutBtn.onclick = async () => {
            try { await fetch('/api/v1/auth/session', { method: 'DELETE' }); } catch (_) {}
            keycloak.logout({ redirectUri: window.location.origin + '/' });
          };

          usersBtn.onclick = async () => {
            try { pretty(usersOut, await callJSON('/api/v1/admin/users')); }
            catch (e) { pretty(usersOut, e); }
          };

          modulesBtn.onclick = async () => {
            try { pretty(modulesOut, await callJSON('/api/v1/admin/modules')); }
            catch (e) { pretty(modulesOut, e); }
          };

          projectsBtn.onclick = async () => {
            try { await refreshProjects(); }
            catch (e) { pretty(projectsOut, e); }
          };

          createProjectBtn.onclick = async () => {
            try {
              const name = projectNameInput.value.trim();
              if (!name) throw { error: 'projectName is required' };
              const created = await callJSON('/api/v1/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
              });
              pretty(projectsOut, created);
              await refreshProjects();
            } catch (e) {
              pretty(projectsOut, e);
            }
          };

          loadWorkspacesBtn.onclick = async () => {
            try { await refreshWorkspaces(); }
            catch (e) { pretty(workspacesOut, e); }
          };

          createWorkspaceBtn.onclick = async () => {
            try {
              const projectId = workspaceProjectIdInput.value.trim();
              if (!projectId) throw { error: 'workspace projectId is required' };
              const payload = { projectId };
              const name = workspaceNameInput.value.trim();
              if (name) payload.name = name;
              const created = await callJSON('/api/v1/workspaces', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              pretty(workspacesOut, created);
              await ensureWebSession();
              if (created.accessUrl) {
                window.open(created.accessUrl, '_blank', 'noopener,noreferrer');
              }
            } catch (e) {
              pretty(workspacesOut, e);
            }
          };

          deleteWorkspaceBtn.onclick = async () => {
            try {
              const workspaceId = deleteWorkspaceIdInput.value.trim();
              if (!workspaceId) throw { error: 'workspaceId is required' };
              const res = await fetch('/api/v1/workspaces/' + encodeURIComponent(workspaceId), {
                method: 'DELETE',
                headers: authHeader()
              });
              if (!res.ok) throw await res.json().catch(() => ({ error: 'delete failed' }));
              pretty(workspacesOut, { deleted: workspaceId });
            } catch (e) {
              pretty(workspacesOut, e);
            }
          };

          keycloak.init({ onLoad: 'check-sso', pkceMethod: 'S256', checkLoginIframe: false }).then((authenticated) => {
            if (!authenticated) {
              setMeta('Not authenticated');
              setButtons(false);
              return;
            }
            setMeta('Authenticated as ' + (keycloak.tokenParsed?.preferred_username || keycloak.tokenParsed?.email || keycloak.tokenParsed?.sub));
            setButtons(true);
            ensureWebSession()
              .then(() => refreshProjects())
              .then(() => refreshWorkspaces())
              .catch((err) => {
                pretty(usersOut, { sessionError: String(err) });
              });
          }).catch((err) => {
            setMeta('Keycloak init error');
            pretty(usersOut, { error: String(err) });
            setButtons(false);
          });
        </script>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noryx-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noryx-front
  template:
    metadata:
      labels:
        app: noryx-front
    spec:
      containers:
        - name: noryx-front
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: front-content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: front-content
          configMap:
            name: noryx-front
---
apiVersion: v1
kind: Service
metadata:
  name: noryx-front
spec:
  selector:
    app: noryx-front
  ports:
    - port: 80
      targetPort: 80
