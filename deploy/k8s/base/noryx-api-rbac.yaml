apiVersion: v1
kind: ServiceAccount
metadata:
  name: noryx-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: noryx-api-runtime
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: noryx-api-runtime
subjects:
  - kind: ServiceAccount
    name: noryx-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: noryx-api-runtime
