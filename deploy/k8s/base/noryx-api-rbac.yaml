apiVersion: v1
kind: ServiceAccount
metadata:
  name: noryx-back
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: noryx-back-runtime
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: noryx-back-runtime
subjects:
  - kind: ServiceAccount
    name: noryx-back
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: noryx-back-runtime
