          function executionEnvironmentOptions(projectID, requireWorkspaceIDE) {
            const seenImages = new Set();
            return state.environments.filter((env) => {
              const image = String(env.destinationImage || '').trim();
              if (!image || seenImages.has(image)) return false;
              const category = String(env.category || 'custom').toLowerCase();
              if (category === 'system' && projectID && env.projectId !== projectID) return false;
              if (requireWorkspaceIDE && ensureArray(env.workspaceIdes).length === 0) return false;
              seenImages.add(image);
              return true;
            });
          }

          function executionEnvironmentLabel(env, detail) {
            const parts = [env.name || 'Environnement'];
            if (detail) parts.push(detail);
            parts.push(env.category === 'system' ? 'système' : 'custom');
            return parts.join(' · ');
          }

