      async function triggerLogin() {
        try {
          const kc = keycloak || new Keycloak({
            url: window.location.origin + '/auth',
            realm: 'noryx',
            clientId: 'noryx-api'
          });
          const loginUrl = await kc.createLoginUrl({ redirectUri: window.location.origin + '/' });
          window.location.assign(loginUrl);
          return false;
        } catch (err) {
          pretty(usersOut, { loginError: String(err) });
          setIdentityDisplayMode('signed-out');
        }
        try { localStorage.setItem(LAB_USER_KEY, currentLabUser()); } catch (_) {}
        return false;
      }

