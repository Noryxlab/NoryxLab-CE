            const download = event.target && event.target.getAttribute('data-project-download');
            const remove = event.target && event.target.getAttribute('data-project-file-delete');
            try {
              if (folder) {
                projectFilesCurrentPath = decodeURIComponent(folder);
                await refreshProjectFiles();
              } else if (file) {
                await editProjectFile(decodeURIComponent(file));
              } else if (download) {
                await downloadProjectFile(decodeURIComponent(download));
              } else if (remove && confirm('Supprimer ce fichier ou dossier ?')) {
                await callJSON(projectFileURL(decodeURIComponent(remove)), { method:'DELETE' });
                await refreshProjectFiles();
              }
            } catch (e) { pretty(usersOut, e); switchTab('ops'); }
