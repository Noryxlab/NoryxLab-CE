              const storageSize = workspaceStorageSizeInput.value.trim();
              if (storageSize) payload.storageSize = storageSize;
              const created = await callJSON('/api/v1/workspaces', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              await ensureWebSession();
              await refreshWorkspaces();
              switchTab('workspaces');
              if (created.accessUrl) {
                usersOut.textContent = t('launchingMsg');
                const ready = await waitWorkspaceReady(created.id, 60000);
                usersOut.textContent = ready ? t('readyMsg') : t('launchingMsg');
                await refreshWorkspaces();
              }
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          createJobBtn.onclick = async () => {
            try {
              const projectId = selectedProjectId();
              if (!projectId) throw { error: 'select a project first' };
              const image = (jobEnvInput.value || '').trim();
              if (!image) throw { error: 'select an environment image first' };
              const payload = { projectId, image };
              const name = jobNameInput.value.trim();
              if (name) payload.name = name;
              const rawCommand = (jobCommandInput.value || '').trim();
              if (rawCommand) payload.args = [rawCommand];
              await callJSON('/api/v1/jobs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              await refreshJobs();
              switchTab('project-jobs');
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          createAppBtn.onclick = async () => {
            try {
              const projectId = selectedProjectId();
              if (!projectId) throw { error: 'select a project first' };
              const image = (appEnvInput.value || '').trim();
              if (!image) throw { error: 'select an environment image first' };
              const payload = { projectId, image };
              const name = appNameInput.value.trim();
              const slug = appSlugInput.value.trim();
              const cmd = appCommandInput.value.trim();
              const portRaw = appPortInput.value.trim();
              if (name) payload.name = name;
              if (slug) payload.slug = slug;
              if (cmd) payload.args = [cmd];
              if (portRaw) payload.port = Number(portRaw);
              await callJSON('/api/v1/apps', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              await refreshApps();
              switchTab('project-apps');
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          buildEnvBtn.onclick = async () => {
            try {
              const projectId = selectedProjectId();
              if (!projectId) throw { error: 'select a project first' };
              const payload = {
                projectId,
                gitRepository: envGitRepo.value.trim(),
                gitRef: envGitRef.value.trim() || 'main',
                dockerfilePath: envDockerfile.value.trim() || 'Dockerfile',
                contextPath: envContext.value.trim(),
                destinationImage: envDestination.value.trim()
              };
              if (!payload.gitRepository || !payload.destinationImage) {
                throw { error: 'gitRepository and destinationImage are required' };
              }
              await callJSON('/api/v1/builds', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              dockerfileOut.textContent = '-';
              await Promise.all([refreshBuilds(), refreshEnvironments()]);
              switchTab('environments');
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          environmentRows.onclick = async (event) => {
            const selectID = event.target?.getAttribute('data-select');
            const dockerBuildID = event.target?.getAttribute('data-docker');

            if (selectID) {
              event.preventDefault();
              event.stopPropagation();
              selectedEnvironmentID = decodeURIComponent(selectID);
              renderEnvironmentsTable();
              return;
            }

            if (dockerBuildID) {
              event.preventDefault();
              event.stopPropagation();
              try {
                const body = await callJSON('/api/v1/builds/' + encodeURIComponent(dockerBuildID) + '/dockerfile');
                dockerfileOut.textContent = String(body.content || '-');
                buildOut.textContent = JSON.stringify(body, null, 2);
              } catch (e) {
                pretty(usersOut, e);
                switchTab('ops');
              }
            }
          };

          workspaceRows.onclick = async (event) => {
            const openId = event.target?.getAttribute('data-open');
            const delId = event.target?.getAttribute('data-del');
            if (openId) {
              event.preventDefault();
              event.stopPropagation();
              if (openingWorkspaceId === openId) return;
              const ws = state.workspaces.find(w => w.id === openId);
              if (ws?.accessUrl) {
                const ready = String(ws.status || '').toLowerCase().includes('run');
                if (!ready) {
                  usersOut.textContent = t('launchingMsg');
                  return;
                }
                openingWorkspaceId = openId;
                const targetUrl = window.location.origin + (ws.accessUrl || ('/workspaces/' + encodeURIComponent(ws.id) + '/lab?reset'));
                const wsTab = window.open('about:blank', '_blank');
                try {
                  if (!wsTab) {
                    usersOut.textContent = 'Popup blocked by browser. Allow popups for this site.';
                    openingWorkspaceId = null;
                    return;
                  }
                  wsTab.document.write('<!doctype html><html><head><meta charset="utf-8"><title>Noryx Workspace</title></head><body style="font-family: sans-serif; padding: 1rem;">Launching workspace...</body></html>');
                  wsTab.document.close();
                  // Must complete before navigating workspace URL (proxy requires noryx_session cookie).
                  await ensureWebSession();
                  await new Promise((resolve) => setTimeout(resolve, 120));
                  wsTab.location.assign(targetUrl);
                  openingWorkspaceId = null;
                } catch (e) {
                  if (wsTab && !wsTab.closed) wsTab.close();
                  openingWorkspaceId = null;
                  pretty(usersOut, e);
                  switchTab('ops');
                }
              }
              return;
            }
            if (delId) {
              event.preventDefault();
              event.stopPropagation();
              try {
                const res = await fetch('/api/v1/workspaces/' + encodeURIComponent(delId), {
                  method: 'DELETE',
                  headers: authHeader()
                });
                if (!res.ok) throw await res.json().catch(() => ({ error: 'delete failed' }));
                await refreshWorkspaces();
              } catch (e) {
                pretty(usersOut, e);
                switchTab('ops');
              }
            }
          };

          jobRows.onclick = async (event) => {
            const logsId = event.target?.getAttribute('data-logs-job');
            const delId = event.target?.getAttribute('data-del-job');
            if (logsId) {
              try {
                const body = await callJSON('/api/v1/jobs/' + encodeURIComponent(logsId) + '/logs?tailLines=300');
                jobLogsOut.textContent = '[job=' + (body.jobName || '-') + ' pod=' + (body.podName || '-') + ']\n' + (body.logs || '');
              } catch (e) {
                pretty(usersOut, e);
                switchTab('ops');
              }
              return;
            }
            if (!delId) return;
            try {
              await callJSON('/api/v1/jobs/' + encodeURIComponent(delId), { method: 'DELETE' });
              await refreshJobs();
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          appRows.onclick = async (event) => {
            const openId = event.target?.getAttribute('data-open-app');
            const delId = event.target?.getAttribute('data-del-app');
            if (openId) {
              const item = state.apps.find((a) => a.id === openId);
              if (item && item.accessUrl) {
                window.open(window.location.origin + item.accessUrl, '_blank');
              }
              return;
            }
            if (!delId) return;
            try {
              await callJSON('/api/v1/apps/' + encodeURIComponent(delId), { method: 'DELETE' });
              await refreshApps();
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          secretRows.onclick = async (event) => {
            const viewName = event.target?.getAttribute('data-view-secret');
            const copyName = event.target?.getAttribute('data-copy-secret');
            const secretName = event.target?.getAttribute('data-del-secret');
            if (!viewName && !copyName && !secretName) return;
            try {
              if (viewName) {
                const body = await callJSON('/api/v1/secrets/' + encodeURIComponent(decodeURIComponent(viewName)));
                pretty(secretOut, body);
                return;
              }
              if (copyName) {
                const body = await callJSON('/api/v1/secrets/' + encodeURIComponent(decodeURIComponent(copyName)));
                await copyText(body?.value || '');
                usersOut.textContent = 'Secret copied to clipboard.';
                pretty(secretOut, body);
                return;
              }
              await callJSON('/api/v1/secrets/' + encodeURIComponent(decodeURIComponent(secretName)), { method: 'DELETE' });
              secretOut.textContent = '-';
              await Promise.all([refreshSecrets(), refreshRepositories()]);
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          datasetRows.onclick = async (event) => {
            const datasetID = event.target?.getAttribute('data-del-dataset');
            if (!datasetID) return;
            try {
              await callJSON('/api/v1/datasets/' + encodeURIComponent(datasetID), { method: 'DELETE' });
              await refreshDatasets();
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          repoRows.onclick = async (event) => {
            const repositoryIDToTest = event.target?.getAttribute('data-test-repo');
            const repositoryIDToDelete = event.target?.getAttribute('data-del-repo');
            if (!repositoryIDToTest && !repositoryIDToDelete) return;
            try {
              if (repositoryIDToTest) {
                const result = await callJSON('/api/v1/repositories/' + encodeURIComponent(repositoryIDToTest) + '/validate', { method: 'POST' });
                state.repositoryChecks[repositoryIDToTest] = result;
                renderRepositoriesTable();
                usersOut.textContent = result.reachable ? 'Repository connection OK.' : ('Repository connection failed: ' + (result.error || 'unknown error'));
                return;
              }
              await callJSON('/api/v1/repositories/' + encodeURIComponent(repositoryIDToDelete), { method: 'DELETE' });
              delete state.repositoryChecks[repositoryIDToDelete];
              await refreshRepositories();
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          datasourceRows.onclick = async (event) => {
            const datasourceIDToTest = event.target?.getAttribute('data-test-ds');
            const datasourceIDToDelete = event.target?.getAttribute('data-del-ds');
            if (!datasourceIDToTest && !datasourceIDToDelete) return;
            try {
              if (datasourceIDToTest) {
                const result = await callJSON('/api/v1/datasources/' + encodeURIComponent(datasourceIDToTest) + '/validate', { method: 'POST' });
                state.datasourceChecks[datasourceIDToTest] = result;
                renderDatasourcesTable();
                usersOut.textContent = result.reachable ? 'Datasource connection OK.' : ('Datasource connection failed: ' + (result.error || 'unknown error'));
                return;
              }
              await callJSON('/api/v1/datasources/' + encodeURIComponent(datasourceIDToDelete), { method: 'DELETE' });
              delete state.datasourceChecks[datasourceIDToDelete];
              await refreshDatasources();
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          keycloak.init({ onLoad: 'check-sso', pkceMethod: 'S256', checkLoginIframe: false }).then((authenticated) => {
            if (!authenticated) {
              stopWorkspacesAutoRefresh();
              setMeta('Not authenticated');
              applyRoleVisibility();
              setButtons(false);
              switchTab('environments');
              return;
            }
            setMeta('Authenticated as ' + (keycloak.tokenParsed?.preferred_username || keycloak.tokenParsed?.email || keycloak.tokenParsed?.sub));
            applyRoleVisibility();
            setButtons(true);
            startWorkspacesAutoRefresh();
            ensureWebSession()
              .then(() => refreshProjects())
              .then(() => Promise.all([refreshWorkspaces(), refreshJobs(), refreshApps(), refreshBuilds(), refreshEnvironments(), refreshSecrets(), refreshDatasets(), refreshRepositories(), refreshDatasources(), refreshProjectResources()]))
              .catch((err) => {
                pretty(usersOut, { sessionError: String(err) });
                switchTab('ops');
              });
          }).catch((err) => {
            stopWorkspacesAutoRefresh();
            setMeta('Keycloak init error');
            pretty(usersOut, { error: String(err) });
            applyRoleVisibility();
            setButtons(false);
            switchTab('ops');
          });

          refreshVersions();
        </script>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noryx-frontend
  namespace: noryx-ce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noryx-frontend
  template:
    metadata:
      labels:
        app: noryx-frontend
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: noryx-frontend
          image: harbor.lan/noryx-ce/noryx-frontend:ce-web-0.6.25
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: front-content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: front-content
          configMap:
            name: noryx-frontend
---
apiVersion: v1
kind: Service
metadata:
  name: noryx-frontend
  namespace: noryx-ce
spec:
  selector:
    app: noryx-frontend
  ports:
    - port: 80
      targetPort: 80
