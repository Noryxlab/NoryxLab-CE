          function datasetFileVisual(filePath, contentType) {
            const lower = String(filePath || '').toLowerCase();
            const type = String(contentType || '').toLowerCase();
            if (type.startsWith('image/') || /\.(png|jpe?g|gif|webp|svg)$/i.test(lower)) return { kind:'image', supported:true, editable:false };
            if (type === 'application/pdf' || lower.endsWith('.pdf')) return { kind:'pdf', supported:true, editable:false };
            if (lower.endsWith('.csv') || type.includes('csv')) return { kind:'csv', supported:true, editable:true };
            if (/\.(xlsx|ods)$/i.test(lower)) return { kind:'spreadsheet', supported:true, editable:true };
            if (type.startsWith('text/') || /\.(txt|json|md|log|yaml|yml)$/i.test(lower)) return { kind:'text', supported:true, editable:true };
            return { kind:'other', supported:false, editable:false };
          }

          function parseCSV(text) {
            const firstLine = String(text || '').split(/\r?\n/, 1)[0] || '';
            const separators = [',', ';', '\t'];
            const delimiter = separators.sort((a, b) => firstLine.split(b).length - firstLine.split(a).length)[0];
            const rows = []; let row = []; let cell = ''; let quoted = false;
            for (let i = 0; i < text.length; i += 1) {
              const c = text[i];
              if (c === '"') {
                if (quoted && text[i + 1] === '"') { cell += '"'; i += 1; } else quoted = !quoted;
              } else if (c === delimiter && !quoted) { row.push(cell); cell = ''; }
              else if ((c === '\n' || c === '\r') && !quoted) {
                if (c === '\r' && text[i + 1] === '\n') i += 1;
                row.push(cell); rows.push(row); row = []; cell = '';
              } else cell += c;
            }
            if (cell || row.length) { row.push(cell); rows.push(row); }
            return rows.filter((r) => r.some((v) => v !== ''));
          }

          function renderCSVPreview(text) {
            const rows = parseCSV(text);
            if (rows.length === 0) { datasetPreviewBody.textContent = 'CSV vide.'; return; }
            const table = document.createElement('table');
            const head = document.createElement('thead'); const headRow = document.createElement('tr');
            rows[0].forEach((value) => { const th = document.createElement('th'); th.textContent = value; headRow.appendChild(th); });
            head.appendChild(headRow); table.appendChild(head);
            const body = document.createElement('tbody');
            rows.slice(1, 501).forEach((values) => { const tr = document.createElement('tr'); values.forEach((value) => { const td = document.createElement('td'); td.textContent = value; tr.appendChild(td); }); body.appendChild(tr); });
            table.appendChild(body); datasetPreviewBody.appendChild(table);
            if (rows.length > 501) { const note = document.createElement('p'); note.textContent = 'Apercu limite aux 500 premieres lignes.'; datasetPreviewBody.appendChild(note); }
          }

