          function projectFileURL(path) {
            const value = String(path || '');
            return '/api/v1/projects/' + encodeURIComponent(selectedProjectId()) + '/files' + (value ? '/' + encodeURIComponent(value) : '');
          }
          function isEditableProjectFile(path) {
            return /\.(txt|md|csv|json|ya?ml|toml|ini|cfg|conf|py|r|js|ts|tsx|jsx|css|html|xml|sql|sh|dockerfile|gitignore|requirements)$/i.test(String(path || '')) ||
              /(^|\/)(Dockerfile|Makefile|requirements\.txt)$/i.test(String(path || ''));
          }
          async function downloadProjectFile(path) {
            const response = await fetch(projectFileURL(path), { headers: authHeader(), cache:'no-store' });
            if (!response.ok) throw await response.json().catch(() => ({ error:'download failed' }));
            const url = URL.createObjectURL(await response.blob());
            const link = document.createElement('a');
            link.href = url;
            link.download = String(path).split('/').pop();
            link.click();
            window.setTimeout(() => URL.revokeObjectURL(url), 60000);
          }
          async function editProjectFile(path) {
            if (!isEditableProjectFile(path)) {
              await downloadProjectFile(path);
              return;
            }
            const response = await fetch(projectFileURL(path), { headers: authHeader(), cache:'no-store' });
            if (!response.ok) throw await response.json().catch(() => ({ error:'file read failed' }));
            projectFileEditorPath = path;
            projectFileEditorTitle.textContent = path;
            projectFileEditorContent.value = await response.text();
            projectFileEditor.style.display = '';
          }
