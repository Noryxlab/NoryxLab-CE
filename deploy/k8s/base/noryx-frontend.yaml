                await refreshDatasetObjects(selectedDatasetID);
              } catch (e) {
                pretty(usersOut, e);
                switchTab('ops');
              }
            };
          }

          async function callJSON(url, options = {}) {
            if ((keycloak && keycloak.authenticated)) {
              try { await keycloak.updateToken(30); } catch (_) {}
            }
            const headers = { ...(options.headers || {}), ...authHeader() };
            const res = await fetch(url, { ...options, headers });
            const body = await res.json().catch(() => ({}));
            if (!res.ok) throw body;
            return body;
          }

          async function loadUserPreferences() {
            try {
              const body = await callJSON('/api/v1/user/preferences');
              const serverLang = String((body && body.language) || '').trim().toLowerCase();
              const serverTheme = normalizeTheme((body && body.theme) || '');
              if (serverLang === 'fr' || serverLang === 'en') {
                currentLang = serverLang;
                if (langSelect) langSelect.value = currentLang;
                try { localStorage.setItem('noryx.ui.lang', currentLang); } catch (_) {}
              }
              if (serverTheme) {
                currentTheme = applyTheme(serverTheme);
              } else {
                currentTheme = applyTheme(adminDefaultTheme);
              }
            } catch (_) {}
            applyI18n();
            refreshIdentityMeta();
          }

          async function ensureWebSession() {
            await callJSON('/api/v1/auth/session', { method: 'POST' });
          }

          async function waitWorkspaceReady(workspaceID, timeoutMs = 30000) {
            const started = Date.now();
            while ((Date.now() - started) < timeoutMs) {
              await refreshWorkspaces();
              const ws = state.workspaces.find((w) => w.id === workspaceID);
              if (ws && String(ws.status || '').toLowerCase().includes('run')) return true;
              await new Promise((resolve) => setTimeout(resolve, 1500));
            }
            return false;
          }

          function updateStats() {
            statProjects.textContent = String(state.projects.length);
            statWorkspaces.textContent = String(state.workspaces.length + state.jobs.length + state.apps.length + state.dashboards.length);
            statBuilds.textContent = String(state.builds.length);
          }

          async function refreshVersions() {
            let backVersion = 'unknown';
            let frontVersion = 'unknown';
            try {
              const bust = String(Date.now());
              const [frontRes, backRes] = await Promise.all([
                fetch('/version.json?nocache=' + bust, { cache: 'no-store' }),
                fetch('/api/v1/version?nocache=' + bust, { cache: 'no-store' })
              ]);
              if (frontRes.ok) {
                const f = await frontRes.json();
                if (f && f.version) frontVersion = String(f.version);
              }
              if (backRes.ok) {
                const b = await backRes.json();
                if (b && b.backendVersion) backVersion = String(b.backendVersion);
                if (backVersion === 'unknown' && b && b.version) backVersion = String(b.version);
                if (b && b.defaultTheme) {
                  adminDefaultTheme = normalizeTheme(b.defaultTheme);
                  if (!localStorage.getItem(THEME_KEY)) {
                    currentTheme = applyTheme(adminDefaultTheme);
                  }
                }
              }
            } catch (_) {}
            versionsNode.textContent = 'front: ' + frontVersion + ' | back: ' + backVersion;
          }

          function renderProjectOptions() {
            const current = selectedProjectId();
            projectSelect.innerHTML = '';
            for (const p of state.projects) {
              const opt = document.createElement('option');
              opt.value = p.id;
              opt.textContent = p.name;
              projectSelect.appendChild(opt);
            }
            if (current && state.projects.some(p => p.id === current)) {
              projectSelect.value = current;
            }
          }

          function renderProjectsTable() {
            const query = (projectSearchInput.value || '').trim().toLowerCase();
            const mode = projectViewMode.value || 'grid';
            const filtered = state.projects.filter((p) => {
              const name = String(p.name || '').toLowerCase();
              const id = String(p.id || '').toLowerCase();
              return !query || name.includes(query) || id.includes(query);
            });
            projectCards.innerHTML = '';
            projectRows.innerHTML = '';
            if (filtered.length === 0) {
              projectCards.innerHTML = '<article class="project-card"><h4>No projects</h4><div class="project-meta">Create your first project to get started.</div></article>';
              projectRows.innerHTML = '<tr><td colspan="3">' + tui('msg_no_project') + '</td></tr>';
              return;
            }
            for (const p of filtered) {
              const isSelected = selectedProjectId() === p.id;
              const card = document.createElement('article');
              card.className = 'project-card' + (isSelected ? ' is-active' : '');
              card.innerHTML =
                (isSelected ? '<div class="project-active-marker">Projet actif</div>' : '') +
                '<h4>' + (p.name || '-') + '</h4>' +
                '<div class="project-meta"><code>' + (p.id || '-') + '</code></div>' +
                '<div class="project-actions">' +
                (isSelected
                  ? '<button type="button" class="btn primary" disabled>Actif</button>'
                  : '<button type="button" class="btn primary" data-select-project="' + (p.id || '') + '">Activer</button>') +
                '<button type="button" class="btn danger" data-del-project="' + (p.id || '') + '">Delete</button>' +
                '</div>';
              projectCards.appendChild(card);
              const tr = document.createElement('tr');
              if (isSelected) tr.classList.add('project-row-active');
              tr.innerHTML =
                '<td><strong>' + p.name + '</strong>' + (isSelected ? '<br/><span class="project-active-marker">Projet actif</span>' : '') + '</td>' +
                '<td><code>' + p.id + '</code></td>' +
                '<td>' + (isSelected ? '<button type="button" class="btn primary" disabled>Actif</button>' : '<button type="button" class="btn" data-select-project="' + (p.id || '') + '">Activer</button>') + ' <button type="button" class="btn danger" data-del-project="' + (p.id || '') + '">Delete</button></td>';
              projectRows.appendChild(tr);
            }
            const showList = mode === 'list';
            projectCards.style.display = showList ? 'none' : 'grid';
            projectList.style.display = showList ? 'block' : 'none';
          }

          function renderSecretsTable() {
            secretRows.innerHTML = '';
            if (state.secrets.length === 0) {
              secretRows.innerHTML = '<tr><td colspan="4">' + tui('msg_no_secret') + '</td></tr>';
              return;
            }
            state.secrets.forEach((s) => {
              const secretName = encodeURIComponent(s.name || '');
              const expiresLabel = s.expiresAt
                ? (String(s.expiresAt) + (s.isExpired ? ' (expired)' : ''))
                : '-';
              const tr = document.createElement('tr');
              tr.innerHTML =
                '<td><strong>' + (s.name || '-') + '</strong></td>' +
                '<td><code>' + expiresLabel + '</code></td>' +
                '<td>' + (s.updatedAt || '-') + '</td>' +
                '<td>' +
                '<button type="button" class="btn" data-view-secret="' + secretName + '">View</button> ' +
                '<button type="button" class="btn" data-copy-secret="' + secretName + '">Copy</button> ' +
                '<button type="button" class="btn danger" data-del-secret="' + secretName + '">Delete</button>' +
                '</td>';
              secretRows.appendChild(tr);
            });
          }

          function renderDatasetsTable() {
            if (!datasetRows || !datasetUploadTarget) return;
            datasetRows.innerHTML = '';
            datasetUploadTarget.innerHTML = '';
            if (state.datasets.length === 0) {
              datasetRows.innerHTML = '<tr><td colspan="6">' + tui('msg_no_dataset') + '</td></tr>';
              selectedDatasetID = '';
              state.datasetObjects = [];
              renderDatasetObjectsTable();
              const opt = document.createElement('option');
              opt.value = '';
              opt.textContent = tui('msg_no_dataset');
              datasetUploadTarget.appendChild(opt);
              return;
            }
            if (!selectedDatasetID || !state.datasets.some((d) => d.id === selectedDatasetID)) {
              selectedDatasetID = state.datasets[0].id || '';
            }
            state.datasets.forEach((d) => {
              const tr = document.createElement('tr');
              tr.setAttribute('data-select-dataset', d.id || '');
              tr.style.cursor = 'pointer';
              if (d.id === selectedDatasetID) tr.classList.add('dataset-row-active');
              tr.innerHTML =
                '<td><strong>' + (d.name || d.id) + '</strong><br/><span style="color:#667a98">' + (d.id || '') + '</span>' + (d.id === selectedDatasetID ? '<br/><span class="dataset-active-marker">Dataset actif</span>' : '') + '</td>' +
                '<td><span class="badge b-ok">STANDARD</span></td>' +
                '<td><strong>' + (d.provider || 'minio') + '</strong><br/><code>' + (d.bucket || '-') + '</code><br/><span style="color:#667a98">' + (d.prefix || '/') + '</span></td>' +
                '<td>' + (d.ownerUserId || '-') + '</td>' +
                '<td>' + formatDateTime(d.updatedAt || d.createdAt) + '</td>' +
                '<td>' + ((d.accessRole === 'owner' || isAdminUser()) ? '<button type="button" class="btn danger" data-del-dataset="' + (d.id || '') + '">Delete</button>' : '-') + '</td>';
              datasetRows.appendChild(tr);

              const opt = document.createElement('option');
              opt.value = d.id || '';
              opt.textContent = (d.name || d.id) + ' (' + (d.bucket || '-') + ')';
              if (d.id === selectedDatasetID) opt.selected = true;
              datasetUploadTarget.appendChild(opt);
