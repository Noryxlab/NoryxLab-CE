              const rp = document.createElement('option');
              rp.value = '';
              rp.textContent = 'Select a project first';
              attachRepoSelect.appendChild(rp);
              const ds2 = document.createElement('option');
              ds2.value = '';
              ds2.textContent = 'Select a project first';
              attachDatasourceSelect.appendChild(ds2);
              return;
            }

            const attachedDatasetIDs = new Set(ensureArray(state.projectDatasets).map((d) => d.id));
            const attachedRepoIDs = new Set(ensureArray(state.projectRepositories).map((r) => r.id));
            const attachedDatasourceIDs = new Set(ensureArray(state.projectDatasources).map((d) => d.id));

            const availableDatasets = ensureArray(state.datasets).filter((d) => d && d.id && !attachedDatasetIDs.has(d.id));
            const availableRepos = ensureArray(state.repositories).filter((r) => r && r.id && !attachedRepoIDs.has(r.id));
            const availableDatasources = ensureArray(state.datasources).filter((d) => d && d.id && !attachedDatasourceIDs.has(d.id));

            if (availableDatasets.length === 0) {
              const opt = document.createElement('option');
              opt.value = '';
              opt.textContent = 'No dataset to attach';
              attachDatasetSelect.appendChild(opt);
            } else {
              availableDatasets.forEach((d) => {
                const opt = document.createElement('option');
                opt.value = d.id || '';
                opt.textContent = (d.name || d.id) + ' (' + (d.bucket || '-') + ')';
