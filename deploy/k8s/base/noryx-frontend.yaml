            if (items.length === 0) {
              environmentRows.innerHTML = '<tr><td colspan="5">No environment yet for selected project.</td></tr>';
              buildOut.textContent = '-';
              dockerfileOut.textContent = '-';
              selectedEnvironmentID = '';
              return;
            }
            if (!selectedEnvironmentID || !items.some((env) => env.id === selectedEnvironmentID)) {
              selectedEnvironmentID = items[0].id;
            }
            const selected = items.find((env) => env.id === selectedEnvironmentID) || items[0];
            buildOut.textContent = JSON.stringify(selected, null, 2);

            for (const env of items.slice(0, 20)) {
              const tr = document.createElement('tr');
              const selectedClass = env.id === selectedEnvironmentID ? ' style="outline:1px solid #f4c542"' : '';
              const revCount = Array.isArray(env.revisions) ? env.revisions.length : 0;
              const latestRef = env.latestGitRef || '-';
              const selectID = encodeURIComponent(env.id || '');
              const dockerBtn = env.latestBuildId
                ? '<button type="button" class="btn" data-docker="' + env.latestBuildId + '">Dockerfile</button>'
                : '';
              tr.innerHTML =
                '<td' + selectedClass + '><strong>' + (env.name || 'environment') + '</strong></td>' +
                '<td' + selectedClass + '><code>' + (env.destinationImage || '-') + '</code></td>' +
                '<td' + selectedClass + '>' + badge(env.latestStatus || 'submitted') + '<br/><span style="color:#667a98">' + latestRef + '</span></td>' +
                '<td' + selectedClass + '>' + String(revCount) + '</td>' +
                '<td' + selectedClass + '><button type="button" class="btn" data-select="' + selectID + '">Details</button> ' + dockerBtn + '</td>';
              environmentRows.appendChild(tr);
            }
          }

          function renderWorkloadsTable() {
            const pid = selectedProjectId();
            const ws = state.workspaces.filter(w => !pid || w.projectId === pid);
            const js = state.jobs.filter(j => !pid || j.projectId === pid);
            const aps = state.apps.filter(a => !pid || a.projectId === pid);
            const bs = state.builds.filter(b => !pid || b.projectId === pid);
            const rows = [];
            ws.forEach(w => rows.push({ type: 'Workspace', name: w.name || w.id, status: w.status || 'submitted' }));
            js.forEach(j => rows.push({ type: 'Job', name: j.name || j.jobName || j.id, status: j.status || 'submitted' }));
            aps.forEach(a => rows.push({ type: 'App', name: a.name || a.slug || a.id, status: a.status || 'submitted' }));
            bs.forEach(b => rows.push({ type: 'Build', name: b.jobName || b.destinationImage || 'build', status: b.status || 'submitted' }));
            workloadRows.innerHTML = '';
            if (rows.length === 0) {
              workloadRows.innerHTML = '<tr><td colspan="3">No workload yet for selected project.</td></tr>';
              return;
            }
            rows.slice(0, 24).forEach((r) => {
              const tr = document.createElement('tr');
              tr.innerHTML = '<td>' + r.type + '</td><td>' + r.name + '</td><td>' + badge(r.status) + '</td>';
              workloadRows.appendChild(tr);
            });
          }

          function renderProjectContext() {
            const pid = selectedProjectId();
            const p = state.projects.find((x) => x.id === pid) || null;
            projectOut.textContent = JSON.stringify({ selectedProject: p }, null, 2);
          }

          function renderProjectResourceSelectors() {
            const pid = selectedProjectId();
            attachDatasetSelect.innerHTML = '';
            attachRepoSelect.innerHTML = '';
            attachDatasourceSelect.innerHTML = '';

            if (!pid) {
              const ds = document.createElement('option');
              ds.value = '';
              ds.textContent = 'Select a project first';
              attachDatasetSelect.appendChild(ds);
              const rp = document.createElement('option');
              rp.value = '';
              rp.textContent = 'Select a project first';
              attachRepoSelect.appendChild(rp);
              const ds = document.createElement('option');
              ds.value = '';
              ds.textContent = 'Select a project first';
              attachDatasourceSelect.appendChild(ds);
              return;
            }

            const attachedDatasetIDs = new Set(ensureArray(state.projectDatasets).map((d) => d.id));
            const attachedRepoIDs = new Set(ensureArray(state.projectRepositories).map((r) => r.id));
            const attachedDatasourceIDs = new Set(ensureArray(state.projectDatasources).map((d) => d.id));

            const availableDatasets = ensureArray(state.datasets).filter((d) => d && d.id && !attachedDatasetIDs.has(d.id));
            const availableRepos = ensureArray(state.repositories).filter((r) => r && r.id && !attachedRepoIDs.has(r.id));
            const availableDatasources = ensureArray(state.datasources).filter((d) => d && d.id && !attachedDatasourceIDs.has(d.id));

            if (availableDatasets.length === 0) {
              const opt = document.createElement('option');
              opt.value = '';
              opt.textContent = 'No dataset to attach';
              attachDatasetSelect.appendChild(opt);
            } else {
              availableDatasets.forEach((d) => {
                const opt = document.createElement('option');
                opt.value = d.id || '';
                opt.textContent = (d.name || d.id) + ' (' + (d.bucket || '-') + ')';
                attachDatasetSelect.appendChild(opt);
              });
            }

            if (availableRepos.length === 0) {
              const opt = document.createElement('option');
              opt.value = '';
              opt.textContent = 'No repository to attach';
              attachRepoSelect.appendChild(opt);
            } else {
              availableRepos.forEach((r) => {
                const opt = document.createElement('option');
                opt.value = r.id || '';
                opt.textContent = (r.name || r.id) + ' (' + (r.url || '-') + ')';
                attachRepoSelect.appendChild(opt);
              });
            }

            if (availableDatasources.length === 0) {
              const opt = document.createElement('option');
              opt.value = '';
              opt.textContent = 'No datasource to attach';
              attachDatasourceSelect.appendChild(opt);
            } else {
              availableDatasources.forEach((d) => {
                const opt = document.createElement('option');
                opt.value = d.id || '';
                opt.textContent = (d.name || d.id) + ' (' + (d.type || '-') + ')';
                attachDatasourceSelect.appendChild(opt);
              });
            }
          }

          function renderProjectResourcesTable() {
            projectDatasetRows.innerHTML = '';
            projectRepoRows.innerHTML = '';
            projectDatasourceRows.innerHTML = '';

            if (state.projectDatasets.length === 0) {
              projectDatasetRows.innerHTML = '<tr><td colspan="4">No dataset attached.</td></tr>';
            } else {
              state.projectDatasets.forEach((d) => {
                const tr = document.createElement('tr');
                tr.innerHTML =
                  '<td><strong>' + (d.name || d.id) + '</strong></td>' +
                  '<td><code>' + (d.bucket || '-') + '</code></td>' +
                  '<td><code>' + (d.prefix || '-') + '</code></td>' +
                  '<td><button type="button" class="btn danger" data-detach-dataset="' + (d.id || '') + '">Detach</button></td>';
                projectDatasetRows.appendChild(tr);
              });
            }

            if (state.projectRepositories.length === 0) {
              projectRepoRows.innerHTML = '<tr><td colspan="4">No repository attached.</td></tr>';
            } else {
              state.projectRepositories.forEach((r) => {
                const tr = document.createElement('tr');
                tr.innerHTML =
                  '<td><strong>' + (r.name || r.id) + '</strong></td>' +
                  '<td><code>' + (r.url || '-') + '</code></td>' +
                  '<td><code>' + (r.authSecretName || '-') + '</code></td>' +
                  '<td><button type="button" class="btn danger" data-detach-repo="' + (r.id || '') + '">Detach</button></td>';
                projectRepoRows.appendChild(tr);
              });
            }

            if (state.projectDatasources.length === 0) {
              projectDatasourceRows.innerHTML = '<tr><td colspan="4">No datasource attached.</td></tr>';
            } else {
              state.projectDatasources.forEach((d) => {
                const tr = document.createElement('tr');
                tr.innerHTML =
                  '<td><strong>' + (d.name || d.id) + '</strong></td>' +
                  '<td><code>' + (d.type || '-') + '</code></td>' +
                  '<td><code>' + (d.host || '-') + ':' + String(d.port || '-') + '/' + (d.database || '-') + '</code></td>' +
                  '<td><button type="button" class="btn danger" data-detach-ds="' + (d.id || '') + '">Detach</button></td>';
