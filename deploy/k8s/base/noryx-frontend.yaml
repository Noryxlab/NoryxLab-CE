            state.platformHistory[key] = values.slice(-24);
          }

          function renderSparkline(id, values) {
            const line = document.getElementById(id);
            if (!line) return;
            const samples = ensureArray(values);
            if (samples.length === 0) { line.setAttribute('points', ''); return; }
            const min = Math.min(...samples);
            const max = Math.max(...samples);
            const range = Math.max(1, max - min);
            const points = samples.map((value, index) => {
              const x = samples.length === 1 ? 0 : (index * 120 / (samples.length - 1));
              const y = 30 - ((value - min) * 24 / range);
              return x.toFixed(1) + ',' + y.toFixed(1);
            });
            line.setAttribute('points', points.join(' '));
          }

