          function renderAll() {
            renderProjectOptions();
            renderProjectsTable();
            renderProjectContext();
            renderProjectResourceSelectors();
            renderProjectResourcesTable();
            renderSecretsTable();
            renderDatasetsTable();
            renderRepositoriesTable();
            renderDatasourcesTable();
            renderSecretOptions();
            renderDatasourceSecretOptions();
            renderWorkspacesTable();
            renderJobEnvOptions();
            renderJobsTable();
            renderAppEnvOptions();
            renderAppsTable();
            renderEnvironmentsTable();
