          function renderEnvironmentDetail(env) {
            if (!env) return;
            envSelectedName.textContent = env.name || '-';
            envSelectedImage.textContent = env.destinationImage || '-';
            envSelectedStatus.innerHTML = badge(env.latestStatus || 'submitted');
            envSelectedRef.textContent = env.latestGitRef || '-';
            envSelectedBuildId.textContent = env.latestBuildId || '-';
            envActiveRevision.textContent = 'Active revision: ' + (selectedEnvironmentBuildID || '-');
            const revisions = Array.isArray(env.revisions) ? env.revisions : [];
            if (!selectedEnvironmentBuildID || !revisions.some((r) => (r.buildId || r.id || '') === selectedEnvironmentBuildID)) {
              selectedEnvironmentBuildID = env.latestBuildId || '';
            }
            envActiveRevision.textContent = 'Active revision: ' + (selectedEnvironmentBuildID || '-');
            envRevisionRows.innerHTML = '';
            if (revisions.length === 0) {
