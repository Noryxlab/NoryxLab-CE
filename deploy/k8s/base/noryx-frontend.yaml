          function renderProjectFiles() {
            projectFilesRows.innerHTML = '';
            projectFilesBreadcrumbs.innerHTML = '';
            const root = document.createElement('button');
            root.type = 'button';
            root.textContent = '/mnt';
            root.onclick = async () => { projectFilesCurrentPath = ''; await refreshProjectFiles(); };
            projectFilesBreadcrumbs.appendChild(root);
            let built = '';
            String(projectFilesCurrentPath || '').split('/').filter(Boolean).forEach((part) => {
              built = built ? built + '/' + part : part;
              const separator = document.createElement('span');
              separator.textContent = '›';
              projectFilesBreadcrumbs.appendChild(separator);
              const button = document.createElement('button');
              button.type = 'button';
              button.textContent = part;
              const target = built;
              button.onclick = async () => { projectFilesCurrentPath = target; await refreshProjectFiles(); };
              projectFilesBreadcrumbs.appendChild(button);
            });
            projectFilesUp.disabled = !projectFilesCurrentPath;
            if (state.projectFiles.length === 0) {
              projectFilesRows.innerHTML = '<tr><td colspan="4">Ce dossier est vide.</td></tr>';
              return;
            }
            state.projectFiles.forEach((item) => {
              const tr = document.createElement('tr');
              const open = item.isDirectory
                ? '<button type="button" class="file-name-button" data-project-folder="' + encodeURIComponent(item.path) + '">' + escapeHTML(item.name) + '</button>'
                : '<button type="button" class="file-name-button" data-project-file="' + encodeURIComponent(item.path) + '">' + escapeHTML(item.name) + '</button>';
              tr.innerHTML =
                '<td><span class="file-path"><span class="file-icon ' + (item.isDirectory ? 'folder' : '') + '">' + (item.isDirectory ? '▰' : '▤') + '</span>' + open + '</span></td>' +
                '<td>' + (item.isDirectory ? '-' : formatBytes(item.size)) + '</td>' +
                '<td>' + formatDateTime(item.updatedAt) + '</td>' +
                '<td>' + (item.isDirectory ? '' : '<button type="button" class="btn" data-project-download="' + encodeURIComponent(item.path) + '">Telecharger</button> ') +
                '<button type="button" class="btn danger" data-project-file-delete="' + encodeURIComponent(item.path) + '">Supprimer</button></td>';
              projectFilesRows.appendChild(tr);
            });
          }

