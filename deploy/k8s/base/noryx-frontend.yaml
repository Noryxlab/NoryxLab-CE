apiVersion: v1
kind: ConfigMap
metadata:
  name: noryx-frontend
  namespace: noryx-ce
  labels:
    app: noryx-frontend
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>CE</title>
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
          :root {
            --bg: #f3f5f8;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --line: #dfe4ec;
            --line-strong: #c7d0dc;
            --text: #1e2b45;
            --muted: #5c6c86;
            --nav-bg: #0f1f2d;
            --nav-bg-2: #163346;
            --nav-text: #d8e8f4;
            --nav-muted: #97b1c8;
            --brand: #006d77;
            --brand-2: #0f93a0;
            --brand-soft: #d8f0f3;
            --accent: #4f46e5;
            --accent-soft: #eeedff;
            --ok: #1f8b4c;
            --warn: #a9690f;
            --bad: #af2c36;
            --shadow-sm: 0 1px 2px rgba(30, 43, 69, .05);
            --shadow-md: 0 2px 8px rgba(30, 43, 69, .08);
            --font: "Plus Jakarta Sans", "Avenir Next", "Segoe UI", sans-serif;
            --fs-11: 11px;
            --fs-12: 12px;
            --fs-13: 13px;
            --fs-14: 14px;
            --fs-16: 16px;
            --fs-18: 18px;
            --fs-24: 24px;
            --fs-36: 36px;
            --lh-tight: 1.2;
            --lh-base: 1.45;
          }
          * { box-sizing: border-box; }
          .ee-only { display: none !important; }
          body.is-enterprise .ee-only { display: block !important; }
          body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: var(--font);
            font-size: var(--fs-14);
            line-height: var(--lh-base);
            background:
              radial-gradient(1200px 640px at 16% -18%, #d4e9ee 0%, transparent 72%),
              radial-gradient(1100px 760px at 94% 110%, #f7e8d0 0%, transparent 62%),
              var(--bg);
          }
          .access-blocker { position: fixed; inset: 0; z-index: 1000; display: grid; place-items: center; padding: 24px; background: rgba(15,31,45,.92); }
          .access-blocker[hidden] { display: none; }
          .access-blocker-card { max-width: 620px; padding: 34px; border-radius: 20px; background: #fff; box-shadow: 0 24px 80px rgba(0,0,0,.28); text-align: center; }
          .access-blocker-card h2 { margin-top: 0; }
          .layout {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 304px 1fr;
            transition: grid-template-columns .18s ease;
          }
          .layout.is-collapsed {
            grid-template-columns: 86px 1fr;
          }
          .sidebar {
            padding: 24px 18px;
            color: var(--nav-text);
            background: linear-gradient(180deg, var(--nav-bg) 0%, var(--nav-bg-2) 100%);
            border-right: 1px solid #17364b;
            box-shadow: inset -1px 0 0 rgba(255,255,255,.04);
            position: relative;
            overflow: hidden;
          }
          .sidebar::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(560px 260px at -10% -10%, rgba(255,255,255,.12), transparent 68%);
          }
          .reduce-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 2px 0 8px;
          }
          .reduce-btn {
            border: 1px solid rgba(255,255,255,.2);
            background: rgba(255,255,255,.08);
            color: #dceaf6;
            border-radius: 10px;
            padding: 6px 9px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
          }
          .reduce-btn:hover { background: rgba(255,255,255,.16); }
          .layout.is-collapsed .reduce-btn .txt { display: none; }
          .layout.is-collapsed .reduce-btn { padding: 6px 8px; }
          .layout.is-collapsed .brand,
          .layout.is-collapsed .edition,
          .layout.is-collapsed .who,
          .layout.is-collapsed .menu-title,
          .layout.is-collapsed .versions,
          .layout.is-collapsed .menu span:not(.menu-ico),
          .layout.is-collapsed .menu a { display: none; }
          .layout.is-collapsed .sidebar { padding: 18px 10px; }
          .layout.is-collapsed .tab-btn {
            justify-content: center;
            padding: 10px 8px;
            min-height: 40px;
          }
          .layout.is-collapsed .menu {
            gap: 7px;
            margin-bottom: 9px;
          }
          .layout.is-collapsed .side-sep { margin: 8px 0; }
          .layout.is-collapsed .menu-ico { width: auto; font-size: 16px; }
          .layout.is-collapsed .sidebar [data-tab] { position: relative; }
          .layout.is-collapsed .sidebar [data-tab]::after {
            content: attr(data-tab);
            position: absolute;
            left: 60px;
            opacity: 0;
          }
          .side-sep {
            height: 1px;
            border: 0;
            background: linear-gradient(90deg, rgba(255,255,255,.03), rgba(255,255,255,.24), rgba(255,255,255,.03));
            margin: 10px 0 12px;
          }
          .brand {
            font-size: 27px;
            font-weight: 700;
            letter-spacing: .03em;
            margin-bottom: 1px;
          }
          .edition {
            font-size: 12px;
            color: var(--nav-muted);
            margin-bottom: 10px;
            letter-spacing: .04em;
            text-transform: uppercase;
          }
          .versions {
            font-size: 10px;
            color: #93adc5;
            margin: 2px 0 8px;
            letter-spacing: .03em;
            opacity: .85;
          }
          .who {
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 14px;
            padding: 11px;
            font-size: 13px;
            margin-bottom: 20px;
          }
          .who-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
          }
          .who .btn {
            background: rgba(255,255,255,.12);
            border-color: rgba(255,255,255,.2);
            color: #e8f2fc;
          }
          .who .btn.primary {
            background: linear-gradient(90deg, #007989 0%, #13a1b1 100%);
            border-color: #46bdca;
          }
          .menu-title {
            margin: 14px 0 8px;
            color: var(--nav-muted);
            font-size: var(--fs-12);
            letter-spacing: .14em;
            text-transform: uppercase;
          }
          .menu {
            display: grid;
            gap: 8px;
            margin-bottom: 13px;
          }
          .tab-btn {
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 12px;
            padding: 10px 13px;
            background: rgba(255,255,255,.045);
            color: var(--nav-text);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: var(--fs-13);
            font-weight: 600;
            letter-spacing: .015em;
            transition: transform .12s ease, background .16s ease, border-color .16s ease;
          }
          .menu-ico {
            width: 20px;
            text-align: center;
            opacity: .95;
            font-size: 15px;
          }
          .tab-btn:hover { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.24); transform: translateY(-1px); }
          .tab-btn.active {
            background: linear-gradient(90deg, #006978 0%, #1491a0 100%);
            border-color: #33a9b6;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.1);
          }
          .sidebar a {
            color: #d5edf4;
            text-decoration: none;
            font-weight: 700;
          }
          .sidebar a:hover { text-decoration: underline; }
          .content {
            padding: 30px 34px;
          }
          .topbar-meta {
            font-size: 11px;
            color: #768ca4;
            margin-top: 6px;
            letter-spacing: .03em;
          }
          .lang-min {
            border: 1px solid #d7e0e8;
            border-radius: 999px;
            font-size: 11px;
            padding: 6px 9px;
            min-width: 56px;
            color: #5a6f86;
            background: #f8fafc;
          }
          .topbar {
            background: var(--surface);
            border: 1px solid #d8e2e8;
            border-radius: 10px;
            padding: 12px 16px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
          }
          .title {
            margin: 0;
            font-size: var(--fs-24);
            line-height: var(--lh-tight);
            font-weight: 700;
            letter-spacing: .015em;
          }
          .subtitle { display: none; }
          .topbar-main { min-width: 280px; }
          .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 9px;
          }
          .btn {
            border: 1px solid var(--line-strong);
            background: #f7f9fc;
            color: #1f2b45;
            border-radius: 8px;
            padding: 9px 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform .12s ease, box-shadow .16s ease, background .16s ease;
          }
          .btn:hover { background: #eef2f8; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(16, 35, 62, .08); }
          .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
          }
          .btn.primary:hover { background: #4338ca; border-color: #4338ca; }
          .btn.good {
            background: #e9fbf2;
            color: var(--ok);
            border-color: #b8e9cf;
          }
          .btn.warn {
            background: #fff6e8;
            color: var(--warn);
            border-color: #f6dab0;
          }
          .btn.danger {
            background: #fef0f2;
            color: var(--bad);
            border-color: #f7c8ce;
          }
          .btn:disabled { opacity: .55; cursor: default; }
          .stats {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
          }
          .stat {
            background: var(--surface);
            border: 1px solid #dbe4ea;
            border-radius: 18px;
            padding: 15px;
            box-shadow: var(--shadow-sm);
          }
          .stat .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
          .stat .v { font-size: var(--fs-24); font-weight: 700; margin-top: 7px; }
          .views { margin-top: 16px; }
          .view { display: none; }
          .view.active { display: block; }
          .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; }
          .card {
            background: var(--surface);
            border: 1px solid #dbe4ea;
            border-radius: 10px;
            padding: 18px;
            box-shadow: var(--shadow-sm);
          }
          .card h3 {
            margin: 0 0 9px;
            font-size: var(--fs-14);
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
          }
          .span-8 { grid-column: span 8; }
          .span-7 { grid-column: span 7; }
          .span-6 { grid-column: span 6; }
          .span-5 { grid-column: span 5; }
          .span-4 { grid-column: span 4; }
          .span-12 { grid-column: span 12; }
          .hint {
            margin-bottom: 11px;
            border: 1px solid #b8dfe5;
            background: var(--brand-soft);
            color: #1d5b62;
            border-radius: 12px;
            padding: 10px 11px;
            font-size: 13px;
          }
          .row { display: flex; flex-wrap: wrap; gap: 9px; margin-bottom: 11px; }
          .stack { display: grid; gap: 12px; }
          .home-stack { width: 100%; grid-template-columns: minmax(0, 1fr); }
          .home-stack > * { width: 100%; min-width: 0; }
          .hero {
            background:
              radial-gradient(800px 280px at 5% 0%, rgba(245, 189, 73, .22), transparent 68%),
              linear-gradient(124deg, #1f2b43 0%, #27344e 55%, #2f3b57 100%);
            color: #f4f7fc;
            border-radius: 18px;
            padding: 22px;
            box-shadow: var(--shadow-md);
            border: 1px solid #3e4b69;
          }
          .hero h2 { margin: 0 0 8px; font-size: var(--fs-36); line-height: var(--lh-tight); font-weight: 700; letter-spacing: .01em; }
          .hero p { margin: 0; color: #d6e0f4; line-height: var(--lh-base); font-size: var(--fs-16); font-weight: 500; }
          .platform-pulse { overflow: hidden; border: 1px solid #cad7e2; border-radius: 16px; background: linear-gradient(120deg, #f8fbfc 0%, #eef6f7 58%, #f5f3ea 100%); box-shadow: var(--shadow-sm); }
          .platform-pulse-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 15px 17px 10px; }
          .platform-pulse-head h3 { margin: 0; font-size: 16px; }
          .platform-pulse-live { display: inline-flex; align-items: center; gap: 7px; color: #37616a; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
          .platform-pulse-live::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: #2fbf71; box-shadow: 0 0 0 0 rgba(47,191,113,.35); animation: live-pulse 2s infinite; }
          @keyframes live-pulse { 70% { box-shadow: 0 0 0 8px rgba(47,191,113,0); } 100% { box-shadow: 0 0 0 0 rgba(47,191,113,0); } }
          .platform-pulse-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1px; border-top: 1px solid #d9e3e9; background: #d9e3e9; }
          .pulse-metric { min-width: 0; padding: 15px 17px 13px; background: rgba(255,255,255,.88); }
          .pulse-metric .k { color: #64748b; font-size: 10px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; }
          .pulse-metric .v { margin: 5px 0 7px; color: #183149; font-size: 25px; font-weight: 750; }
          .pulse-metric .meta { min-height: 16px; color: #718096; font-size: 11px; }
          .pulse-spark { width: 100%; height: 34px; overflow: visible; }
          .pulse-spark polyline { fill: none; stroke: #25869a; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
          .projects-toolbar { display: flex; flex-wrap: wrap; gap: 9px; margin-bottom: 11px; }
          .projects-toolbar input { min-width: 240px; flex: 1 1 240px; }
          .project-create-panel { display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-bottom: 22px; padding: 18px; border: 1px solid #bfc9ff; border-radius: 14px; background: linear-gradient(110deg, #f0efff 0%, #f8f9ff 70%, #eef8fa 100%); }
          .project-create-copy { min-width: 220px; }
          .project-create-copy h4 { margin: 0 0 4px; color: #31377a; font-size: 17px; }
          .project-create-copy p { margin: 0; color: var(--muted); font-size: 12px; }
          .project-create-form { display: flex; flex: 1 1 520px; justify-content: flex-end; gap: 9px; }
          .project-create-form input { flex: 1 1 360px; max-width: 560px; background: #fff; }
          .project-catalog-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
          .project-catalog-header h4 { margin: 0; font-size: 16px; }
          .projects-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
          .project-card { display:flex; flex-direction:column; min-height:270px; overflow:hidden; border:1px solid #d7e3eb; border-radius:14px; background:#fff; transition:border-color .16s ease, box-shadow .16s ease, transform .16s ease; }
          .project-card:hover { transform:translateY(-2px); box-shadow:0 12px 28px rgba(38,55,77,.12); }
          .project-card.is-active { border:2px solid var(--accent); box-shadow:0 10px 28px rgba(79,70,229,.16); }
          .project-card-main { flex:1; padding:18px 18px 14px; }
          .project-card h4 { margin:5px 0 12px; color:#4338ca; font-size:var(--fs-20); }
          .project-owner { color:#445269; font-size:12px; font-weight:700; }
          .project-description { min-height:48px; margin:12px 0; color:#344257; font-size:13px; line-height:1.55; }
          .project-last-activity { color:var(--muted); font-size:11px; }
          .project-card-footer { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; padding:1px; background:#dbe3ea; }
          .project-workload { display:flex; align-items:center; gap:7px; padding:10px 12px; background:#f1f4f7; color:#344257; font-size:11px; }
          .project-workload strong { color:#17243a; font-size:15px; }
          .project-card-actions { display:flex; gap:7px; padding:10px 12px; border-top:1px solid #e3e9ef; background:#fff; }
          .project-meta { color: var(--muted); font-size: var(--fs-13); margin-bottom: 10px; }
          .project-actions { display: flex; gap: 8px; }
          .project-active-marker { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 9px; color: #3730a3; font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
          .project-active-marker::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px rgba(79, 70, 229, .14); }
          .project-row-active { background: var(--accent-soft); }
          .project-scope { grid-column: span 12; border: 1px solid #c9d2df; border-radius: 16px; padding: 0; overflow: hidden; background: #edf1f7; box-shadow: var(--shadow-md); }
          .project-scope-header { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 18px 20px; color: #fff; background: linear-gradient(115deg, #293653 0%, #354366 65%, #414f75 100%); }
          .project-scope-kicker { color: #cbd5ff; font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
          .project-scope-name { margin-top: 3px; font-size: 22px; font-weight: 700; }
          .project-scope-id { color: #dbe4f6; font-size: 12px; }
          .execution-project-context { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 16px; padding: 14px 16px; border: 1px solid #c6d1df; border-left: 5px solid var(--accent); border-radius: 12px; background: linear-gradient(110deg, #f0efff 0%, #f8f9ff 65%, #eef8fa 100%); }
          .execution-project-context .k { color: #5d6485; font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
          .execution-project-context .v { margin-top: 3px; color: #29335c; font-size: 18px; font-weight: 750; }
          .execution-project-context code { color: #66738f; font-size: 11px; }
          .project-resources { display: grid; gap: 14px; padding: 14px; }
          .project-resource-card { border-left: 4px solid var(--accent); box-shadow: none; }
          .project-resource-card h3 { display: flex; align-items: center; gap: 8px; }
          .project-resource-card h3::before { content: ""; width: 8px; height: 8px; border-radius: 2px; background: var(--accent); }
          .project-list table { margin-top: 8px; }
          .dataset-create-panel { margin-bottom: 20px; padding: 18px; border: 1px solid #b8dfe5; border-radius: 14px; background: linear-gradient(110deg, #e9f7f8 0%, #f8fbfc 65%, #f0efff 100%); }
          .dataset-create-header, .dataset-catalog-header { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 12px; }
          .dataset-create-header h4, .dataset-catalog-header h4 { margin: 0; font-size: 16px; }
          .dataset-create-header p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }
          .dataset-create-fields { display: grid; grid-template-columns: 180px minmax(220px, 1fr) minmax(220px, 1fr) 150px auto; gap: 9px; align-items: center; }
          .dataset-external-fields { margin-top: 12px; padding-top: 12px; border-top: 1px solid #c8dde2; }
          .dataset-catalog { margin-bottom: 20px; padding: 16px; border: 1px solid var(--line); border-radius: 14px; background: var(--surface-soft); }
          .dataset-catalog table { background: #fff; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
          .dataset-row-active { background: var(--accent-soft); box-shadow: inset 4px 0 0 var(--accent); }
          .dataset-active-marker { display: inline-flex; align-items: center; gap: 5px; margin-top: 5px; color: #3730a3; font-size: 10px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
          .dataset-active-marker::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
          .dataset-explorer { overflow: hidden; border: 1px solid #c9d2df; border-radius: 16px; background: #edf1f7; }
          .dataset-explorer-header { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 18px 20px; color: #fff; background: linear-gradient(115deg, #173e4b 0%, #225766 60%, #306b76 100%); }
          .dataset-explorer-kicker { color: #bde8ed; font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
          .dataset-explorer-name { margin-top: 3px; font-size: 22px; font-weight: 700; }
          .dataset-explorer-location { color: #d5eef1; font-size: 12px; text-align: right; }
          .dataset-explorer-stats { display: flex; gap: 10px; padding: 12px 14px 0; }
          .dataset-explorer-stat { min-width: 130px; padding: 9px 11px; border: 1px solid #d6dfe8; border-radius: 10px; background: #fff; }
          .dataset-explorer-stat .k { color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
          .dataset-explorer-stat .v { margin-top: 3px; font-size: 16px; font-weight: 700; }
          .dataset-upload-panel { margin: 12px 14px; padding: 14px; border: 1px solid #d6dfe8; border-radius: 12px; background: #fff; }
          .dataset-upload-panel h4 { margin: 0 0 10px; font-size: 14px; }
          .dataset-transfer { display: none; margin-top: 10px; padding: 10px 12px; border: 1px solid #c8d5e2; border-radius: 10px; background: #f4f8fb; }
          .dataset-transfer-head { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 7px; color: #334b61; font-size: 12px; font-weight: 700; }
          .dataset-transfer-track { height: 9px; overflow: hidden; border-radius: 999px; background: #dbe5ed; }
          .dataset-transfer-bar { width: 0; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--brand), var(--brand-2)); transition: width .15s ease; }
          .dataset-transfer.is-indeterminate .dataset-transfer-bar { width: 35%; animation: dataset-transfer-slide 1.15s ease-in-out infinite; }
          @keyframes dataset-transfer-slide { from { transform: translateX(-110%); } to { transform: translateX(310%); } }
          .dataset-access-panel { margin: 12px 14px; padding: 14px; border: 1px solid #d6dfe8; border-radius: 12px; background: #fff; }
          .dataset-access-panel h4 { margin: 0 0 4px; font-size: 14px; }
          .dataset-access-panel .access-copy { margin-bottom: 10px; color: var(--muted); font-size: 12px; }
          .dataset-files { margin: 0 14px 14px; border: 1px solid #bfcbd8; border-radius: 12px; overflow: hidden; background: #fff; }
          .dataset-files h4 { margin: 0; font-size: 14px; }
          .dataset-file-toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid #d6dfe8; background: #f4f7fa; }
          .dataset-file-toolbar .spacer { flex: 1; }
          .dataset-breadcrumbs { display: flex; align-items: center; gap: 3px; min-height: 38px; padding: 6px 12px; border-bottom: 1px solid #d6dfe8; background: #fff; }
          .dataset-breadcrumbs button { border: 0; border-radius: 5px; padding: 5px 7px; color: #24506b; background: transparent; cursor: pointer; font-weight: 600; }
          .dataset-breadcrumbs button:hover { background: #e8f1f5; }
          .dataset-breadcrumbs span { color: #8a98a8; }
          .dataset-files table { margin: 0; border: 0; border-radius: 0; }
          .dataset-files tbody tr { cursor: default; }
          .dataset-files tbody tr:hover { background: #edf6fa; }
          .file-path { display: flex; align-items: center; gap: 8px; font-weight: 600; }
          .file-icon { width: 22px; color: #2f6078; font-size: 18px; text-align: center; }
          .file-icon.folder { color: #d39a24; }
          .file-name-button { border: 0; padding: 2px; color: #183149; background: transparent; cursor: pointer; font: inherit; font-weight: 600; text-align: left; }
          .file-name-button:hover { color: #075985; text-decoration: underline; }
          .dataset-preview { margin: 0 14px 14px; padding: 14px; border: 1px solid #d6dfe8; border-radius: 12px; background: #fff; }
          .dataset-preview-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
          .dataset-preview-body { min-height: 180px; max-height: 620px; overflow: auto; border: 1px solid var(--line); border-radius: 10px; background: #f8fafc; padding: 12px; }
          .dataset-preview-body img { width: 100%; max-height: 580px; border: 0; object-fit: contain; }
          .dataset-preview-body.is-pdf { min-height: 760px; max-height: none; overflow: visible; padding: 0; background: #eef2f6; }
          .dataset-preview-body.is-pdf iframe { display: block; width: 100%; height: max(760px, calc(100vh - 180px)); border: 0; border-radius: 10px; }
          .dataset-preview-body table { background: #fff; font-size: 12px; }
          .dataset-preview-body table th { position: sticky; top: 0; background: #edf2f7; z-index: 1; }
          .dataset-preview-body textarea { width: 100%; min-height: 500px; resize: vertical; border: 0; outline: 0; background: #fff; padding: 12px; font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
          .spreadsheet-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
          .spreadsheet-toolbar select { min-width: 220px; }
          .spreadsheet-note { color: #8a520b; font-size: 11px; }
          .spreadsheet-table td[contenteditable="true"] { min-width: 100px; background: #fffdf2; outline: 1px solid #f0c36b; }
          .preview-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex: 0 0 auto; box-shadow: 0 0 0 3px rgba(0,0,0,.05); }
          .preview-dot.supported { background: #22c55e; }
          .env-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
          .env-header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
          .env-header-actions .btn {
            background: #fff;
            border-color: #d4d9e3;
            color: #354562;
          }
          .env-header-actions .btn.warn {
            background: var(--accent-soft);
            border-color: #c8c5ff;
            color: #4338ca;
          }
          .env-active-rev { font-size: 12px; color: #49617f; }
          .env-rev-active { background: #f0efff; }
          .env-rev-id { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
          .env-layout { gap: 18px; }
          .env-toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
          }
          .env-toolbar-right { display: flex; gap: 10px; align-items: center; }
          .env-count { font-size: 13px; color: var(--muted); }
          .env-filter {
            min-width: 240px;
            border-radius: 8px;
            padding: 9px 11px;
          }
          .table-flat {
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
          }
          .table-flat tbody tr:hover { background: #f9faff; }
          .table-flat tbody tr.is-selected { background: #f0efff; }
          .env-section-title {
            margin: 0 0 8px;
            font-size: 12px;
            letter-spacing: .09em;
            color: #4f6279;
            text-transform: uppercase;
            font-weight: 700;
          }
          .env-detail-table th { width: 120px; }
          .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
          .env-name {
            color: #4338ca;
            font-weight: 600;
            text-decoration: none;
          }
          .env-name:hover { text-decoration: underline; }
          input, select {
            border: 1px solid var(--line-strong);
            border-radius: 12px;
            padding: 10px 12px;
            min-width: 170px;
            color: #0f213c;
            background: #fff;
          }
          input:focus, select:focus {
            outline: none;
            border-color: #3ca5b2;
            box-shadow: 0 0 0 3px rgba(16, 138, 150, .15);
          }
          .execution-env-select {
            appearance: none;
            -webkit-appearance: none;
            background-image: none;
            cursor: pointer;
          }
          table { width: 100%; border-collapse: collapse; font-size: 13px; }
          th, td {
            text-align: left;
            border-bottom: 1px solid #e6edf2;
            padding: 12px 8px;
            vertical-align: top;
          }
          .apps-card { min-width: 0; overflow: hidden; }
          .apps-table-wrap { width: 100%; overflow-x: auto; }
          .apps-table-wrap table { min-width: 1080px; }
          .app-access-link { overflow-wrap: anywhere; word-break: break-word; }
          .app-actions { white-space: nowrap; }
          th { color: #61718a; font-weight: 700; font-size: var(--fs-12); letter-spacing: .04em; text-transform: uppercase; }
          .badge {
            display: inline-block;
            border-radius: 999px;
            padding: 3px 9px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .04em;
            text-transform: uppercase;
          }
          .b-ok { background: #d8fae8; color: #17603f; }
          .b-mid { background: #fff0d7; color: #8f520d; }
          .b-info { background: #ddebff; color: #1b4698; }
          .b-sys { background: #efeefe; color: #4338ca; }
          .b-custom { background: #e9fbf2; color: #17603f; }
          pre {
            margin: 0;
            border: 1px solid #123042;
            background: #0f2534;
            color: #d9edf6;
            border-radius: 12px;
            padding: 11px;
            min-height: 130px;
            overflow: auto;
            font-size: 12px;
          }
          @media (max-width: 1240px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { border-right: none; border-bottom: 1px solid #22455f; }
            .span-8, .span-7, .span-6, .span-5, .span-4 { grid-column: span 12; }
            .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .content { padding: 14px; }
            .platform-pulse-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .projects-grid { grid-template-columns: 1fr; }
            .project-create-panel, .project-create-form { align-items: stretch; flex-direction: column; }
            .project-create-form input { max-width: none; }
            .dataset-create-fields { grid-template-columns: 1fr; }
            .dataset-create-header, .dataset-catalog-header, .dataset-explorer-header { align-items: stretch; flex-direction: column; }
            .dataset-explorer-location { text-align: left; }
          }
          @media (max-width: 720px) {
            .dataset-preview-body.is-pdf { min-height: 70vh; }
            .dataset-preview-body.is-pdf iframe { height: 70vh; min-height: 520px; }
            .stats { grid-template-columns: 1fr; }
            .platform-pulse-grid { grid-template-columns: 1fr; }
          }
        </style>
        <script src="/vendor/keycloak.js"></script>
        <script src="/vendor/xlsx.full.min.js"></script>
      </head>
      <body>
        <div class="layout">
          <aside class="sidebar">
            <div class="reduce-row">
              <div id="brandName" class="brand">NoryxLab</div>
              <button id="reduceNav" class="reduce-btn" type="button"><span class="ico">◀</span> <span class="txt">Reduce</span></button>
            </div>
            <div class="edition" data-i18n="edition">Community Edition</div>
            <div id="versions" class="versions">front: loading | back: loading</div>
            <div id="meta" class="who">
              <div id="metaText">Non connecte</div>
              <div class="who-actions">
                <button id="login" type="button" class="btn primary" style="position:relative;z-index:20;pointer-events:auto;" data-i18n="login">Se connecter</button>
                <button id="logout" class="btn" style="display:none;" data-i18n="logout">Se déconnecter</button>
              </div>
            </div>

            <div class="menu-title" data-i18n="menu_home">Home</div>
            <div class="menu">
              <button class="tab-btn active" data-tab="intro"><span class="menu-ico">⌂</span><span data-i18n="tab_home">Home</span></button>
            </div>
            <hr class="side-sep" />

            <div class="menu-title" data-i18n="menu_data">Data</div>
            <div class="menu">
              <button class="tab-btn" data-tab="data-datasets"><span class="menu-ico">▦</span><span data-i18n="tab_datasets">Datasets</span></button>
              <button class="tab-btn" data-tab="data-datasources"><span class="menu-ico">◎</span><span>Datasources</span></button>
              <button class="tab-btn" data-tab="data-git"><span class="menu-ico">⑂</span><span>Git</span></button>
              <button class="tab-btn" data-tab="data-secrets"><span class="menu-ico">◍</span><span>Secrets</span></button>
            </div>
            <hr class="side-sep" />

            <div class="menu-title" data-i18n="menu_develop">Develop</div>
            <div class="menu">
              <button class="tab-btn" data-tab="projects"><span class="menu-ico">◫</span><span data-i18n="tab_projects_overview">Projets</span></button>
              <button class="tab-btn" data-tab="workspaces"><span class="menu-ico">⌘</span><span data-i18n="tab_workspaces">Workspaces</span></button>
              <button class="tab-btn" data-tab="project-jobs"><span class="menu-ico">⏱</span><span data-i18n="tab_jobs">Jobs</span></button>
              <button class="tab-btn" data-tab="project-apps"><span class="menu-ico">▣</span><span>Apps</span></button>
              <button class="tab-btn" data-tab="project-dashboards"><span class="menu-ico">◧</span><span>Dashboards</span></button>
              <button class="tab-btn" data-tab="project-apis"><span class="menu-ico">⋈</span><span data-i18n="tab_apis">Services API</span></button>
            </div>
            <hr class="side-sep" />

            <div class="menu-title" data-i18n="menu_deploy">Deploy</div>
            <div class="menu">
              <button class="tab-btn" data-tab="production"><span class="menu-ico">●</span><span>Production</span></button>
            </div>
            <hr class="side-sep" />

            <div class="menu-title" data-i18n="menu_govern">Govern</div>
            <div class="menu">
              <button class="tab-btn" data-tab="environments"><span class="menu-ico">◈</span><span data-i18n="tab_environments">Environnements</span></button>
              <button class="tab-btn admin-only" data-tab="workloads"><span class="menu-ico">◷</span><span data-i18n="tab_activity">Activites</span></button>
              <button class="tab-btn admin-only" data-tab="ops"><span class="menu-ico">☰</span><span data-i18n="tab_admin">Administration</span></button>
            </div>
            <hr class="side-sep" />

            <div class="menu-title" data-i18n="menu_docs">Documentation</div>
            <div class="menu">
              <a href="/swagger" target="_blank" rel="noopener noreferrer" data-i18n="api_reference">Reference API</a>
            </div>
          </aside>

          <main class="content">
            <section class="topbar">
              <div class="topbar-main">
                <h1 id="sectionTitle" class="title">Accueil</h1>
                <p id="sectionSubtitle" class="subtitle">Vue d'ensemble de la plateforme et actions rapides.</p>
              </div>
              <div class="actions">
                <select id="langSelect" class="lang-min" aria-label="Language">
                  <option value="fr">FR</option>
                  <option value="en">EN</option>
                </select>
              </div>
            </section>

            <section class="stats" id="statsBar">
              <article class="stat"><div class="k" data-i18n="stat_projects">Projets</div><div id="statProjects" class="v">0</div></article>
              <article class="stat"><div class="k" data-i18n="stat_activity">Activites</div><div id="statWorkspaces" class="v">0</div></article>
              <article class="stat"><div class="k" data-i18n="stat_env">Environnements</div><div id="statBuilds" class="v">0</div></article>
            </section>

            <section class="views">
              <section class="view active" id="view-intro">
                <div class="stack home-stack">
                  <article class="hero">
                    <h2 data-i18n="hero_title">Votre plateforme collaborative data et IA</h2>
                    <p data-i18n="hero_subtitle">Une plateforme metier simple pour vos equipes Python et data science, de l'idee a la production.</p>
                  </article>
                  <article class="card span-12">
                    <h3 data-i18n="home_notice_title">Informations equipe</h3>
                    <div class="hint" data-i18n="home_notice_text">Ajoutez ici vos consignes internes, vos liens de formation et vos actualites data.</div>
                    <div class="row">
                      <a class="btn" href="/swagger" target="_blank" rel="noopener noreferrer" data-i18n="home_notice_cta_api">Documentation API</a>
                      <a class="btn" href="https://docs.noryxlab.ai" target="_blank" rel="noopener noreferrer" data-i18n="home_notice_cta_docs">Documentation utilisateur</a>
                      <a class="btn" href="https://status.noryxlab.ai" target="_blank" rel="noopener noreferrer" data-i18n="home_notice_cta_status">Etat plateforme</a>
                    </div>
                  </article>
                  <article class="card span-12">
                    <h3 data-i18n="quickstart">Demarrage rapide</h3>
                    <div class="row">
                      <button class="btn primary" data-tab-jump="projects" data-i18n="go_projects">Aller aux projets</button>
                      <button class="btn" data-tab-jump="data" data-i18n="go_data">Aller aux donnees</button>
                      <button class="btn" data-tab-jump="environments" data-i18n="go_env">Aller aux environnements</button>
                    </div>
                  </article>
                  <article class="platform-pulse">
                    <div class="platform-pulse-head">
                      <h3>Activite de la plateforme</h3>
                      <span id="platformPulseTime" class="platform-pulse-live">Mise a jour en direct</span>
                    </div>
                    <div class="platform-pulse-grid">
                      <div class="pulse-metric"><div class="k">Utilisateurs</div><div id="pulseUsers" class="v">-</div><svg class="pulse-spark" viewBox="0 0 120 34" preserveAspectRatio="none"><polyline id="pulseUsersLine" points=""></polyline></svg><div class="meta">Comptes actifs sur la plateforme</div></div>
                      <div class="pulse-metric"><div class="k">Projets</div><div id="pulseProjects" class="v">-</div><svg class="pulse-spark" viewBox="0 0 120 34" preserveAspectRatio="none"><polyline id="pulseProjectsLine" points=""></polyline></svg><div class="meta">Espaces collaboratifs</div></div>
                      <div class="pulse-metric"><div class="k">Charge</div><div id="pulseLoad" class="v">-</div><svg class="pulse-spark" viewBox="0 0 120 34" preserveAspectRatio="none"><polyline id="pulseLoadLine" points=""></polyline></svg><div id="pulseLoadMeta" class="meta">Workloads actifs</div></div>
                      <div class="pulse-metric"><div class="k">Datalake mesure</div><div id="pulseStorage" class="v">-</div><svg class="pulse-spark" viewBox="0 0 120 34" preserveAspectRatio="none"><polyline id="pulseStorageLine" points=""></polyline></svg><div id="pulseStorageMeta" class="meta">Buckets S3 accessibles</div></div>
                    </div>
                  </article>
                </div>
              </section>
              <section class="view" id="view-projects">
                <div class="grid">
                  <article class="card span-12">
                    <h3>Projects</h3>
                    <div class="project-create-panel">
                      <div class="project-create-copy">
                        <h4>Nouveau projet</h4>
                        <p>Creez un espace de travail puis rattachez ses ressources.</p>
                      </div>
                      <div class="project-create-form">
                        <input id="projectName" placeholder="Nom du nouveau projet" />
                        <input id="projectDescription" placeholder="Description courte du projet" />
                        <button id="createProject" type="button" class="btn primary">Creer le projet</button>
                      </div>
                    </div>
                    <div class="project-catalog-header">
                      <h4>Mes projets</h4>
                      <button id="loadProjects" type="button" class="btn">Actualiser</button>
                    </div>
                    <div class="projects-toolbar">
                      <input id="projectSearch" placeholder="Find project" />
                      <select id="projectViewMode">
                        <option value="grid">Grid</option>
                        <option value="list">List</option>
                      </select>
                      <select id="projectSelect" aria-label="Projet actif" style="display:none"></select>
                    </div>
                    <div id="projectCards" class="projects-grid"></div>
                    <div id="projectList" class="project-list" style="display:none;">
                      <table>
                        <thead><tr><th>Name</th><th>Actions</th></tr></thead>
                        <tbody id="projectRows"></tbody>
                      </table>
                    </div>
                  </article>
                  <section id="projectScope" class="project-scope">
                    <header class="project-scope-header">
                      <div>
                        <div class="project-scope-kicker">Projet actif · ressources rattachees</div>
                        <div id="projectActiveName" class="project-scope-name">Aucun projet selectionne</div>
                        <div id="projectActiveOwner" class="project-meta">Owner · -</div>
                      </div>
                    </header>
                    <div id="projectOwnerForm" class="row" style="display:none">
                      <select id="projectOwnerType"><option value="user">Utilisateur</option><option value="organization">Organisation</option></select>
                      <input id="projectOwnerID" list="projectOwnerOptions" autocomplete="off" placeholder="Saisissez au moins une lettre" />
                      <button id="projectOwnerSave" type="button" class="btn primary">Transférer l'ownership</button>
                      <datalist id="projectOwnerOptions"></datalist>
                    </div>
                    <div id="projectMetadataForm" class="row" style="display:none">
                      <input id="projectEditName" placeholder="Nom du projet" />
                      <textarea id="projectEditDescription" rows="2" placeholder="Description courte du projet"></textarea>
                      <button id="projectMetadataSave" type="button" class="btn">Enregistrer la fiche projet</button>
                    </div>
                    <div class="project-resources">
                      <article class="card project-resource-card">
                        <h3>Fichiers du projet</h3>
                        <div class="hint">Contenu persistant monte dans <code>/mnt</code> pour les workspaces, jobs et applications du projet.</div>
                        <div class="dataset-files" style="margin:12px 0 0">
                          <div class="dataset-file-toolbar">
                            <button id="projectFilesUp" type="button" class="btn">← Retour</button>
                            <button id="projectFilesNewFolder" type="button" class="btn">Nouveau dossier</button>
                            <input id="projectFilesUpload" type="file" />
                            <button id="projectFilesUploadBtn" type="button" class="btn primary">Televerser</button>
                            <span class="spacer"></span>
                            <button id="projectFilesRefresh" type="button" class="btn">Actualiser</button>
                          </div>
                          <div id="projectFilesBreadcrumbs" class="dataset-breadcrumbs"></div>
                          <table>
                            <thead><tr><th>Nom</th><th>Taille</th><th>Derniere modification</th><th>Actions</th></tr></thead>
                            <tbody id="projectFilesRows"></tbody>
                          </table>
                        </div>
                        <div id="projectFileEditor" class="dataset-preview" style="display:none;margin:12px 0 0">
                          <div class="dataset-preview-head">
                            <h4 id="projectFileEditorTitle">Fichier</h4>
                            <div class="row" style="margin:0">
                              <button id="projectFileEditorSave" type="button" class="btn primary">Enregistrer</button>
                              <button id="projectFileEditorClose" type="button" class="btn">Fermer</button>
                            </div>
                          </div>
                          <textarea id="projectFileEditorContent" style="width:100%;min-height:320px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace"></textarea>
                        </div>
                      </article>

                      <article class="card project-resource-card">
                        <h3>Datasets du projet</h3>
                        <div class="hint">Datasets disponibles dans les executions de ce projet.</div>
                        <div class="row">
                          <select id="attachDatasetSelect"></select>
                          <button id="attachDatasetBtn" class="btn primary">Rattacher un dataset</button>
                        </div>
                        <table>
                          <thead><tr><th>Name</th><th>Classification</th><th>Storage</th><th>Owner</th><th>Actions</th></tr></thead>
                          <tbody id="projectDatasetRows"></tbody>
                        </table>
                      </article>

                      <article class="card project-resource-card">
                        <h3>Depots Git du projet</h3>
                        <div class="hint">Depots accessibles depuis les executions de ce projet.</div>
                        <div class="row">
                          <select id="attachRepoSelect"></select>
                          <button id="attachRepoBtn" class="btn primary">Rattacher un depot</button>
                        </div>
                        <table>
                          <thead><tr><th>Name</th><th>URL</th><th>Secret</th><th>Actions</th></tr></thead>
                          <tbody id="projectRepoRows"></tbody>
                        </table>
                      </article>

                      <article class="card project-resource-card">
                        <h3>Sources de donnees du projet</h3>
                        <div class="hint">Connexions de donnees accessibles aux membres de ce projet.</div>
                        <div class="row">
                          <select id="attachDatasourceSelect"></select>
                          <button id="attachDatasourceBtn" class="btn primary">Rattacher une source</button>
                        </div>
                        <table>
                          <thead><tr><th>Name</th><th>Type</th><th>Host</th><th>Actions</th></tr></thead>
                          <tbody id="projectDatasourceRows"></tbody>
                        </table>
                      </article>
                    </div>
                  </section>
                </div>
              </section>

              <section class="view" id="view-data">
                <div class="grid">
                  <article id="card-secrets" class="card span-12">
                    <h3>Secrets</h3>
                    <div class="hint">Secrets utilisateur injectés dans vos workspaces, jobs et apps sous la forme NORYX_SECRET_NOM_DU_SECRET. Expiration optionnelle.</div>
                    <div class="row">
                      <input id="secretName" placeholder="Secret name" />
                      <input id="secretExpiresAt" type="date" />
                    </div>
                    <div class="row">
                      <input id="secretValue" placeholder="Secret value" />
                      <button id="saveSecret" class="btn primary">Save Secret</button>
                    </div>
                    <pre id="secretOut">-</pre>
                    <table>
                      <thead><tr><th>Name</th><th>Expires</th><th>Updated</th><th>Actions</th></tr></thead>
                      <tbody id="secretRows"></tbody>
                    </table>
                  </article>

                  <article id="card-datasets" class="card span-12">
                    <h3>Datasets</h3>
                    <div class="dataset-create-panel">
                      <div class="dataset-create-header">
