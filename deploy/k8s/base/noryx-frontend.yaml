          function isAdminUser() {
            const realmRoles = ensureArray(keycloak?.tokenParsed?.realm_access?.roles);
            const clientRoles = ensureArray(keycloak?.tokenParsed?.resource_access?.['noryx-api']?.roles);
            const roles = new Set([...realmRoles, ...clientRoles].map((r) => String(r || '').toLowerCase()));
            return roles.has('admin') || roles.has('platform_admin');
          }

          function applyRoleVisibility() {
            const admin = isAdminUser();
            document.querySelectorAll('.admin-only').forEach((el) => {
              el.style.display = admin ? '' : 'none';
            });
            if (!admin && state.activeTab === 'workloads') {
              switchTab('environments');
            }
          }

          function badge(status) {
            const s = String(status || '').toLowerCase();
            if (s.includes('run') || s.includes('complete') || s.includes('succeed') || s.includes('ready')) return '<span class="badge b-ok">' + status + '</span>';
            if (s.includes('submit') || s.includes('pending') || s.includes('queue')) return '<span class="badge b-mid">' + status + '</span>';
            return '<span class="badge b-info">' + (status || 'unknown') + '</span>';
          }

          function displayAccessUrl(raw) {
            if (!raw) return '-';
            const s = String(raw);
            const idx = s.indexOf('?');
            return idx === -1 ? s : s.slice(0, idx) + '?...';
          }

          function switchTab(tab, sourceBtn) {
            state.activeTab = tab;
            const activeButton = sourceBtn || tabButtons.find((btn) => btn.getAttribute('data-tab') === tab);
            tabButtons.forEach((btn) => btn.classList.toggle('active', btn === activeButton));
            Object.keys(views).forEach((name) => {
              views[name].classList.toggle('active', name === tab);
            });
            const labels = {
              projects: 'Projects',
              data: 'Data',
              workspaces: 'Workspaces',
              'project-jobs': 'Project Jobs',
              'project-apps': 'Project Apps',
              'project-apis': 'Project APIs',
              environments: 'Environments',
              workloads: 'Workloads',
              ops: 'Admin Ops'
            };
            statTab.textContent = labels[tab] || tab;
          }

          tabButtons.forEach((btn) => {
            btn.onclick = () => {
              const tab = btn.getAttribute('data-tab');
              switchTab(tab, btn);
              const anchor = btn.getAttribute('data-anchor');
              if (anchor && tab === 'data') {
                const node = document.getElementById(anchor);
                if (node) node.scrollIntoView({ behavior: 'smooth', block: 'start' });
              }
            };
          });

          async function callJSON(url, options = {}) {
            if (keycloak?.authenticated) {
              try { await keycloak.updateToken(30); } catch (_) {}
            }
            const headers = { ...(options.headers || {}), ...authHeader() };
            const res = await fetch(url, { ...options, headers });
            const body = await res.json().catch(() => ({}));
            if (!res.ok) throw body;
            return body;
          }

          async function ensureWebSession() {
            await callJSON('/api/v1/auth/session', { method: 'POST' });
          }

          async function waitWorkspaceReady(workspaceID, timeoutMs = 30000) {
            const started = Date.now();
            while ((Date.now() - started) < timeoutMs) {
              await refreshWorkspaces();
              const ws = state.workspaces.find((w) => w.id === workspaceID);
              if (ws && String(ws.status || '').toLowerCase().includes('run')) return true;
              await new Promise((resolve) => setTimeout(resolve, 1500));
            }
            return false;
          }

          function updateStats() {
