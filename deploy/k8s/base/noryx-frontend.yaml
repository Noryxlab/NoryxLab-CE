          document.querySelectorAll('[data-tab-jump]').forEach((btn) => {
            btn.onclick = () => {
              const tab = btn.getAttribute('data-tab-jump');
              const jumpTab = tab === 'data' ? 'data-datasets' : tab;
              const src = tabButtons.find((b) => b.getAttribute('data-tab') === jumpTab);
              switchTab(jumpTab, src || null);
            };
          });
          if (envFilterInput) {
            envFilterInput.oninput = () => {
              if (state.activeTab === 'environments') renderEnvironmentsTable();
            };
          }
          if (envCreateImageBtn) {
            envCreateImageBtn.onclick = async () => {
              if (state.activeTab !== 'environments') switchTab('environments');
              if (!selectedProjectId()) {
                pretty(usersOut, { error: tui('err_select_project_first') });
                switchTab('ops');
                return;
              }
              creatingEnvironment = true;
              selectedEnvironmentID = '';
              selectedEnvironmentBuildID = '';
              if (envNameInput) {
                envNameInput.disabled = false;
                envNameInput.readOnly = false;
                envNameInput.value = '';
              }
              envGitRepo.value = envGitRepo.value.trim() || 'git://github.com/Noryxlab/NoryxLab-CE.git';
              envGitRef.value = 'main';
              envDockerfile.value = 'Dockerfile';
              envContext.value = '.';
              envDestination.value = '';
              dockerfileOut.textContent = '-';
              dockerfileEditor.value =
                'FROM python:3.12-slim\n' +
                '\n' +
                '# Add your dependencies here\n' +
                'RUN pip install --no-cache-dir numpy pandas\n';
              setDockerfileEditMode(true);
              renderEnvironmentsTable();
              if (envNameInput && envNameInput.focus) envNameInput.focus();
            };
          }
          if (envNameInput) {
            envNameInput.oninput = () => {
              const raw = String(envNameInput.value || '');
              const normalized = raw.toLowerCase().replace(/[^a-z0-9._-]+/g, '-').replace(/^-+|-+$/g, '');
              if (!creatingEnvironment) return;
              const currentDest = String(envDestination.value || '').trim();
              if (currentDest === '' || /^harbor\.lan\/noryx-environments\/[^:]+:0\.1\.0$/i.test(currentDest)) {
                envDestination.value = 'harbor.lan/noryx-environments/' + (normalized || 'custom-env') + ':0.1.0';
              }
            };
          }
          if (envForkLoadBtn) {
            envForkLoadBtn.onclick = async () => {
              try {
                if (!creatingEnvironment) return;
                const sourceID = decodeURIComponent(String((envForkSource && envForkSource.value) || ''));
                if (!sourceID) {
                  dockerfileEditor.value =
                    'FROM python:3.12-slim\n\n# Add your dependencies here\nRUN pip install --no-cache-dir numpy pandas\n';
                  return;
                }
                const env = state.environments.find((e) => String(e.id || '') === sourceID);
                if (!env) return;
                const sourceImage = String(env.destinationImage || '').trim();
                if (!sourceImage) return;
                dockerfileEditor.value = 'FROM ' + sourceImage + '\n';
              } catch (e) {
                pretty(usersOut, e);
                switchTab('ops');
