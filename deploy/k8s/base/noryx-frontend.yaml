            pulseStorageMeta.textContent = String(storage.datasetsMeasured || 0) + '/' + String(storage.datasetsTotal || 0) + ' datasets mesurables';
            platformPulseTime.textContent = overview.sampledAt ? ('Actualise ' + formatDateTime(overview.sampledAt)) : 'Mise a jour en direct';
            renderSparkline('pulseUsersLine', state.platformHistory.users);
