          uploadDatasetObjectBtn.onclick = async () => {
            try {
              const datasetID = (datasetUploadTarget.value || '').trim();
              const objectPath = (datasetUploadPathInput.value || '').trim();
              const file = datasetUploadFileInput.files && datasetUploadFileInput.files[0];
              if (!datasetID || !objectPath || !file) throw { error: 'dataset, object path and file are required' };
              if (keycloak?.authenticated) {
                try { await keycloak.updateToken(30); } catch (_) {}
              }
              const res = await fetch('/api/v1/datasets/' + encodeURIComponent(datasetID) + '/objects/' + encodeURIComponent(objectPath), {
                method: 'PUT',
                headers: {
                  ...authHeader(),
                  'Content-Type': file.type || 'application/octet-stream'
                },
                body: file
              });
              const body = await res.json().catch(() => ({}));
              if (!res.ok) throw body;
              pretty(usersOut, body);
              datasetUploadPathInput.value = '';
              datasetUploadFileInput.value = '';
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

