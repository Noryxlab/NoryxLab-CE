apiVersion: v1
kind: ConfigMap
metadata:
  name: noryx-frontend
  namespace: noryx-ce
  labels:
    app: noryx-frontend
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>NoryxLab CE</title>
        <style>
          :root {
            --bg: #eef2f4;
            --surface: #ffffff;
            --surface-soft: #f4f7f9;
            --line: #dde5eb;
            --line-strong: #bcc8d3;
            --text: #122031;
            --muted: #5e6f83;
            --nav-bg: #0f1f2d;
            --nav-bg-2: #163346;
            --nav-text: #d8e8f4;
            --nav-muted: #97b1c8;
            --brand: #006d77;
            --brand-2: #0f93a0;
            --brand-soft: #d8f0f3;
            --ok: #1f8b4c;
            --warn: #a9690f;
            --bad: #af2c36;
            --shadow-sm: 0 8px 22px rgba(21, 35, 49, .07);
            --shadow-md: 0 18px 44px rgba(11, 25, 36, .12);
            --font: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
          }
          * { box-sizing: border-box; }
          body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: var(--font);
            background:
              radial-gradient(1200px 640px at 16% -18%, #d4e9ee 0%, transparent 72%),
              radial-gradient(1100px 760px at 94% 110%, #f7e8d0 0%, transparent 62%),
              var(--bg);
          }
          .layout {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 304px 1fr;
          }
          .sidebar {
            padding: 24px 18px;
            color: var(--nav-text);
            background: linear-gradient(180deg, var(--nav-bg) 0%, var(--nav-bg-2) 100%);
            border-right: 1px solid #17364b;
            box-shadow: inset -1px 0 0 rgba(255,255,255,.04);
          }
          .brand {
            font-size: 27px;
            font-weight: 800;
            letter-spacing: .03em;
            margin-bottom: 1px;
          }
          .edition {
            font-size: 12px;
            color: var(--nav-muted);
            margin-bottom: 10px;
            letter-spacing: .04em;
            text-transform: uppercase;
          }
          .versions {
            font-size: 11px;
            color: #aec3d7;
            margin-bottom: 12px;
          }
          .who {
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 14px;
            padding: 11px;
            font-size: 13px;
            margin-bottom: 20px;
          }
          .menu-title {
            margin: 14px 0 8px;
            color: var(--nav-muted);
            font-size: 11px;
            letter-spacing: .14em;
            text-transform: uppercase;
          }
          .menu {
            display: grid;
            gap: 8px;
            margin-bottom: 13px;
          }
          .tab-btn {
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 12px;
            padding: 10px 13px;
            background: rgba(255,255,255,.045);
            color: var(--nav-text);
            text-align: left;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .015em;
            transition: transform .12s ease, background .16s ease, border-color .16s ease;
          }
          .tab-btn:hover { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.24); transform: translateY(-1px); }
          .tab-btn.active {
            background: linear-gradient(90deg, #006978 0%, #1491a0 100%);
            border-color: #33a9b6;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.1);
          }
          .sidebar a {
            color: #d5edf4;
            text-decoration: none;
            font-weight: 700;
          }
          .sidebar a:hover { text-decoration: underline; }
          .content {
            padding: 26px;
          }
          .topbar {
            background: var(--surface);
            border: 1px solid #d8e2e8;
            border-radius: 20px;
            padding: 18px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
          }
          .title {
            margin: 0;
            font-size: 24px;
            letter-spacing: .015em;
          }
          .subtitle {
            margin: 5px 0 0;
            color: var(--muted);
            font-size: 14px;
          }
          .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 9px;
          }
          .btn {
            border: 1px solid var(--line-strong);
            background: #f2f6f8;
            color: #102039;
            border-radius: 12px;
            padding: 9px 13px;
            font-weight: 800;
            cursor: pointer;
            transition: transform .12s ease, box-shadow .16s ease, background .16s ease;
          }
          .btn:hover { background: #e7eef2; transform: translateY(-1px); box-shadow: 0 8px 16px rgba(16, 35, 62, .09); }
          .btn.primary {
            background: linear-gradient(90deg, var(--brand) 0%, var(--brand-2) 100%);
            border-color: #1a9fac;
            color: #fff;
          }
          .btn.good {
            background: #e9fbf2;
            color: var(--ok);
            border-color: #b8e9cf;
          }
          .btn.warn {
            background: #fff6e8;
            color: var(--warn);
            border-color: #f6dab0;
          }
          .btn.danger {
            background: #fef0f2;
            color: var(--bad);
            border-color: #f7c8ce;
          }
          .btn:disabled { opacity: .55; cursor: default; }
          .stats {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
          }
          .stat {
            background: var(--surface);
            border: 1px solid #dbe4ea;
            border-radius: 18px;
            padding: 15px;
            box-shadow: var(--shadow-sm);
          }
          .stat .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
          .stat .v { font-size: 24px; font-weight: 900; margin-top: 7px; }
          .views { margin-top: 16px; }
          .view { display: none; }
          .view.active { display: block; }
          .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; }
          .card {
            background: var(--surface);
            border: 1px solid #dbe4ea;
            border-radius: 18px;
            padding: 15px;
            box-shadow: var(--shadow-sm);
          }
          .card h3 {
            margin: 0 0 9px;
            font-size: 14px;
            letter-spacing: .1em;
            text-transform: uppercase;
          }
          .span-8 { grid-column: span 8; }
          .span-7 { grid-column: span 7; }
          .span-6 { grid-column: span 6; }
          .span-5 { grid-column: span 5; }
          .span-4 { grid-column: span 4; }
          .span-12 { grid-column: span 12; }
          .hint {
            margin-bottom: 11px;
            border: 1px solid #b8dfe5;
            background: var(--brand-soft);
            color: #1d5b62;
            border-radius: 12px;
            padding: 10px 11px;
            font-size: 13px;
          }
          .row { display: flex; flex-wrap: wrap; gap: 9px; margin-bottom: 11px; }
          .stack { display: grid; gap: 12px; }
          .hero {
            background: linear-gradient(120deg, #0b4455 0%, #0f6b7b 55%, #1793a2 100%);
            color: #f3fbfd;
            border-radius: 18px;
            padding: 22px;
            box-shadow: var(--shadow-md);
          }
          .hero h2 { margin: 0 0 8px; font-size: 28px; letter-spacing: .01em; }
          .hero p { margin: 0; color: #d2edf2; max-width: 760px; line-height: 1.5; }
          .quick-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
          .quick {
            border: 1px solid #d7e3eb;
            border-radius: 14px;
            background: #fff;
            padding: 14px;
          }
          .quick .q-title { margin: 0 0 5px; font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: #2d425d; }
          .quick .q-text { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.45; }
          input, select {
            border: 1px solid var(--line-strong);
            border-radius: 12px;
            padding: 10px 12px;
            min-width: 170px;
            color: #0f213c;
            background: #fff;
          }
          input:focus, select:focus {
            outline: none;
            border-color: #3ca5b2;
            box-shadow: 0 0 0 3px rgba(16, 138, 150, .15);
          }
          table { width: 100%; border-collapse: collapse; font-size: 13px; }
          th, td {
            text-align: left;
            border-bottom: 1px solid #e6edf2;
            padding: 9px 6px;
            vertical-align: top;
          }
          th { color: #4f6279; font-weight: 800; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; }
          .badge {
            display: inline-block;
            border-radius: 999px;
            padding: 3px 9px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .04em;
            text-transform: uppercase;
          }
          .b-ok { background: #d8fae8; color: #17603f; }
          .b-mid { background: #fff0d7; color: #8f520d; }
          .b-info { background: #ddebff; color: #1b4698; }
          pre {
            margin: 0;
            border: 1px solid #123042;
            background: #0f2534;
            color: #d9edf6;
            border-radius: 12px;
            padding: 11px;
            min-height: 130px;
            overflow: auto;
            font-size: 12px;
          }
          @media (max-width: 1240px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { border-right: none; border-bottom: 1px solid #22455f; }
            .span-8, .span-7, .span-6, .span-5, .span-4 { grid-column: span 12; }
            .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .content { padding: 14px; }
            .quick-grid { grid-template-columns: 1fr; }
          }
          @media (max-width: 720px) {
            .stats { grid-template-columns: 1fr; }
          }
        </style>
        <script src="/auth/js/keycloak.js"></script>
      </head>
      <body>
        <div class="layout">
          <aside class="sidebar">
            <div class="brand">NoryxLab</div>
            <div class="edition" data-i18n="edition">Community Edition</div>
            <div id="versions" class="versions">front: loading | back: loading</div>
            <div id="meta" class="who">Not authenticated</div>

            <div class="menu-title" data-i18n="menu_home">Accueil</div>
            <div class="menu">
              <button class="tab-btn active" data-tab="intro" data-i18n="tab_home">Home</button>
              <button class="tab-btn" data-tab="environments" data-i18n="tab_environments">Environnements</button>
            </div>

            <div class="menu-title" data-i18n="menu_data">Donnees</div>
            <div class="menu">
              <button class="tab-btn" data-tab="data" data-anchor="card-datasets" data-i18n="tab_datasets">Jeux de donnees</button>
              <button class="tab-btn" data-tab="data" data-anchor="card-repositories">Git</button>
              <button class="tab-btn" data-tab="data" data-anchor="card-secrets">Secrets</button>
            </div>

            <div class="menu-title" data-i18n="menu_projects">Projets</div>
            <div class="menu">
              <button class="tab-btn" data-tab="projects" data-i18n="tab_projects_overview">Vue d'ensemble</button>
              <button class="tab-btn" data-tab="workspaces" data-i18n="tab_workspaces">Espaces de travail</button>
              <button class="tab-btn" data-tab="project-jobs" data-i18n="tab_jobs">Traitements</button>
              <button class="tab-btn" data-tab="project-apps">Apps</button>
              <button class="tab-btn" data-tab="project-dashboards">Dashboards</button>
              <button class="tab-btn" data-tab="project-apis" data-i18n="tab_apis">Services API</button>
            </div>

            <div class="menu-title" data-i18n="menu_ops">Pilotage</div>
            <div class="menu">
              <button class="tab-btn admin-only" data-tab="workloads" data-i18n="tab_activity">Activites</button>
              <button class="tab-btn" data-tab="ops" data-i18n="tab_admin">Administration</button>
            </div>

            <div class="menu-title" data-i18n="menu_docs">Documentation</div>
            <div class="menu">
              <a href="/swagger" target="_blank" rel="noopener noreferrer" data-i18n="api_reference">Reference API</a>
            </div>
          </aside>

          <main class="content">
            <section class="topbar">
              <div>
                <h1 class="title" data-i18n="title">NoryxLab</h1>
                <p class="subtitle" data-i18n="subtitle">Plateforme collaborative pour les equipes data, de l'exploration au passage en production.</p>
              </div>
              <div class="actions">
                <select id="langSelect" class="btn" style="font-weight:700;">
                  <option value="fr">FR</option>
                  <option value="en">EN</option>
                </select>
                <button id="login" type="button" class="btn primary" style="position:relative;z-index:20;pointer-events:auto;" data-i18n="login">Se connecter</button>
                <button id="logout" class="btn" data-i18n="logout">Se deconnecter</button>
                <button id="loadModules" class="btn good admin-only" data-i18n="platform_status">Etat plateforme</button>
                <button id="loadUsers" class="btn good admin-only" data-i18n="users">Utilisateurs</button>
              </div>
            </section>

            <section class="stats">
              <article class="stat"><div class="k" data-i18n="stat_projects">Projets</div><div id="statProjects" class="v">0</div></article>
              <article class="stat"><div class="k" data-i18n="stat_activity">Activites</div><div id="statWorkspaces" class="v">0</div></article>
              <article class="stat"><div class="k" data-i18n="stat_env">Environnements</div><div id="statBuilds" class="v">0</div></article>
              <article class="stat"><div class="k" data-i18n="stat_active">Section active</div><div id="statTab" class="v" style="font-size:18px">Home</div></article>
            </section>

            <section class="views">
              <section class="view active" id="view-intro">
                <div class="stack">
                  <article class="hero">
                    <h2 data-i18n="hero_title">Votre hub de collaboration data</h2>
                    <p data-i18n="hero_subtitle">Structurez les projets, partagez les ressources, puis lancez les usages data de votre equipe dans un cadre gouverne.</p>
                  </article>
                  <div class="quick-grid">
                    <article class="quick">
                      <h3 class="q-title" data-i18n="quick1_title">1. Ressources</h3>
                      <p class="q-text" data-i18n="quick1_text">Referencez vos jeux de donnees, depots Git, connexions de donnees et secrets.</p>
                    </article>
                    <article class="quick">
                      <h3 class="q-title" data-i18n="quick2_title">2. Projet</h3>
                      <p class="q-text" data-i18n="quick2_text">Creez un projet, rattachez les ressources et invitez les collaborateurs.</p>
                    </article>
                    <article class="quick">
                      <h3 class="q-title" data-i18n="quick3_title">3. Usages</h3>
                      <p class="q-text" data-i18n="quick3_text">Lancez espaces de travail, traitements, applications, dashboards et APIs.</p>
                    </article>
                  </div>
                  <article class="card span-12">
                    <h3 data-i18n="quickstart">Demarrage rapide</h3>
                    <div class="row">
                      <button class="btn primary" data-tab-jump="projects" data-i18n="go_projects">Aller aux projets</button>
                      <button class="btn" data-tab-jump="data" data-i18n="go_data">Aller aux donnees</button>
                      <button class="btn" data-tab-jump="environments" data-i18n="go_env">Aller aux environnements</button>
                    </div>
                  </article>
                </div>
              </section>
              <section class="view" id="view-projects">
                <div class="grid">
                  <article class="card span-8">
                    <h3>Projects</h3>
                    <div class="hint">Premier login: un projet est créé automatiquement pour démarrer vite.</div>
                    <div class="row">
                      <select id="projectSelect"></select>
                      <input id="projectName" placeholder="New project name" />
                      <button id="createProject" class="btn primary">Create Project</button>
                      <button id="loadProjects" class="btn">Refresh Projects</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>ID</th><th>Actions</th></tr></thead>
                      <tbody id="projectRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-4">
                    <h3>Project Context</h3>
                    <div class="hint">Le projet sélectionné sert de scope pour Workspaces, Builds et Workloads.</div>
                    <pre id="projectOut">-</pre>
                  </article>
                  <article class="card span-6">
                    <h3>Project Datasets</h3>
                    <div class="hint">Attach one or more datasets to the selected project.</div>
                    <div class="row">
                      <select id="attachDatasetSelect"></select>
                      <button id="attachDatasetBtn" class="btn primary">Attach Dataset</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>Bucket</th><th>Prefix</th><th>Actions</th></tr></thead>
                      <tbody id="projectDatasetRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-6">
                    <h3>Project Repositories</h3>
                    <div class="hint">Attach one or more Git repositories to the selected project.</div>
                    <div class="row">
                      <select id="attachRepoSelect"></select>
                      <button id="attachRepoBtn" class="btn primary">Attach Repository</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>URL</th><th>Secret</th><th>Actions</th></tr></thead>
                      <tbody id="projectRepoRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-6">
                    <h3>Project Datasources</h3>
                    <div class="hint">Attach one or more datasources to the selected project.</div>
                    <div class="row">
                      <select id="attachDatasourceSelect"></select>
                      <button id="attachDatasourceBtn" class="btn primary">Attach Datasource</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>Type</th><th>Host</th><th>Actions</th></tr></thead>
                      <tbody id="projectDatasourceRows"></tbody>
                    </table>
                  </article>
                </div>
              </section>

              <section class="view" id="view-data">
                <div class="grid">
                  <article id="card-secrets" class="card span-6">
                    <h3>Secrets</h3>
                    <div class="hint">Secrets utilisateur (tokens, passwords, API keys). Expiration optionnelle.</div>
                    <div class="row">
                      <input id="secretName" placeholder="Secret name" />
                      <input id="secretExpiresAt" type="date" />
                    </div>
                    <div class="row">
                      <input id="secretValue" placeholder="Secret value" />
                      <button id="saveSecret" class="btn primary">Save Secret</button>
                    </div>
                    <pre id="secretOut">-</pre>
                    <table>
                      <thead><tr><th>Name</th><th>Expires</th><th>Updated</th><th>Actions</th></tr></thead>
                      <tbody id="secretRows"></tbody>
                    </table>
                  </article>

                  <article id="card-datasets" class="card span-6">
                    <h3>Datasets</h3>
                    <div class="hint">Catalog datasets + optional object upload to MinIO. Prefix = subpath in bucket (e.g. raw/2026).</div>
                    <div class="row">
                      <input id="datasetName" placeholder="Dataset name" />
                      <input id="datasetDescription" placeholder="Description (optional)" />
                    </div>
                    <div class="row">
                      <button id="createDataset" class="btn primary">Create Dataset</button>
                      <button id="refreshData" class="btn">Refresh Data</button>
                    </div>
                    <div class="row">
                      <select id="datasetUploadTarget"></select>
                      <input id="datasetUploadPath" placeholder="Object path inside prefix (e.g. train.csv)" />
                    </div>
                    <div class="row">
                      <input id="datasetUploadFile" type="file" />
                      <button id="uploadDatasetObject" class="btn">Upload Object</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>Bucket</th><th>Prefix</th><th>Actions</th></tr></thead>
                      <tbody id="datasetRows"></tbody>
                    </table>
                  </article>

                  <article id="card-repositories" class="card span-6">
                    <h3>Repositories</h3>
                    <div class="hint">Catalog only: name + URL + optional auth secret, with validation on save.</div>
                    <div class="row">
                      <input id="repoName" placeholder="Repository name" />
                      <input id="repoUrl" placeholder="https://..." />
                    </div>
                    <div class="row">
                      <select id="repoSecretRef"></select>
                    </div>
                    <div class="row">
                      <button id="createRepository" class="btn primary">Create Repository</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>URL</th><th>Secret</th><th>Connection</th><th>Actions</th></tr></thead>
                      <tbody id="repoRows"></tbody>
                    </table>
                  </article>

                  <article id="card-datasources" class="card span-6">
                    <h3>Datasources</h3>
                    <div class="hint">External DB connections (V1: postgres).</div>
                    <div class="row">
                      <input id="dsName" placeholder="Datasource name" />
                      <input id="dsHost" placeholder="Host" />
                    </div>
                    <div class="row">
                      <input id="dsPort" value="5432" placeholder="Port" />
                      <input id="dsDatabase" placeholder="Database" />
                    </div>
                    <div class="row">
                      <input id="dsUsername" placeholder="Username" />
                      <select id="dsPasswordSecret"></select>
                    </div>
                    <div class="row">
                      <select id="dsSSLMode">
                        <option value="disable">disable</option>
                        <option value="require">require</option>
                        <option value="verify-ca">verify-ca</option>
                        <option value="verify-full">verify-full</option>
                      </select>
                      <button id="createDatasource" class="btn primary">Create Datasource</button>
                      <button id="refreshDatasources" class="btn">Refresh Datasources</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>Type</th><th>Target</th><th>Validation</th><th>Actions</th></tr></thead>
                      <tbody id="datasourceRows"></tbody>
                    </table>
                  </article>

                </div>
              </section>

              <section class="view" id="view-workspaces">
                <div class="grid">
                  <article class="card span-7">
                    <h3>Workspace Launcher</h3>
                    <div class="hint">IDE: Jupyter or VSCode, fixed profile: 500m CPU / 512Mi RAM. Storage default: 10Gi.</div>
                    <div class="row">
                      <select id="workspaceIde">
                        <option value="jupyter">jupyter</option>
                        <option value="vscode">vscode</option>
                      </select>
                      <input id="workspaceName" placeholder="Workspace name (optional)" />
                      <input id="workspaceStorageSize" placeholder="Storage size (optional, e.g. 10Gi)" value="10Gi" />
                      <button id="createWorkspace" class="btn primary">Launch Workspace</button>
                      <button id="loadWorkspaces" class="btn">Refresh Workspaces</button>
                    </div>
                    <table>
                      <thead>
                        <tr><th>Name</th><th>IDE</th><th>Pod</th><th>Volume</th><th>Status</th><th>Access</th><th>Actions</th></tr>
                      </thead>
                      <tbody id="workspaceRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-5">
                    <h3>Selected Project Workspaces</h3>
                    <div class="hint">Vue filtrée par projet actif.</div>
                    <pre id="workspaceOut">-</pre>
                  </article>
                </div>
              </section>

              <section class="view" id="view-environments">
                <div class="grid">
