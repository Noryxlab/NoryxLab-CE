                ((state.datasetCanManageAccess && access.role !== 'owner') ? '<button type="button" class="btn danger" data-del-dataset-access="' + encodeURIComponent(subjectType) + '" data-dataset-access-subject="' + encodeURIComponent(subjectID) + '">Retirer</button>' : '-') + '</td>';
