apiVersion: v1
kind: ConfigMap
metadata:
  name: noryx-frontend
  namespace: noryx-ce
  labels:
    app: noryx-frontend
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>NoryxLab CE</title>
        <style>
          :root {
            --bg: #eef2f7;
            --surface: #ffffff;
            --surface-soft: #f7f9fc;
            --line: #d7dee9;
            --line-strong: #b7c2d4;
            --text: #142033;
            --muted: #5f6f86;
            --nav-bg: #0a1526;
            --nav-bg-2: #13263f;
            --nav-text: #dce8fa;
            --nav-muted: #96a9c8;
            --brand: #0a6ae8;
            --brand-soft: #deebff;
            --ok: #0f7a4d;
            --warn: #9a5a0f;
            --bad: #ad1f2d;
            --font: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
          }
          * { box-sizing: border-box; }
          body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: var(--font);
            background:
              radial-gradient(1100px 600px at 20% -10%, #dfeaff 0%, transparent 70%),
              radial-gradient(1000px 700px at 90% 120%, #e9f5ec 0%, transparent 60%),
              var(--bg);
          }
          .layout {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr;
          }
          .sidebar {
            padding: 24px 18px;
            color: var(--nav-text);
            background: linear-gradient(180deg, var(--nav-bg) 0%, var(--nav-bg-2) 100%);
            border-right: 1px solid #0f2037;
          }
          .brand {
            font-size: 25px;
            font-weight: 800;
            letter-spacing: .02em;
            margin-bottom: 2px;
          }
          .edition {
            font-size: 12px;
            color: var(--nav-muted);
            margin-bottom: 8px;
          }
          .versions {
            font-size: 11px;
            color: #b4c4df;
            margin-bottom: 14px;
          }
          .who {
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.14);
            border-radius: 12px;
            padding: 10px;
            font-size: 13px;
            margin-bottom: 18px;
          }
          .menu-title {
            margin: 12px 0 7px;
            color: var(--nav-muted);
            font-size: 11px;
            letter-spacing: .1em;
            text-transform: uppercase;
          }
          .menu {
            display: grid;
            gap: 7px;
            margin-bottom: 12px;
          }
          .tab-btn {
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 10px;
            padding: 9px 10px;
            background: rgba(255,255,255,.04);
            color: var(--nav-text);
            text-align: left;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
          }
          .tab-btn:hover { background: rgba(255,255,255,.1); }
          .tab-btn.active {
            background: linear-gradient(90deg, #14468f 0%, #1a6bda 100%);
            border-color: #2a77de;
          }
          .sidebar a {
            color: #c9defb;
            text-decoration: none;
            font-weight: 700;
          }
          .content {
            padding: 18px;
          }
          .topbar {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 18px rgba(18, 34, 57, .05);
          }
          .title {
            margin: 0;
            font-size: 23px;
            letter-spacing: .01em;
          }
          .subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 14px;
          }
          .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
          }
          .btn {
            border: 1px solid var(--line-strong);
            background: #f4f7fb;
            color: #102039;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 800;
            cursor: pointer;
          }
          .btn:hover { background: #e8eef8; }
          .btn.primary {
            background: var(--brand);
            border-color: var(--brand);
            color: #fff;
          }
          .btn.good {
            background: #e9fbf2;
            color: var(--ok);
            border-color: #b8e9cf;
          }
          .btn.warn {
            background: #fff6e8;
            color: var(--warn);
            border-color: #f6dab0;
          }
          .btn.danger {
            background: #fef0f2;
            color: var(--bad);
            border-color: #f7c8ce;
          }
          .btn:disabled { opacity: .55; cursor: default; }
          .stats {
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
          }
          .stat {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px;
          }
          .stat .k { font-size: 12px; color: var(--muted); }
          .stat .v { font-size: 22px; font-weight: 900; margin-top: 6px; }
          .views { margin-top: 12px; }
          .view { display: none; }
          .view.active { display: block; }
          .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px; }
          .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px;
          }
          .card h3 {
            margin: 0 0 8px;
            font-size: 15px;
            letter-spacing: .02em;
          }
          .span-8 { grid-column: span 8; }
          .span-7 { grid-column: span 7; }
          .span-6 { grid-column: span 6; }
          .span-5 { grid-column: span 5; }
          .span-4 { grid-column: span 4; }
          .span-12 { grid-column: span 12; }
          .hint {
            margin-bottom: 10px;
            border: 1px solid #bdd8ff;
            background: var(--brand-soft);
            color: #19428c;
            border-radius: 10px;
            padding: 9px 10px;
            font-size: 13px;
          }
          .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 9px; }
          input, select {
            border: 1px solid var(--line-strong);
            border-radius: 10px;
            padding: 9px 10px;
            min-width: 170px;
            color: #0f213c;
            background: #fff;
          }
          table { width: 100%; border-collapse: collapse; font-size: 13px; }
          th, td {
            text-align: left;
            border-bottom: 1px solid #e8edf4;
            padding: 8px 6px;
            vertical-align: top;
          }
          th { color: #4a5d78; font-weight: 800; }
          .badge {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 800;
          }
          .b-ok { background: #d8fae8; color: #17603f; }
          .b-mid { background: #fff0d7; color: #8f520d; }
          .b-info { background: #ddebff; color: #1b4698; }
          pre {
            margin: 0;
            border: 1px solid #132541;
            background: #0e1a2d;
            color: #d4e5ff;
            border-radius: 10px;
            padding: 10px;
            min-height: 130px;
            overflow: auto;
            font-size: 12px;
          }
          @media (max-width: 1240px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { border-right: none; border-bottom: 1px solid #203657; }
            .span-8, .span-7, .span-6, .span-5, .span-4 { grid-column: span 12; }
            .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
          }
          @media (max-width: 720px) {
            .stats { grid-template-columns: 1fr; }
          }
        </style>
        <script src="/auth/js/keycloak.js"></script>
      </head>
      <body>
        <div class="layout">
          <aside class="sidebar">
            <div class="brand">NoryxLab</div>
            <div class="edition">Community Edition Console</div>
            <div id="versions" class="versions">front: loading | back: loading</div>
            <div id="meta" class="who">Not authenticated</div>

            <div class="menu-title">Navigation</div>
            <div class="menu">
              <button class="tab-btn active" data-tab="environments">Environments</button>
            </div>

            <div class="menu-title">Data</div>
            <div class="menu">
              <button class="tab-btn" data-tab="data" data-anchor="card-datasets">Datasets</button>
              <button class="tab-btn" data-tab="data" data-anchor="card-repositories">Git</button>
              <button class="tab-btn" data-tab="data" data-anchor="card-secrets">Secrets</button>
            </div>

            <div class="menu-title">Projects</div>
            <div class="menu">
              <button class="tab-btn" data-tab="projects">Overview</button>
              <button class="tab-btn" data-tab="workspaces">Workspaces</button>
              <button class="tab-btn" data-tab="project-jobs">Jobs</button>
              <button class="tab-btn" data-tab="project-apps">Apps</button>
              <button class="tab-btn" data-tab="project-apis">APIs</button>
            </div>

            <div class="menu-title">Ops</div>
            <div class="menu">
              <button class="tab-btn admin-only" data-tab="workloads">Workloads</button>
              <button class="tab-btn" data-tab="ops">Admin</button>
            </div>

            <div class="menu-title">Platform</div>
            <div class="menu">
              <a href="/swagger" target="_blank" rel="noopener noreferrer">OpenAPI Swagger</a>
            </div>
          </aside>

          <main class="content">
            <section class="topbar">
              <div>
                <h1 class="title">NoryxLab Datalab Workspace Hub</h1>
                <p class="subtitle">Projects own workloads. Environments are reusable build artifacts.</p>
              </div>
              <div class="actions">
                <button id="login" class="btn primary">Login Keycloak</button>
                <button id="logout" class="btn">Logout</button>
                <button id="loadModules" class="btn good admin-only">Modules</button>
                <button id="loadUsers" class="btn good admin-only">Users</button>
              </div>
            </section>

            <section class="stats">
              <article class="stat"><div class="k">Projects</div><div id="statProjects" class="v">0</div></article>
              <article class="stat"><div class="k">Workspaces</div><div id="statWorkspaces" class="v">0</div></article>
              <article class="stat"><div class="k">Builds</div><div id="statBuilds" class="v">0</div></article>
              <article class="stat"><div class="k">Active Tab</div><div id="statTab" class="v" style="font-size:18px">Environments</div></article>
            </section>

            <section class="views">
              <section class="view" id="view-projects">
                <div class="grid">
                  <article class="card span-8">
                    <h3>Projects</h3>
                    <div class="hint">Premier login: un projet est créé automatiquement pour démarrer vite.</div>
                    <div class="row">
                      <select id="projectSelect"></select>
                      <input id="projectName" placeholder="New project name" />
                      <button id="createProject" class="btn primary">Create Project</button>
                      <button id="loadProjects" class="btn">Refresh Projects</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>ID</th><th>Actions</th></tr></thead>
                      <tbody id="projectRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-4">
                    <h3>Project Context</h3>
                    <div class="hint">Le projet sélectionné sert de scope pour Workspaces, Builds et Workloads.</div>
                    <pre id="projectOut">-</pre>
                  </article>
                  <article class="card span-6">
                    <h3>Project Datasets</h3>
                    <div class="hint">Attach one or more datasets to the selected project.</div>
                    <div class="row">
                      <select id="attachDatasetSelect"></select>
                      <button id="attachDatasetBtn" class="btn primary">Attach Dataset</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>Bucket</th><th>Prefix</th><th>Actions</th></tr></thead>
                      <tbody id="projectDatasetRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-6">
                    <h3>Project Repositories</h3>
                    <div class="hint">Attach one or more Git repositories to the selected project.</div>
                    <div class="row">
                      <select id="attachRepoSelect"></select>
                      <button id="attachRepoBtn" class="btn primary">Attach Repository</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>URL</th><th>Secret</th><th>Actions</th></tr></thead>
                      <tbody id="projectRepoRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-6">
                    <h3>Project Datasources</h3>
                    <div class="hint">Attach one or more datasources to the selected project.</div>
                    <div class="row">
                      <select id="attachDatasourceSelect"></select>
                      <button id="attachDatasourceBtn" class="btn primary">Attach Datasource</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>Type</th><th>Host</th><th>Actions</th></tr></thead>
                      <tbody id="projectDatasourceRows"></tbody>
                    </table>
                  </article>
                </div>
              </section>

              <section class="view" id="view-data">
                <div class="grid">
                  <article id="card-secrets" class="card span-6">
                    <h3>Secrets</h3>
                    <div class="hint">Secrets utilisateur (tokens, passwords, API keys). Expiration optionnelle.</div>
                    <div class="row">
                      <input id="secretName" placeholder="Secret name" />
                      <input id="secretExpiresAt" type="date" />
                    </div>
                    <div class="row">
                      <input id="secretValue" placeholder="Secret value" />
                      <button id="saveSecret" class="btn primary">Save Secret</button>
                    </div>
                    <pre id="secretOut">-</pre>
                    <table>
                      <thead><tr><th>Name</th><th>Expires</th><th>Updated</th><th>Actions</th></tr></thead>
                      <tbody id="secretRows"></tbody>
                    </table>
                  </article>

                  <article id="card-datasets" class="card span-6">
                    <h3>Datasets</h3>
                    <div class="hint">Catalog datasets + optional object upload to MinIO. Prefix = subpath in bucket (e.g. raw/2026).</div>
                    <div class="row">
                      <input id="datasetName" placeholder="Dataset name" />
                      <input id="datasetDescription" placeholder="Description (optional)" />
                    </div>
                    <div class="row">
                      <button id="createDataset" class="btn primary">Create Dataset</button>
                      <button id="refreshData" class="btn">Refresh Data</button>
                    </div>
                    <div class="row">
                      <select id="datasetUploadTarget"></select>
                      <input id="datasetUploadPath" placeholder="Object path inside prefix (e.g. train.csv)" />
                    </div>
                    <div class="row">
                      <input id="datasetUploadFile" type="file" />
                      <button id="uploadDatasetObject" class="btn">Upload Object</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>Bucket</th><th>Prefix</th><th>Actions</th></tr></thead>
                      <tbody id="datasetRows"></tbody>
                    </table>
                  </article>

                  <article id="card-repositories" class="card span-6">
                    <h3>Repositories</h3>
                    <div class="hint">Catalog only: name + URL + optional auth secret, with validation on save.</div>
                    <div class="row">
                      <input id="repoName" placeholder="Repository name" />
                      <input id="repoUrl" placeholder="https://..." />
                    </div>
                    <div class="row">
                      <select id="repoSecretRef"></select>
                    </div>
                    <div class="row">
                      <button id="createRepository" class="btn primary">Create Repository</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>URL</th><th>Secret</th><th>Connection</th><th>Actions</th></tr></thead>
                      <tbody id="repoRows"></tbody>
                    </table>
                  </article>

                  <article id="card-datasources" class="card span-6">
                    <h3>Datasources</h3>
                    <div class="hint">External DB connections (V1: postgres).</div>
                    <div class="row">
                      <input id="dsName" placeholder="Datasource name" />
                      <input id="dsHost" placeholder="Host" />
                    </div>
                    <div class="row">
                      <input id="dsPort" value="5432" placeholder="Port" />
                      <input id="dsDatabase" placeholder="Database" />
                    </div>
                    <div class="row">
                      <input id="dsUsername" placeholder="Username" />
                      <select id="dsPasswordSecret"></select>
                    </div>
                    <div class="row">
                      <select id="dsSSLMode">
                        <option value="disable">disable</option>
                        <option value="require">require</option>
                        <option value="verify-ca">verify-ca</option>
                        <option value="verify-full">verify-full</option>
                      </select>
                      <button id="createDatasource" class="btn primary">Create Datasource</button>
                      <button id="refreshDatasources" class="btn">Refresh Datasources</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>Type</th><th>Target</th><th>Validation</th><th>Actions</th></tr></thead>
                      <tbody id="datasourceRows"></tbody>
                    </table>
                  </article>

                </div>
              </section>

              <section class="view" id="view-workspaces">
                <div class="grid">
                  <article class="card span-7">
                    <h3>Workspace Launcher</h3>
                    <div class="hint">IDE: Jupyter or VSCode, fixed profile: 500m CPU / 512Mi RAM. Storage default: 10Gi.</div>
                    <div class="row">
                      <select id="workspaceIde">
                        <option value="jupyter">jupyter</option>
                        <option value="vscode">vscode</option>
                      </select>
                      <input id="workspaceName" placeholder="Workspace name (optional)" />
                      <input id="workspaceStorageSize" placeholder="Storage size (optional, e.g. 10Gi)" value="10Gi" />
                      <button id="createWorkspace" class="btn primary">Launch Workspace</button>
                      <button id="loadWorkspaces" class="btn">Refresh Workspaces</button>
                    </div>
                    <table>
                      <thead>
                        <tr><th>Name</th><th>IDE</th><th>Pod</th><th>Volume</th><th>Status</th><th>Access</th><th>Actions</th></tr>
                      </thead>
                      <tbody id="workspaceRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-5">
                    <h3>Selected Project Workspaces</h3>
                    <div class="hint">Vue filtrée par projet actif.</div>
                    <pre id="workspaceOut">-</pre>
                  </article>
                </div>
              </section>

              <section class="view active" id="view-environments">
                <div class="grid">
                  <article class="card span-7">
                    <h3>Environment Catalog</h3>
                    <div class="hint">Builds Kaniko vers Harbor pour images réutilisables.</div>
                    <div class="row">
                      <input id="envGitRepo" value="git://github.com/Noryxlab/NoryxLab-CE.git" />
                      <input id="envGitRef" value="main" />
                    </div>
                    <div class="row">
                      <input id="envDockerfile" value="environments/noryx-python/Dockerfile" />
                      <input id="envContext" value="." />
                    </div>
                    <div class="row">
                      <input id="envDestination" value="harbor.lan/noryx-environments/noryx-python:0.2.2" />
                      <button id="buildEnv" class="btn warn">Build Environment</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>Image</th><th>Latest</th><th>Revisions</th><th>Actions</th></tr></thead>
                      <tbody id="environmentRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-5">
                    <h3>Environment Detail</h3>
                    <div class="hint">Révisions et Dockerfile du build sélectionné.</div>
                    <pre id="buildOut">-</pre>
                    <h3>Dockerfile</h3>
                    <pre id="dockerfileOut">-</pre>
                  </article>
                </div>
              </section>

              <section class="view" id="view-project-jobs">
                <div class="grid">
                  <article class="card span-8">
                    <h3>Project Jobs</h3>
                    <div class="hint">Run one-shot jobs in selected project with selected environment image.</div>
                    <div class="row">
                      <input id="jobName" placeholder="job name (optional)" />
                      <select id="jobEnv"></select>
                    </div>
                    <div class="row">
                      <input id="jobCommand" value="python -V" placeholder="shell command" />
                      <button id="createJob" class="btn warn">Launch Job</button>
                      <button id="loadJobs" class="btn">Refresh</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>Pod/Job</th><th>Image</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
                      <tbody id="jobRows"></tbody>
                    </table>
                    <h3>Job Logs</h3>
                    <pre id="jobLogsOut">-</pre>
                  </article>
                </div>
              </section>

              <section class="view" id="view-project-apps">
                <div class="grid">
                  <article class="card span-8">
                    <h3>Project Apps</h3>
                    <div class="hint">Deploy long-running apps with custom URL slug. Access is authenticated via Keycloak session.</div>
                    <div class="row">
                      <input id="appName" placeholder="app name (optional)" />
                      <input id="appSlug" placeholder="url slug (example: fraud-ui)" />
                    </div>
                    <div class="row">
                      <select id="appEnv"></select>
                      <input id="appPort" value="9000" placeholder="port (default 9000)" />
                    </div>
                    <div class="row">
                      <input id="appCommand" value="python3 -m http.server 9000 --bind 0.0.0.0 --directory /mnt" placeholder="launch command" />
                      <button id="createApp" class="btn warn">Launch App</button>
                      <button id="loadApps" class="btn">Refresh</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>Slug</th><th>Pod</th><th>Status</th><th>Access</th><th>Actions</th></tr></thead>
                      <tbody id="appRows"></tbody>
                    </table>
                  </article>
                </div>
              </section>

              <section class="view" id="view-project-apis">
                <div class="grid">
                  <article class="card span-8">
                    <h3>Project APIs</h3>
                    <div class="hint">Coming soon. APIs will be managed workloads with environment + route.</div>
                    <pre>Planned V1: API deploy, route, version and lifecycle controls.</pre>
                  </article>
                </div>
              </section>

              <section class="view" id="view-workloads">
                <div class="grid">
                  <article class="card span-8">
                    <h3>Workloads</h3>
                    <div class="hint">Agrégation des workspaces actifs et jobs de build récents.</div>
                    <table>
                      <thead><tr><th>Type</th><th>Name</th><th>Status</th></tr></thead>
                      <tbody id="workloadRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-4">
                    <h3>Policy Baseline</h3>
                    <div class="hint">request=limit pour des workloads prévisibles.</div>
                    <pre>Workspace profile | CPU: 500m | Memory: 512Mi | Storage: PVC (longhorn) | Namespace runtime: noryx-loads</pre>
                  </article>
                </div>
              </section>

              <section class="view" id="view-ops">
                <div class="grid">
                  <article class="card span-6">
                    <h3>Modules</h3>
                    <pre id="modulesOut">-</pre>
                  </article>
                  <article class="card span-6">
                    <h3>Users</h3>
                    <pre id="usersOut">-</pre>
                  </article>
                </div>
              </section>
            </section>
          </main>
        </div>

        <script>
          const keycloak = new Keycloak({
            url: window.location.origin + '/auth',
            realm: 'noryx',
            clientId: 'noryx-api'
          });

          const meta = document.getElementById('meta');
          const usersOut = document.getElementById('usersOut');
          const modulesOut = document.getElementById('modulesOut');
          const projectOut = document.getElementById('projectOut');
          const workspaceOut = document.getElementById('workspaceOut');
          const buildOut = document.getElementById('buildOut');
          const dockerfileOut = document.getElementById('dockerfileOut');
          const secretOut = document.getElementById('secretOut');

