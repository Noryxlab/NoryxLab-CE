              const payload = {
                name: secretNameInput.value.trim(),
                value: secretValueInput.value.trim()
              };
              const expiresAt = dateToRFC3339EndOfDay(secretExpiresAtInput.value);
              if (expiresAt) payload.expiresAt = expiresAt;
