          const savedLang = (() => { try { return String(localStorage.getItem('noryx.ui.lang') || '').trim(); } catch (_) { return ''; } })();
          let currentLang = (savedLang === 'fr' || savedLang === 'en')
            ? savedLang
            : ((navigator.language || 'en').toLowerCase().startsWith('fr') ? 'fr' : 'en');
          if (langSelect) langSelect.value = currentLang;
          function t(key) {
            return (LOCALES[currentLang] && LOCALES[currentLang][key]) || LOCALES.en[key] || key;
          }
          function tui(key) {
            return (UI_TEXT[currentLang] && UI_TEXT[currentLang][key]) || UI_TEXT.en[key] || key;
          }
          function applyI18n() {
            document.querySelectorAll('[data-i18n]').forEach((node) => {
              const key = node.getAttribute('data-i18n');
              if (!key) return;
              node.textContent = tui(key);
            });
            const txtById = {
              createProject: 'btn_create_project',
              loadProjects: 'btn_refresh_projects',
              attachDatasetBtn: 'btn_attach_dataset',
              attachRepoBtn: 'btn_attach_repo',
              attachDatasourceBtn: 'btn_attach_datasource',
              saveSecret: 'btn_save_secret',
              createDataset: 'btn_create_dataset',
              refreshData: 'btn_refresh_data',
              uploadDatasetObject: 'btn_upload_object',
              createRepository: 'btn_create_repo',
              createDatasource: 'btn_create_datasource',
              refreshDatasources: 'btn_refresh_datasources',
              createWorkspace: 'btn_launch_workspace',
              loadWorkspaces: 'btn_refresh_workspaces',
              loadJobs: 'btn_refresh_jobs',
              loadApps: 'btn_refresh_apps',
              loadDashboards: 'btn_refresh_dashboards'
            };
            Object.keys(txtById).forEach((id) => {
              const node = document.getElementById(id);
              if (node) node.textContent = tui(txtById[id]);
            });
            const placeholders = {
              projectName: 'ph_project_name',
              secretName: 'ph_secret_name',
              secretValue: 'ph_secret_value',
              datasetName: 'ph_dataset_name',
              datasetDescription: 'ph_dataset_description',
              datasetUploadPath: 'ph_dataset_path',
              repoName: 'ph_repo_name',
              repoUrl: 'ph_repo_url',
              dsName: 'ph_ds_name',
              dsHost: 'ph_ds_host',
              dsPort: 'ph_ds_port',
              dsDatabase: 'ph_ds_db',
              dsUsername: 'ph_ds_user',
              workspaceName: 'ph_workspace_name',
              workspaceStorageSize: 'ph_workspace_size',
              jobName: 'ph_job_name',
              jobCommand: 'ph_job_cmd',
              appName: 'ph_app_name',
              appSlug: 'ph_app_slug',
              appPort: 'ph_app_port',
              appCommand: 'ph_app_cmd',
              dashboardName: 'ph_dash_name',
              dashboardSlug: 'ph_dash_slug',
              dashboardPort: 'ph_dash_port',
              dashboardCommand: 'ph_dash_cmd'
            };
            Object.keys(placeholders).forEach((id) => {
              const node = document.getElementById(id);
              if (node) node.setAttribute('placeholder', tui(placeholders[id]));
            });
          }
          if (langSelect) {
            langSelect.onchange = async () => {
              const next = (langSelect.value === 'en') ? 'en' : 'fr';
              currentLang = next;
              try { localStorage.setItem('noryx.ui.lang', currentLang); } catch (_) {}
              try {
                await callJSON('/api/v1/user/preferences', {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ language: currentLang })
                });
              } catch (_) {}
              applyI18n();
              refreshIdentityMeta();
            };
          }
          if (themeSelect) {
            themeSelect.onchange = async () => {
              const next = applyTheme(themeSelect.value);
              currentTheme = next;
              try {
                await callJSON('/api/v1/user/preferences', {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ theme: currentTheme })
                });
              } catch (_) {}
            };
          }
          let workspacesAutoRefreshTimer = null;
          let platformPulseTimer = null;
          let adminAccessGranted = false;
          let identityDisplayMode = 'signed-out';
          function setMeta(text) { if (meta) meta.textContent = text; }
          function pretty(node, data) { node.textContent = JSON.stringify(data, null, 2); }
          function authHeader() {
            if (authMode === 'oidc' && (keycloak && keycloak.token)) {
              return { Authorization: 'Bearer ' + keycloak.token };
            }
            return { 'X-Noryx-User': currentLabUser() };
          }
          function selectedProjectId() { return projectSelect.value || ''; }
          function selectedProject() {
            const projectID = selectedProjectId();
            return state.projects.find((project) => project.id === projectID) || null;
          }
          function activeProjectStorageKey() {
            const claims = (keycloak && keycloak.tokenParsed) || {};
            const identity = String(claims.sub || claims.preferred_username || claims.email || currentLabUser() || 'anonymous').trim();
            return 'noryx.activeProject.' + identity;
          }
          function savedActiveProjectId() {
            try { return String(localStorage.getItem(activeProjectStorageKey()) || '').trim(); } catch (_) { return ''; }
          }
          function saveActiveProjectId(projectID) {
            try {
              const value = String(projectID || '').trim();
              if (value) localStorage.setItem(activeProjectStorageKey(), value);
              else localStorage.removeItem(activeProjectStorageKey());
            } catch (_) {}
          }
          function projectName(projectID) {
            const project = state.projects.find((item) => item.id === projectID);
            return project ? (project.name || 'Projet') : 'Projet';
          }
          function ensureArray(v) { return Array.isArray(v) ? v : []; }
          function dateToRFC3339EndOfDay(dateValue) {
            const d = String(dateValue || '').trim();
            if (!d) return '';
            return d + 'T23:59:59Z';
          }

          async function copyText(value) {
            const text = String(value || '');
            if (!text) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(text);
              return;
            }
            const area = document.createElement('textarea');
            area.value = text;
            area.style.position = 'fixed';
            area.style.top = '-1000px';
            document.body.appendChild(area);
            area.focus();
            area.select();
            document.execCommand('copy');
            document.body.removeChild(area);
          }

          function setButtons(enabled) {
            logoutBtn.disabled = !enabled;
            loadProjectsBtn.disabled = !enabled;
            createProjectBtn.disabled = !enabled;
            loadWorkspacesBtn.disabled = !enabled;
            createWorkspaceBtn.disabled = !enabled;
            createJobBtn.disabled = !enabled;
            loadJobsBtn.disabled = !enabled;
            createAppBtn.disabled = !enabled;
            loadAppsBtn.disabled = !enabled;
            buildEnvBtn.disabled = !enabled;
            saveSecretBtn.disabled = !enabled;
            createDatasetBtn.disabled = !enabled;
            refreshDataBtn.disabled = !enabled;
            uploadDatasetObjectBtn.disabled = !enabled;
            createRepositoryBtn.disabled = !enabled;
            attachDatasetBtn.disabled = !enabled;
            attachRepoBtn.disabled = !enabled;
            createDatasourceBtn.disabled = !enabled;
            refreshDatasourcesBtn.disabled = !enabled;
            attachDatasourceBtn.disabled = !enabled;
          }

          function syncAuthButtons(authenticated) {
            if (!loginBtn || !logoutBtn) return;
            if (authenticated) {
              loginBtn.style.display = 'none';
              logoutBtn.style.display = '';
            } else {
              loginBtn.style.display = '';
              logoutBtn.style.display = 'none';
            }
          }

          function isAdminUser() {
            if (adminAccessGranted || authMode === 'lab') return true;
            const realmRoles = ensureArray((keycloak && keycloak.tokenParsed && keycloak.tokenParsed.realm_access && keycloak.tokenParsed.realm_access.roles));
            const clientRoles = ensureArray((keycloak && keycloak.tokenParsed && keycloak.tokenParsed.resource_access && keycloak.tokenParsed.resource_access['noryx-api'] && keycloak.tokenParsed.resource_access['noryx-api'].roles));
            const roles = new Set([...realmRoles, ...clientRoles].map((r) => String(r || '').toLowerCase()));
            return roles.has('noryx-admin') || roles.has('admin') || roles.has('platform_admin');
          }

          function identityName() {
            const claims = (keycloak && keycloak.tokenParsed) || {};
            const givenName = String(claims.given_name || '').trim();
            if (givenName) return givenName;
            const fullName = String(claims.name || '').trim();
            if (fullName) return fullName.split(/\s+/)[0];
            return String(claims.preferred_username || claims.email || claims.sub || '').trim();
          }

          function refreshIdentityMeta() {
            const role = isAdminUser() ? tui('role_admin') : tui('role_user');
            if (identityDisplayMode === 'oidc') {
              const organizations = ensureArray(state.currentOrganizations);
              const organization = organizations[0] ? String(organizations[0].name || organizations[0].alias || '').trim() : '';
              const organizationLabel = organization ? (', ' + organization + (organizations.length > 1 ? ' +' + String(organizations.length - 1) : '')) : '';
              setMeta((identityName() || tui('role_user')) + organizationLabel + ' (' + role + ')');
              return;
            }
            if (identityDisplayMode === 'local') {
              setMeta(tui('identity_local_session') + ' (' + role + ')');
              return;
            }
            setMeta(tui('msg_not_authenticated'));
          }

          function setIdentityDisplayMode(mode) {
            identityDisplayMode = mode;
            refreshIdentityMeta();
          }

          async function probeAdminAccess() {
            try {
              state.adminOverview = await callJSON('/api/v1/admin/overview');
              adminAccessGranted = true;
              applyRoleVisibility();
              refreshIdentityMeta();
              renderAdminOverview();
            } catch (_) {
              adminAccessGranted = false;
              applyRoleVisibility();
              refreshIdentityMeta();
            }
          }

          function applyRoleVisibility() {
            const admin = isAdminUser();
            document.querySelectorAll('.admin-only').forEach((el) => {
              el.style.display = admin ? '' : 'none';
            });
            if (!admin && (state.activeTab === 'workloads' || state.activeTab === 'ops')) {
              switchTab('intro');
            }
            if (datasetClassificationInput) datasetClassificationInput.style.display = admin && platformEdition === 'enterprise' ? '' : 'none';
          }

          function badge(status) {
            const s = String(status || '').toLowerCase();
            if (s.includes('run') || s.includes('complete') || s.includes('succeed') || s.includes('ready')) return '<span class="badge b-ok">' + status + '</span>';
            if (s.includes('submit') || s.includes('pending') || s.includes('queue')) return '<span class="badge b-mid">' + status + '</span>';
            return '<span class="badge b-info">' + (status || 'unknown') + '</span>';
          }

          function displayAccessUrl(raw) {
            if (!raw) return '-';
            const s = String(raw);
            const idx = s.indexOf('?');
            return idx === -1 ? s : s.slice(0, idx) + '?...';
          }

          function absoluteAccessUrl(raw) {
            if (!raw) return '';
            try { return new URL(String(raw), window.location.origin).href; } catch (_) { return String(raw); }
          }

          function appAccessLink(app) {
            const url = absoluteAccessUrl(app && app.accessUrl);
            if (!url) return '-';
            return '<a class="app-access-link" href="' + escapeHTML(url) + '" target="_blank" rel="noopener noreferrer">' + escapeHTML(url) + '</a>' +
              '<br/><button type="button" class="btn" data-copy-app="' + escapeHTML((app && app.id) || '') + '">Copier le lien</button>';
          }

          function formatDateTime(raw) {
            if (!raw) return '-';
            const d = new Date(raw);
            if (Number.isNaN(d.getTime())) return String(raw);
            return d.toLocaleString();
          }

          function formatDuration(raw) {
            const started = new Date(raw).getTime();
            if (!Number.isFinite(started)) return '-';
            let seconds = Math.max(0, Math.floor((Date.now() - started) / 1000));
            const days = Math.floor(seconds / 86400); seconds %= 86400;
            const hours = Math.floor(seconds / 3600); seconds %= 3600;
            const minutes = Math.floor(seconds / 60);
            if (days) return days + 'j ' + hours + 'h';
            if (hours) return hours + 'h ' + minutes + 'm';
            return minutes + 'm';
          }

          function switchTab(tab, sourceBtn) {
            state.activeTab = tab;
            const viewTab = tab.startsWith('data-') ? 'data' : tab;
            if (statsBar) {
              statsBar.style.display = (viewTab === 'intro') ? '' : 'none';
            }
            const activeButton = sourceBtn || tabButtons.find((btn) => btn.getAttribute('data-tab') === tab);
            tabButtons.forEach((btn) => btn.classList.toggle('active', btn === activeButton));
            const uniqueViews = new Set(Object.values(views).filter(Boolean));
            uniqueViews.forEach((view) => view.classList.toggle('active', view === views[viewTab]));
            applyDataTab(tab);
            if (viewTab === 'data') {
              Promise.allSettled([refreshSecrets(), refreshDatasets(), refreshRepositories(), refreshDatasources(), refreshAvailableOrganizations(), refreshAvailableDatasetUsers()])
                .catch(() => {});
            }
            if (viewTab === 'workloads' && isAdminUser()) {
              refreshAdminExecutions().catch((e) => pretty(usersOut, e));
            }
            if (viewTab === 'ops' && isAdminUser()) {
