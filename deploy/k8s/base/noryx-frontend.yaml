            }
          };

          function normalizeTheme(raw) {
            const v = String(raw || '').trim().toLowerCase();
            return 'noryx';
          }
          function applyTheme(themeID) {
            const normalized = normalizeTheme(themeID);
            const theme = THEMES[normalized] || THEMES.noryx;
            const root = document.documentElement;
            Object.keys(theme).forEach((k) => root.style.setProperty(k, theme[k]));
            const productName = 'NoryxLab';
            if (brandNameNode) brandNameNode.textContent = productName;
            document.title = productName + ' CE';
            if (themeSelect) themeSelect.value = normalized;
            try { localStorage.setItem(THEME_KEY, normalized); } catch (_) {}
            return normalized;
          }
          const NAV_COLLAPSED_KEY = 'noryx.ui.nav.collapsed';

          function applyCollapsedNav(collapsed) {
            if (!layoutNode) return;
            layoutNode.classList.toggle('is-collapsed', !!collapsed);
            if (reduceNavBtn) {
              reduceNavBtn.innerHTML = collapsed
                ? '<span class="ico">▶</span> <span class="txt">Expand</span>'
                : '<span class="ico">◀</span> <span class="txt">Reduce</span>';
            }
          }

          applyCollapsedNav((() => {
            try { return localStorage.getItem(NAV_COLLAPSED_KEY) === '1'; } catch (_) { return false; }
          })());
          if (reduceNavBtn) {
            reduceNavBtn.onclick = () => {
              const next = !(layoutNode && layoutNode.classList.contains('is-collapsed'));
              applyCollapsedNav(next);
              try { localStorage.setItem(NAV_COLLAPSED_KEY, next ? '1' : '0'); } catch (_) {}
            };
          }

