                    return;
                  }
                  wsTab.document.write('<!doctype html><html><head><meta charset="utf-8"><title>Noryx Workspace</title></head><body style="font-family: sans-serif; padding: 1rem;">Launching workspace...</body></html>');
                  wsTab.document.close();
                  // Must complete before navigating workspace URL (proxy requires noryx_session cookie).
                  await ensureWebSession();
                  await new Promise((resolve) => setTimeout(resolve, 120));
                  wsTab.location.assign(targetUrl);
                  openingWorkspaceId = null;
                } catch (e) {
                  if (wsTab && !wsTab.closed) wsTab.close();
                  openingWorkspaceId = null;
                  pretty(usersOut, e);
                  switchTab('ops');
                }
              }
              return;
            }
            if (delId) {
              event.preventDefault();
              event.stopPropagation();
              try {
                const res = await fetch('/api/v1/workspaces/' + encodeURIComponent(delId), {
                  method: 'DELETE',
                  headers: authHeader()
                });
                if (!res.ok) throw await res.json().catch(() => ({ error: tui('err_delete_failed') }));
                await refreshWorkspaces();
              } catch (e) {
                pretty(usersOut, e);
                switchTab('ops');
              }
            }
          };

          workloadRows.onclick = async (event) => {
            const kind = event.target && event.target.getAttribute('data-stop-execution');
            const executionID = event.target && event.target.getAttribute('data-execution-id');
            if (!kind || !executionID) return;
            if (!window.confirm('Arreter cette execution ?')) return;
            try {
              await callJSON('/api/v1/admin/executions/' + encodeURIComponent(kind) + '/' + encodeURIComponent(executionID), { method: 'DELETE' });
              await refreshAdminExecutions();
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          jobRows.onclick = async (event) => {
            const logsId = (event.target && event.target.getAttribute('data-logs-job'));
            const delId = (event.target && event.target.getAttribute('data-del-job'));
            if (logsId) {
              try {
                const body = await callJSON('/api/v1/jobs/' + encodeURIComponent(logsId) + '/logs?tailLines=300');
                jobLogsOut.textContent = '[job=' + (body.jobName || '-') + ' pod=' + (body.podName || '-') + ']\n' + (body.logs || '');
              } catch (e) {
                pretty(usersOut, e);
                switchTab('ops');
              }
              return;
            }
            if (!delId) return;
            try {
              await callJSON('/api/v1/jobs/' + encodeURIComponent(delId), { method: 'DELETE' });
              await refreshJobs();
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          appRows.onclick = async (event) => {
            const openId = (event.target && event.target.getAttribute('data-open-app'));
            const delId = (event.target && event.target.getAttribute('data-del-app'));
            if (openId) {
              const item = state.apps.find((a) => a.id === openId);
              if (item && item.accessUrl) {
                window.open(window.location.origin + item.accessUrl, '_blank');
              }
              return;
            }
            if (!delId) return;
            try {
              await callJSON('/api/v1/apps/' + encodeURIComponent(delId), { method: 'DELETE' });
              await refreshApps();
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          dashboardRows.onclick = async (event) => {
            const openId = (event.target && event.target.getAttribute('data-open-dashboard'));
            const delId = (event.target && event.target.getAttribute('data-del-dashboard'));
            if (openId) {
              const item = state.dashboards.find((a) => a.id === openId);
              if (item && item.accessUrl) {
                window.open(window.location.origin + item.accessUrl, '_blank');
              }
              return;
            }
            if (!delId) return;
            try {
              await callJSON('/api/v1/dashboards/' + encodeURIComponent(delId), { method: 'DELETE' });
              await refreshDashboards();
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          secretRows.onclick = async (event) => {
            const viewName = (event.target && event.target.getAttribute('data-view-secret'));
            const copyName = (event.target && event.target.getAttribute('data-copy-secret'));
            const secretName = (event.target && event.target.getAttribute('data-del-secret'));
            if (!viewName && !copyName && !secretName) return;
            try {
              if (viewName) {
                const body = await callJSON('/api/v1/secrets/' + encodeURIComponent(decodeURIComponent(viewName)));
                pretty(secretOut, body);
                return;
              }
              if (copyName) {
                const body = await callJSON('/api/v1/secrets/' + encodeURIComponent(decodeURIComponent(copyName)));
                await copyText((body && body.value) || '');
                usersOut.textContent = tui('msg_secret_copied');
                pretty(secretOut, body);
                return;
              }
              await callJSON('/api/v1/secrets/' + encodeURIComponent(decodeURIComponent(secretName)), { method: 'DELETE' });
              secretOut.textContent = '-';
              await Promise.all([refreshSecrets(), refreshRepositories()]);
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          datasetRows.onclick = async (event) => {
            if (!datasetRows) return;
            const datasetID = (event.target && event.target.getAttribute('data-del-dataset'));
            const selectNode = event.target && event.target.closest ? event.target.closest('[data-select-dataset]') : null;
            const selectID = selectNode ? selectNode.getAttribute('data-select-dataset') : '';
            if (!datasetID && !selectID) return;
            try {
              if (datasetID) {
                event.preventDefault();
                event.stopPropagation();
                await callJSON('/api/v1/datasets/' + encodeURIComponent(datasetID), { method: 'DELETE' });
                if (selectedDatasetID === datasetID) {
                  selectedDatasetID = '';
                  state.datasetObjects = [];
                }
                await refreshDatasets();
                return;
              }
              selectedDatasetID = selectID;
              datasetCurrentPath = '';
              renderDatasetsTable();
              await Promise.all([refreshDatasetObjects(selectID), refreshDatasetAccess(selectID)]);
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          datasetAccessSave.onclick = async () => {
            try {
              const userID = datasetAccessUser.value.trim();
              if (!selectedDatasetID || !userID) return;
              await callJSON('/api/v1/datasets/' + encodeURIComponent(selectedDatasetID) + '/access/' + encodeURIComponent(userID), {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ role: datasetAccessRole.value })
              });
              datasetAccessUser.value = '';
              await refreshDatasetAccess(selectedDatasetID);
            } catch (e) { pretty(usersOut, e); switchTab('ops'); }
          };

          datasetAccessRows.onclick = async (event) => {
            const userID = event.target && event.target.getAttribute('data-del-dataset-access');
            if (!userID || !selectedDatasetID) return;
            try {
              await callJSON('/api/v1/datasets/' + encodeURIComponent(selectedDatasetID) + '/access/' + userID, { method: 'DELETE' });
              await refreshDatasetAccess(selectedDatasetID);
            } catch (e) { pretty(usersOut, e); switchTab('ops'); }
          };

          async function fetchDatasetFile(pathValue) {
            const response = await fetch('/api/v1/datasets/' + encodeURIComponent(selectedDatasetID) + '/objects/' + pathValue, { headers: authHeader(), cache: 'no-store' });
            if (!response.ok) throw await response.json().catch(() => ({ error: 'file request failed' }));
            return response;
          }

          datasetObjectRows.onclick = async (event) => {
            const folderPath = event.target && event.target.getAttribute('data-dataset-folder');
            const deleteFilePath = event.target && event.target.getAttribute('data-delete-dataset-file');
            const deleteFolderPath = event.target && event.target.getAttribute('data-delete-dataset-folder');
            if (folderPath !== null && folderPath !== undefined) {
              datasetCurrentPath = decodeURIComponent(folderPath);
              renderDatasetObjectsTable();
              return;
            }
            if (deleteFilePath || deleteFolderPath) {
              const encodedPath = deleteFilePath || deleteFolderPath;
              const targetPath = decodeURIComponent(encodedPath);
              if (!window.confirm('Supprimer ' + targetPath + (deleteFolderPath ? ' et tout son contenu ?' : ' ?'))) return;
              try {
                await callJSON('/api/v1/datasets/' + encodeURIComponent(selectedDatasetID) + '/objects/' + encodedPath + (deleteFolderPath ? '?recursive=true' : ''), { method:'DELETE' });
                await refreshDatasetObjects(selectedDatasetID);
              } catch (e) { datasetUploadStatus.style.display = ''; datasetUploadStatus.textContent = String((e && e.error) || e); }
              return;
            }
            const previewPath = event.target && event.target.getAttribute('data-preview-dataset-file');
            const downloadPath = event.target && event.target.getAttribute('data-download-dataset-file');
            const editPath = event.target && event.target.getAttribute('data-edit-dataset-file');
            if (!previewPath && !downloadPath && !editPath) return;
            try {
              const encodedPath = previewPath || downloadPath || editPath;
              const filePath = decodeURIComponent(encodedPath);
              const response = await fetchDatasetFile(encodedPath);
              const blob = await response.blob();
              const url = URL.createObjectURL(blob);
              if (downloadPath) {
                const link = document.createElement('a'); link.href = url; link.download = filePath.split('/').pop(); link.click();
                window.setTimeout(() => URL.revokeObjectURL(url), 1000);
                return;
              }
              datasetPreview.style.display = '';
              datasetPreviewTitle.textContent = 'Apercu · ' + filePath;
              datasetPreviewBody.innerHTML = '';
              const lower = filePath.toLowerCase();
              const visual = datasetFileVisual(filePath, blob.type);
              const selected = state.datasets.find((d) => d.id === selectedDatasetID);
              const canEdit = visual.editable && !!selected && (selected.accessRole === 'owner' || selected.accessRole === 'writer' || isAdminUser());
              datasetPreviewPath = filePath;
              datasetPreviewContentType = blob.type || (visual.kind === 'csv' ? 'text/csv' : 'text/plain');
              datasetPreviewWorkbook = null;
              datasetPreviewSheetName = '';
              datasetPreviewSpreadsheetEditing = false;
              datasetPreviewSpreadsheetBytes = null;
              datasetPreviewEdit.style.display = canEdit ? '' : 'none';
              datasetPreviewSave.style.display = 'none';
              datasetPreviewCancel.style.display = 'none';
              if (blob.type.startsWith('image/')) {
                datasetPreviewBody.innerHTML = '<img src="' + url + '" alt="" />';
              } else if (blob.type === 'application/pdf' || lower.endsWith('.pdf')) {
                datasetPreviewBody.innerHTML = '<iframe src="' + url + '"></iframe>';
              } else if (visual.kind === 'csv') {
                datasetPreviewText = await blob.text(); renderCSVPreview(datasetPreviewText); URL.revokeObjectURL(url);
              } else if (visual.kind === 'text') {
                datasetPreviewText = await blob.text(); const pre = document.createElement('pre'); pre.textContent = datasetPreviewText; datasetPreviewBody.appendChild(pre); URL.revokeObjectURL(url);
              } else if (visual.kind === 'spreadsheet') {
                if (!window.XLSX) throw { error:'Le composant XLSX/ODS ne peut pas etre charge.' };
                datasetPreviewSpreadsheetBytes = await blob.arrayBuffer();
                datasetPreviewWorkbook = XLSX.read(datasetPreviewSpreadsheetBytes, { type:'array', cellFormula:true, cellStyles:true });
                datasetPreviewSheetName = datasetPreviewWorkbook.SheetNames[0] || '';
                renderSpreadsheetPreview(); URL.revokeObjectURL(url);
              } else {
                URL.revokeObjectURL(url);
                datasetPreviewBody.textContent = 'Apercu non disponible pour ce format. Utilisez Telecharger.';
              }
              datasetPreview.scrollIntoView({ behavior: 'smooth', block: 'start' });
              if (editPath && canEdit) datasetPreviewEdit.click();
            } catch (e) { datasetUploadStatus.style.display = ''; datasetUploadStatus.textContent = String((e && e.error) || e); }
          };

          datasetBreadcrumbs.onclick = (event) => {
            const folderPath = event.target && event.target.getAttribute('data-dataset-folder');
            if (folderPath === null || folderPath === undefined) return;
            datasetCurrentPath = decodeURIComponent(folderPath);
            renderDatasetObjectsTable();
          };
          datasetFolderUp.onclick = () => {
            datasetCurrentPath = datasetCurrentPath.split('/').filter(Boolean).slice(0, -1).join('/');
            renderDatasetObjectsTable();
          };
          datasetCreateFolder.onclick = async () => {
            const name = window.prompt('Nom du nouveau dossier');
            if (!name) return;
            const cleanName = name.trim().replace(/^\/+|\/+$/g, '');
            if (!cleanName || cleanName.includes('/')) {
              datasetUploadStatus.style.display = ''; datasetUploadStatus.textContent = 'Le nom du dossier ne doit pas contenir de slash.';
              return;
            }
            const folderPath = datasetCurrentPath ? datasetCurrentPath + '/' + cleanName : cleanName;
            try {
              await callJSON('/api/v1/datasets/' + encodeURIComponent(selectedDatasetID) + '/folders', {
                method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify({ path:folderPath })
              });
              await refreshDatasetObjects(selectedDatasetID);
            } catch (e) { datasetUploadStatus.style.display = ''; datasetUploadStatus.textContent = String((e && e.error) || e); }
          };
          datasetDeleteSelected.onclick = async () => {
            const files = Array.from(datasetObjectRows.querySelectorAll('[data-dataset-file-select]:checked')).map((node) => decodeURIComponent(node.getAttribute('data-dataset-file-select')));
            const folders = Array.from(datasetObjectRows.querySelectorAll('[data-dataset-folder-select]:checked')).map((node) => decodeURIComponent(node.getAttribute('data-dataset-folder-select')));
            if (files.length + folders.length === 0) {
              datasetUploadStatus.style.display = ''; datasetUploadStatus.textContent = 'Selectionnez au moins un fichier ou dossier.';
              return;
            }
            if (!window.confirm('Supprimer la selection ? Les dossiers seront supprimes avec tout leur contenu.')) return;
            try {
              for (const filePath of files) {
                await callJSON('/api/v1/datasets/' + encodeURIComponent(selectedDatasetID) + '/objects/' + encodeURIComponent(filePath), { method:'DELETE' });
              }
              for (const folderPath of folders) {
                await callJSON('/api/v1/datasets/' + encodeURIComponent(selectedDatasetID) + '/objects/' + encodeURIComponent(folderPath) + '?recursive=true', { method:'DELETE' });
              }
              await refreshDatasetObjects(selectedDatasetID);
            } catch (e) { datasetUploadStatus.style.display = ''; datasetUploadStatus.textContent = String((e && e.error) || e); }
          };

          datasetDownloadSelected.onclick = async () => {
            try {
              const paths = Array.from(datasetObjectRows.querySelectorAll('[data-dataset-file-select]:checked')).map((node) => decodeURIComponent(node.getAttribute('data-dataset-file-select')));
              if (paths.length === 0) throw { error: 'Selectionnez au moins un fichier.' };
              const response = await fetch('/api/v1/datasets/' + encodeURIComponent(selectedDatasetID) + '/download', { method:'POST', headers:{ ...authHeader(), 'Content-Type':'application/json' }, body:JSON.stringify({ paths }) });
              if (!response.ok) throw await response.json().catch(() => ({ error:'download failed' }));
              const url = URL.createObjectURL(await response.blob()); const link = document.createElement('a'); link.href=url; link.download='dataset-files.zip'; link.click(); window.setTimeout(() => URL.revokeObjectURL(url), 1000);
            } catch (e) { datasetUploadStatus.style.display = ''; datasetUploadStatus.textContent = String((e && e.error) || e); }
          };
          datasetPreviewEdit.onclick = () => {
            if (datasetFileVisual(datasetPreviewPath, datasetPreviewContentType).kind === 'spreadsheet') {
              if (!window.confirm('L edition XLSX/ODS est limitee aux valeurs. Styles, formules complexes et graphiques peuvent etre modifies. Continuer ?')) return;
              datasetPreviewSpreadsheetEditing = true; renderSpreadsheetPreview();
              datasetPreviewEdit.style.display = 'none'; datasetPreviewSave.style.display = ''; datasetPreviewCancel.style.display = '';
              return;
            }
            const area = document.createElement('textarea'); area.value = datasetPreviewText; datasetPreviewBody.innerHTML = ''; datasetPreviewBody.appendChild(area);
            datasetPreviewEdit.style.display = 'none'; datasetPreviewSave.style.display = ''; datasetPreviewCancel.style.display = '';
          };
          datasetPreviewSave.onclick = async () => {
            try {
              if (datasetFileVisual(datasetPreviewPath, datasetPreviewContentType).kind === 'spreadsheet') {
                updateSpreadsheetSheetFromTable();
                const bytes = XLSX.write(datasetPreviewWorkbook, { bookType:spreadsheetBookType(datasetPreviewPath), type:'array', cellStyles:true });
                const response = await fetch('/api/v1/datasets/' + encodeURIComponent(selectedDatasetID) + '/objects/' + encodeURIComponent(datasetPreviewPath), {
                  method:'PUT', headers:{ ...authHeader(), 'Content-Type':datasetPreviewContentType || 'application/octet-stream' }, body:new Blob([bytes], { type:datasetPreviewContentType || 'application/octet-stream' })
                });
                if (!response.ok) throw await response.json().catch(() => ({ error:'save failed' }));
                datasetPreviewSpreadsheetEditing = false; renderSpreadsheetPreview();
                datasetPreviewEdit.style.display = ''; datasetPreviewSave.style.display = 'none'; datasetPreviewCancel.style.display = 'none';
                datasetUploadStatus.style.display = ''; datasetUploadStatus.textContent = datasetPreviewPath + ' a ete enregistre.';
                await refreshDatasetObjects(selectedDatasetID);
                return;
              }
              const area = datasetPreviewBody.querySelector('textarea'); if (!area || !datasetPreviewPath) return;
              const response = await fetch('/api/v1/datasets/' + encodeURIComponent(selectedDatasetID) + '/objects/' + encodeURIComponent(datasetPreviewPath), {
                method:'PUT', headers:{ ...authHeader(), 'Content-Type':datasetPreviewContentType }, body:area.value
              });
              if (!response.ok) throw await response.json().catch(() => ({ error:'save failed' }));
              datasetPreviewText = area.value; datasetPreviewBody.innerHTML = '';
              if (datasetFileVisual(datasetPreviewPath, datasetPreviewContentType).kind === 'csv') renderCSVPreview(datasetPreviewText);
              else { const pre=document.createElement('pre'); pre.textContent=datasetPreviewText; datasetPreviewBody.appendChild(pre); }
              datasetPreviewEdit.style.display = ''; datasetPreviewSave.style.display = 'none'; datasetPreviewCancel.style.display = 'none';
              datasetUploadStatus.style.display = ''; datasetUploadStatus.textContent = datasetPreviewPath + ' a ete enregistre.';
              await refreshDatasetObjects(selectedDatasetID);
            } catch (e) { datasetUploadStatus.style.display = ''; datasetUploadStatus.textContent = 'Echec de l edition : ' + String((e && e.error) || e); }
          };
          datasetPreviewCancel.onclick = () => {
            if (datasetFileVisual(datasetPreviewPath, datasetPreviewContentType).kind === 'spreadsheet') {
              datasetPreviewWorkbook = XLSX.read(datasetPreviewSpreadsheetBytes, { type:'array', cellFormula:true, cellStyles:true });
              datasetPreviewSheetName = datasetPreviewWorkbook.SheetNames[0] || '';
              datasetPreviewSpreadsheetEditing = false; renderSpreadsheetPreview();
              datasetPreviewEdit.style.display = ''; datasetPreviewSave.style.display = 'none'; datasetPreviewCancel.style.display = 'none';
              return;
            }
            datasetPreviewBody.innerHTML = '';
            if (datasetFileVisual(datasetPreviewPath, datasetPreviewContentType).kind === 'csv') renderCSVPreview(datasetPreviewText);
            else { const pre=document.createElement('pre'); pre.textContent=datasetPreviewText; datasetPreviewBody.appendChild(pre); }
            datasetPreviewEdit.style.display = ''; datasetPreviewSave.style.display = 'none'; datasetPreviewCancel.style.display = 'none';
          };
          datasetPreviewClose.onclick = () => { datasetPreview.style.display = 'none'; datasetPreviewBody.innerHTML = ''; datasetPreviewPath = ''; datasetPreviewWorkbook = null; datasetPreviewSheetName = ''; datasetPreviewSpreadsheetEditing = false; datasetPreviewSpreadsheetBytes = null; };

          repoRows.onclick = async (event) => {
            const repositoryIDToTest = (event.target && event.target.getAttribute('data-test-repo'));
            const repositoryIDToDelete = (event.target && event.target.getAttribute('data-del-repo'));
            if (!repositoryIDToTest && !repositoryIDToDelete) return;
            try {
              if (repositoryIDToTest) {
                const result = await callJSON('/api/v1/repositories/' + encodeURIComponent(repositoryIDToTest) + '/validate', { method: 'POST' });
                state.repositoryChecks[repositoryIDToTest] = result;
                renderRepositoriesTable();
                usersOut.textContent = result.reachable ? tui('msg_repo_conn_ok') : (tui('msg_repo_conn_failed') + (result.error || tui('msg_unknown_error')));
                return;
              }
              await callJSON('/api/v1/repositories/' + encodeURIComponent(repositoryIDToDelete), { method: 'DELETE' });
              delete state.repositoryChecks[repositoryIDToDelete];
              await refreshRepositories();
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          datasourceRows.onclick = async (event) => {
            const datasourceIDToTest = (event.target && event.target.getAttribute('data-test-ds'));
            const datasourceIDToDelete = (event.target && event.target.getAttribute('data-del-ds'));
            if (!datasourceIDToTest && !datasourceIDToDelete) return;
            try {
              if (datasourceIDToTest) {
                const result = await callJSON('/api/v1/datasources/' + encodeURIComponent(datasourceIDToTest) + '/validate', { method: 'POST' });
                state.datasourceChecks[datasourceIDToTest] = result;
                renderDatasourcesTable();
                usersOut.textContent = result.reachable ? tui('msg_ds_conn_ok') : (tui('msg_ds_conn_failed') + (result.error || tui('msg_unknown_error')));
                return;
              }
              await callJSON('/api/v1/datasources/' + encodeURIComponent(datasourceIDToDelete), { method: 'DELETE' });
              delete state.datasourceChecks[datasourceIDToDelete];
              await refreshDatasources();
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

      if (authMode === 'oidc') {
        keycloak.init({ onLoad: 'check-sso', pkceMethod: 'S256', checkLoginIframe: false }).then((authenticated) => {
              if (!authenticated) {
                stopWorkspacesAutoRefresh();
                setIdentityDisplayMode('signed-out');
                syncAuthButtons(false);
                applyRoleVisibility();
                setButtons(true);
                loadUserPreferences();
                probeAdminAccess();
                startWorkspacesAutoRefresh();
              startPlatformPulse();
                refreshProjects()
                  .then(() => Promise.all([refreshWorkspaces(), refreshJobs(), refreshApps(), refreshDashboards(), refreshBuilds(), refreshEnvironments(), refreshSecrets(), refreshDatasets(), refreshRepositories(), refreshDatasources(), refreshProjectResources()]))
                  .catch((err) => {
                    pretty(usersOut, { sessionError: String(err) });
                    switchTab('ops');
                  });
                switchTab('intro');
                return;
              }
              setIdentityDisplayMode('oidc');
              syncAuthButtons(true);
              applyRoleVisibility();
              setButtons(true);
              loadUserPreferences();
              probeAdminAccess();
              startWorkspacesAutoRefresh();
              startPlatformPulse();
              ensureWebSession()
                .then(() => refreshProjects())
                .then(() => Promise.all([refreshWorkspaces(), refreshJobs(), refreshApps(), refreshDashboards(), refreshBuilds(), refreshEnvironments(), refreshSecrets(), refreshDatasets(), refreshRepositories(), refreshDatasources(), refreshProjectResources()]))
                .catch((err) => {
                  pretty(usersOut, { sessionError: String(err) });
                  switchTab('ops');
                });
            }).catch((err) => {
              stopWorkspacesAutoRefresh();
              syncAuthButtons(true);
              pretty(usersOut, { error: String(err) });
              authMode = 'lab';
              setIdentityDisplayMode('local');
              applyRoleVisibility();
              setButtons(true);
              loadUserPreferences();
              probeAdminAccess();
              startWorkspacesAutoRefresh();
              startPlatformPulse();
              refreshProjects()
                .then(() => Promise.all([refreshWorkspaces(), refreshJobs(), refreshApps(), refreshDashboards(), refreshBuilds(), refreshEnvironments(), refreshSecrets(), refreshDatasets(), refreshRepositories(), refreshDatasources(), refreshProjectResources()]))
                .catch(() => {});
              switchTab('intro');
            });
          } else {
            setIdentityDisplayMode('local');
            syncAuthButtons(true);
            applyRoleVisibility();
            setButtons(true);
            loadUserPreferences();
            probeAdminAccess();
            startWorkspacesAutoRefresh();
              startPlatformPulse();
            refreshProjects()
              .then(() => Promise.all([refreshWorkspaces(), refreshJobs(), refreshApps(), refreshDashboards(), refreshBuilds(), refreshEnvironments(), refreshSecrets(), refreshDatasets(), refreshRepositories(), refreshDatasources(), refreshProjectResources()]))
              .catch(() => {});
            switchTab('intro');
          }

          loadUserPreferences();
          refreshVersions();
        </script>
      </body>
