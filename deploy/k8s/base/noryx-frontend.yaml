    <script>
      (function () {
        var node = document.getElementById('versions');
        if (!node) return;
        var front = 'unknown';
        var back = 'unknown';
        node.textContent = 'front: ' + front + ' | back: ' + back;
        var bust = String(Date.now());
        Promise.all([
          fetch('/version.json?nocache=' + bust, { credentials: 'same-origin', cache: 'no-store' }).then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; }),
          fetch('/api/v1/version?nocache=' + bust, { credentials: 'same-origin', cache: 'no-store' }).then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; })
        ]).then(function (res) {
          var f = res[0];
          var b = res[1];
          if (f && f.version) front = String(f.version);
          if (b && (b.backendVersion || b.version)) back = String(b.backendVersion || b.version);
          node.textContent = 'front: ' + front + ' | back: ' + back;
        }).catch(function () {
          node.textContent = 'front: ' + front + ' | back: ' + back;
        });
      })();
    </script>

