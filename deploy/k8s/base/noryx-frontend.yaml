          function stopWorkspacesAutoRefresh() {
            if (workspacesAutoRefreshTimer) {
              clearInterval(workspacesAutoRefreshTimer);
              workspacesAutoRefreshTimer = null;
            }
            if (platformPulseTimer) {
              clearInterval(platformPulseTimer);
              platformPulseTimer = null;
            }
          }

          function startPlatformPulse() {
            if (platformPulseTimer) return;
            refreshPlatformOverview().catch(() => {});
            platformPulseTimer = setInterval(() => refreshPlatformOverview().catch(() => {}), 30000);
          }

          function startWorkspacesAutoRefresh() {
            if (workspacesAutoRefreshTimer) return;
            workspacesAutoRefreshTimer = setInterval(async () => {
              try {
                await Promise.all([refreshWorkspaces(), refreshJobs(), refreshApps(), refreshDashboards()]);
                if (state.activeTab === 'environments' || state.activeTab === 'workloads') {
                  await Promise.all([refreshBuilds(), refreshEnvironments()]);
                }
              } catch (_) {}
            }, 5000);
          }

      async function triggerLogin() {
        try {
          const kc = keycloak || new Keycloak({
            url: window.location.origin + '/auth',
            realm: 'noryx',
            clientId: 'noryx-api'
          });
          const loginUrl = await kc.createLoginUrl({ redirectUri: window.location.origin + '/' });
          window.location.assign(loginUrl);
          return false;
        } catch (err) {
          pretty(usersOut, { loginError: String(err) });
          setIdentityDisplayMode('signed-out');
        }
        try { localStorage.setItem(LAB_USER_KEY, currentLabUser()); } catch (_) {}
        return false;
      }

      loginBtn.onclick = async (event) => {
        if (event && event.preventDefault) event.preventDefault();
        await triggerLogin();
      };

      document.addEventListener('click', async (event) => {
        const target = event && event.target ? event.target : null;
        if (target && target.closest && target.closest('#login')) {
          event.preventDefault();
          await triggerLogin();
        }
      }, true);
          logoutBtn.onclick = async () => {
            stopWorkspacesAutoRefresh();
            try { await fetch('/api/v1/auth/session', { method: 'DELETE' }); } catch (_) {}
            if (authMode === 'oidc') {
              keycloak.logout({ redirectUri: window.location.origin + '/' });
              return;
            }
            setIdentityDisplayMode('signed-out');
          };

          downloadAuditBtn.onclick = async () => {
            try {
              downloadAuditBtn.disabled = true;
              await ensureWebSession();
              const response = await fetch('/api/v1/admin/audit.csv', {
                method: 'GET',
                headers: authHeader(),
                credentials: 'same-origin',
                cache: 'no-store'
              });
              if (!response.ok) {
                const error = await response.json().catch(() => ({ error: 'audit export failed: HTTP ' + response.status }));
                throw error;
              }
              const blob = await response.blob();
              const url = URL.createObjectURL(blob);
              const link = document.createElement('a');
              link.href = url;
              link.download = 'noryx-audit.csv';
              document.body.appendChild(link);
              link.click();
              link.remove();
              window.setTimeout(() => URL.revokeObjectURL(url), 1000);
            } catch (e) {
              pretty(auditOut, e);
            } finally {
              downloadAuditBtn.disabled = false;
            }
          };

          loadProjectsBtn.onclick = async () => {
            try { await refreshProjects(); }
            catch (e) { pretty(usersOut, e); switchTab('ops'); }
          };

          createProjectBtn.onclick = async () => {
            try {
              const name = projectNameInput.value.trim();
              if (!name) throw { error: tui('err_project_name_required') };
              await callJSON('/api/v1/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
              });
              projectNameInput.value = '';
              await refreshProjects();
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          async function selectProjectAndRefresh(projectID) {
            projectSelect.value = projectID;
            await Promise.all([refreshBuilds(), refreshEnvironments(), refreshProjectResources()]);
            await refreshJobs();
            await refreshApps();
            await refreshDashboards();
            renderProjectsTable();
          }

          projectRows.onclick = async (event) => {
            const selectProjectID = (event.target && event.target.getAttribute('data-select-project'));
            const projectID = (event.target && event.target.getAttribute('data-del-project'));
            if (selectProjectID) {
              try { await selectProjectAndRefresh(selectProjectID); }
              catch (e) { pretty(usersOut, e); switchTab('ops'); }
              return;
            }
            if (!projectID) return;
            try {
              await callJSON('/api/v1/projects/' + encodeURIComponent(projectID), { method: 'DELETE' });
              await Promise.all([refreshProjects(), refreshWorkspaces(), refreshBuilds(), refreshEnvironments(), refreshProjectResources()]);
