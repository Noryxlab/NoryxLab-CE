          function renderDatasetAccessTable() {
            if (!datasetAccessRows) return;
            datasetAccessForm.style.display = selectedDatasetID && state.datasetCanManageAccess ? 'flex' : 'none';
            datasetAccessRows.innerHTML = '';
            const items = ensureArray(state.datasetAccess);
            if (!selectedDatasetID || items.length === 0) {
              datasetAccessRows.innerHTML = '<tr><td colspan="3">Aucune permission.</td></tr>';
              return;
            }
            items.forEach((access) => {
              const tr = document.createElement('tr');
              tr.innerHTML = '<td><strong>' + (access.userId || '-') + '</strong></td><td>' + badge(access.role || '-') + '</td><td>' +
                ((state.datasetCanManageAccess && access.role !== 'owner') ? '<button type="button" class="btn danger" data-del-dataset-access="' + encodeURIComponent(access.userId || '') + '">Retirer</button>' : '-') + '</td>';
              datasetAccessRows.appendChild(tr);
            });
          }

          function formatBytes(value) {
            const n = Number(value || 0);
            if (!Number.isFinite(n) || n <= 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let size = n;
            let idx = 0;
            while (size >= 1024 && idx < units.length - 1) {
              size /= 1024;
              idx += 1;
            }
            return (idx === 0 ? String(Math.round(size)) : size.toFixed(size >= 10 ? 1 : 2)) + ' ' + units[idx];
          }

          function escapeHTML(value) {
            return String(value == null ? '' : value)
              .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
          }

          function renderDatasetObjectsTable() {
            if (!datasetObjectRows) return;
            const selected = state.datasets.find((d) => d.id === selectedDatasetID);
            const canWrite = !!selected && (selected.accessRole === 'owner' || selected.accessRole === 'writer' || isAdminUser());
            uploadDatasetObjectBtn.disabled = !canWrite;
            datasetUploadPathInput.disabled = !canWrite;
            datasetUploadFileInput.disabled = !canWrite;
            datasetCreateFolder.disabled = !canWrite;
            datasetDeleteSelected.disabled = !canWrite;
            datasetFolderUp.disabled = !datasetCurrentPath;
            if (datasetSelectedTitle) {
              datasetSelectedTitle.textContent = selected ? (selected.name || selected.id) : 'Aucun dataset selectionne';
            }
            if (datasetSelectedLocation) {
              datasetSelectedLocation.textContent = selected
                ? ((selected.provider || 'minio') + ' / ' + (selected.bucket || '-') + (selected.prefix ? '/' + selected.prefix : ''))
                : '-';
            }
            datasetObjectRows.innerHTML = '';
            datasetBreadcrumbs.innerHTML = '';
            if (!selected) {
              if (datasetFileCount) datasetFileCount.textContent = '0';
              if (datasetTotalSize) datasetTotalSize.textContent = '0 B';
              datasetObjectRows.innerHTML = '<tr><td colspan="6">-</td></tr>';
              datasetDownloadSelected.disabled = true;
              return;
            }
            const crumbs = datasetCurrentPath ? datasetCurrentPath.split('/').filter(Boolean) : [];
            let crumbPath = '';
            const rootButton = document.createElement('button');
            rootButton.type = 'button'; rootButton.textContent = selected.name || 'Dataset'; rootButton.setAttribute('data-dataset-folder', '');
            datasetBreadcrumbs.appendChild(rootButton);
            crumbs.forEach((part) => {
              const separator = document.createElement('span'); separator.textContent = '›'; datasetBreadcrumbs.appendChild(separator);
              crumbPath = crumbPath ? crumbPath + '/' + part : part;
              const button = document.createElement('button'); button.type = 'button'; button.textContent = part; button.setAttribute('data-dataset-folder', encodeURIComponent(crumbPath));
              datasetBreadcrumbs.appendChild(button);
            });
            datasetDownloadSelected.disabled = false;
            const objects = ensureArray(state.datasetObjects);
            const files = objects.filter((obj) => !String(obj.path || '').endsWith('/'));
            const totalSize = files.reduce((sum, obj) => sum + Number(obj.size || 0), 0);
            if (datasetFileCount) datasetFileCount.textContent = String(files.length);
            if (datasetTotalSize) datasetTotalSize.textContent = formatBytes(totalSize);
            const prefix = datasetCurrentPath ? datasetCurrentPath.replace(/\/+$/, '') + '/' : '';
            const folders = new Map();
            const visibleFiles = [];
            objects.forEach((obj) => {
              const objectPath = String(obj.path || obj.key || '');
              if (!objectPath.startsWith(prefix)) return;
              const remainder = objectPath.slice(prefix.length);
              if (!remainder) return;
              const slash = remainder.indexOf('/');
              if (slash >= 0) {
                const name = remainder.slice(0, slash);
                if (name) folders.set(name, prefix + name);
                return;
              }
              visibleFiles.push(obj);
            });
            if (folders.size === 0 && visibleFiles.length === 0) {
              datasetObjectRows.innerHTML = '<tr><td colspan="6">Ce dossier est vide.</td></tr>';
              return;
            }
            Array.from(folders.entries()).sort((a, b) => a[0].localeCompare(b[0])).forEach(([name, folderPath]) => {
              const tr = document.createElement('tr');
              tr.innerHTML =
                '<td><input type="checkbox" data-dataset-folder-select="' + encodeURIComponent(folderPath) + '" /></td>' +
                '<td><span class="file-path"><span class="file-icon folder">📁</span><button type="button" class="file-name-button" data-dataset-folder="' + encodeURIComponent(folderPath) + '">' + escapeHTML(name) + '</button></span></td>' +
                '<td>-</td><td>-</td><td>Dossier</td>' +
                '<td><button type="button" class="btn" data-dataset-folder="' + encodeURIComponent(folderPath) + '">Ouvrir</button> ' +
                (canWrite ? '<button type="button" class="btn danger" data-delete-dataset-folder="' + encodeURIComponent(folderPath) + '">Supprimer</button>' : '') + '</td>';
              datasetObjectRows.appendChild(tr);
            });
            visibleFiles.sort((a, b) => String(a.path || '').localeCompare(String(b.path || ''))).forEach((obj) => {
              const visual = datasetFileVisual(obj.path || obj.key || '', obj.contentType || '');
              const editable = canWrite && visual.editable;
              const fullPath = obj.path || obj.key || '';
              const name = fullPath.slice(prefix.length);
              const tr = document.createElement('tr');
              tr.innerHTML =
                '<td><input type="checkbox" data-dataset-file-select="' + encodeURIComponent(fullPath) + '" /></td>' +
                '<td><span class="file-path"><span class="file-icon">▤</span>' + (visual.supported ? '<span class="preview-dot supported" title="Apercu disponible"></span>' : '') + '<button type="button" class="file-name-button" data-preview-dataset-file="' + encodeURIComponent(fullPath) + '">' + escapeHTML(name || '-') + '</button></span></td>' +
                '<td>' + formatBytes(obj.size) + '</td>' +
                '<td>' + formatDateTime(obj.lastModified) + '</td>' +
                '<td>' + (obj.contentType || '-') + '</td>' +
                '<td><button type="button" class="btn" data-preview-dataset-file="' + encodeURIComponent(fullPath) + '">Voir</button> ' +
                (editable ? '<button type="button" class="btn" data-edit-dataset-file="' + encodeURIComponent(fullPath) + '">Modifier</button> ' : '') +
                '<button type="button" class="btn" data-download-dataset-file="' + encodeURIComponent(fullPath) + '">Telecharger</button> ' +
                (canWrite ? '<button type="button" class="btn danger" data-delete-dataset-file="' + encodeURIComponent(fullPath) + '">Supprimer</button>' : '') + '</td>';
              datasetObjectRows.appendChild(tr);
            });
