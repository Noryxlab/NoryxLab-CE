          function syncAuthButtons(authenticated) {
            if (!loginBtn || !logoutBtn) return;
            if (authenticated) {
              loginBtn.style.display = 'none';
              logoutBtn.style.display = '';
            } else {
              loginBtn.style.display = '';
              logoutBtn.style.display = 'none';
            }
          }

          function isAdminUser() {
            if (adminAccessGranted || authMode === 'lab') return true;
            const realmRoles = ensureArray((keycloak && keycloak.tokenParsed && keycloak.tokenParsed.realm_access && keycloak.tokenParsed.realm_access.roles));
            const clientRoles = ensureArray((keycloak && keycloak.tokenParsed && keycloak.tokenParsed.resource_access && keycloak.tokenParsed.resource_access['noryx-api'] && keycloak.tokenParsed.resource_access['noryx-api'].roles));
            const roles = new Set([...realmRoles, ...clientRoles].map((r) => String(r || '').toLowerCase()));
            return roles.has('noryx-admin') || roles.has('admin') || roles.has('platform_admin');
          }

          function identityName() {
            const claims = (keycloak && keycloak.tokenParsed) || {};
            const givenName = String(claims.given_name || '').trim();
            if (givenName) return givenName;
            const fullName = String(claims.name || '').trim();
            if (fullName) return fullName.split(/\s+/)[0];
            return String(claims.preferred_username || claims.email || claims.sub || '').trim();
          }

          function refreshIdentityMeta() {
            const role = isAdminUser() ? tui('role_admin') : tui('role_user');
            if (identityDisplayMode === 'oidc') {
              setMeta((identityName() || tui('role_user')) + ' (' + role + ')');
              return;
            }
            if (identityDisplayMode === 'local') {
              setMeta(tui('identity_local_session') + ' (' + role + ')');
              return;
            }
            setMeta(tui('msg_not_authenticated'));
          }

          function setIdentityDisplayMode(mode) {
            identityDisplayMode = mode;
            refreshIdentityMeta();
          }

          async function probeAdminAccess() {
            try {
              state.adminOverview = await callJSON('/api/v1/admin/overview');
              adminAccessGranted = true;
              applyRoleVisibility();
              refreshIdentityMeta();
              renderAdminOverview();
            } catch (_) {
              adminAccessGranted = false;
              applyRoleVisibility();
              refreshIdentityMeta();
            }
          }

          function applyRoleVisibility() {
            const admin = isAdminUser();
            document.querySelectorAll('.admin-only').forEach((el) => {
              el.style.display = admin ? '' : 'none';
            });
            if (!admin && (state.activeTab === 'workloads' || state.activeTab === 'ops')) {
              switchTab('intro');
            }
          }

          function badge(status) {
            const s = String(status || '').toLowerCase();
            if (s.includes('run') || s.includes('complete') || s.includes('succeed') || s.includes('ready')) return '<span class="badge b-ok">' + status + '</span>';
            if (s.includes('submit') || s.includes('pending') || s.includes('queue')) return '<span class="badge b-mid">' + status + '</span>';
            return '<span class="badge b-info">' + (status || 'unknown') + '</span>';
          }

          function displayAccessUrl(raw) {
            if (!raw) return '-';
            const s = String(raw);
            const idx = s.indexOf('?');
            return idx === -1 ? s : s.slice(0, idx) + '?...';
          }

          function formatDateTime(raw) {
            if (!raw) return '-';
            const d = new Date(raw);
            if (Number.isNaN(d.getTime())) return String(raw);
            return d.toLocaleString();
          }

          function formatDuration(raw) {
            const started = new Date(raw).getTime();
            if (!Number.isFinite(started)) return '-';
            let seconds = Math.max(0, Math.floor((Date.now() - started) / 1000));
            const days = Math.floor(seconds / 86400); seconds %= 86400;
            const hours = Math.floor(seconds / 3600); seconds %= 3600;
            const minutes = Math.floor(seconds / 60);
            if (days) return days + 'j ' + hours + 'h';
            if (hours) return hours + 'h ' + minutes + 'm';
            return minutes + 'm';
          }

          function switchTab(tab, sourceBtn) {
            state.activeTab = tab;
            const viewTab = tab.startsWith('data-') ? 'data' : tab;
            if (statsBar) {
              statsBar.style.display = (viewTab === 'environments') ? 'none' : '';
            }
            const activeButton = sourceBtn || tabButtons.find((btn) => btn.getAttribute('data-tab') === tab);
            tabButtons.forEach((btn) => btn.classList.toggle('active', btn === activeButton));
            const uniqueViews = new Set(Object.values(views).filter(Boolean));
            uniqueViews.forEach((view) => view.classList.toggle('active', view === views[viewTab]));
            applyDataTab(tab);
            if (viewTab === 'data') {
              Promise.allSettled([refreshSecrets(), refreshDatasets(), refreshRepositories(), refreshDatasources()])
                .catch(() => {});
            }
            if (viewTab === 'workloads' && isAdminUser()) {
              refreshAdminExecutions().catch((e) => pretty(usersOut, e));
            }
            if (viewTab === 'ops' && isAdminUser()) {
              Promise.all([refreshAdminOverview(), refreshAdminInventory()]).catch((e) => pretty(usersOut, e));
            }
            const labels = {
              intro: 'tab_label_intro',
              projects: 'tab_label_projects',
              data: 'tab_label_data',
              'data-datasets': 'tab_label_data',
              'data-datasources': 'tab_label_data',
              'data-git': 'tab_label_data',
              'data-secrets': 'tab_label_data',
              workspaces: 'tab_label_workspaces',
              'project-jobs': 'tab_label_project_jobs',
              'project-apps': 'tab_label_project_apps',
              'project-dashboards': 'tab_label_project_dashboards',
              'project-apis': 'tab_label_project_apis',
              environments: 'tab_label_environments',
              workloads: 'tab_label_workloads',
              ops: 'tab_label_ops'
            };
            statTab.textContent = tui(labels[tab] || 'tab_label_intro');
            const sectionI18n = {
              intro: ['section_title_intro', 'section_subtitle_intro'],
              projects: ['section_title_projects', 'section_subtitle_projects'],
              data: ['section_title_data', 'section_subtitle_data'],
              'data-datasets': ['section_title_data', 'section_subtitle_data'],
              'data-datasources': ['section_title_data', 'section_subtitle_data'],
              'data-git': ['section_title_data', 'section_subtitle_data'],
              'data-secrets': ['section_title_data', 'section_subtitle_data'],
              workspaces: ['section_title_workspaces', 'section_subtitle_workspaces'],
              'project-jobs': ['section_title_jobs', 'section_subtitle_jobs'],
              'project-apps': ['section_title_apps', 'section_subtitle_apps'],
              'project-dashboards': ['section_title_dashboards', 'section_subtitle_dashboards'],
              'project-apis': ['section_title_apis', 'section_subtitle_apis'],
              environments: ['section_title_environments', 'section_subtitle_environments'],
              workloads: ['section_title_workloads', 'section_subtitle_workloads'],
              ops: ['section_title_ops', 'section_subtitle_ops']
            };
            const section = sectionI18n[tab] || sectionI18n.intro;
            if (sectionTitle) sectionTitle.textContent = tui(section[0]);
            if (sectionSubtitle) sectionSubtitle.textContent = tui(section[1]);
          }

          function applyDataTab(tab) {
            const datasets = document.getElementById('card-datasets');
            const datasources = document.getElementById('card-datasources');
            const repos = document.getElementById('card-repositories');
            const secrets = document.getElementById('card-secrets');
            if (!datasets || !datasources || !repos || !secrets) return;
            if (tab === 'data-datasets') {
              datasets.style.display = 'block';
              datasources.style.display = 'none';
              repos.style.display = 'none';
              secrets.style.display = 'none';
              return;
            }
            if (tab === 'data-git') {
              datasets.style.display = 'none';
              datasources.style.display = 'none';
              repos.style.display = 'block';
              secrets.style.display = 'none';
              return;
            }
            if (tab === 'data-datasources') {
              datasets.style.display = 'none';
              datasources.style.display = 'block';
              repos.style.display = 'none';
              secrets.style.display = 'none';
              return;
            }
            if (tab === 'data-secrets') {
              datasets.style.display = 'none';
              datasources.style.display = 'none';
              repos.style.display = 'none';
              secrets.style.display = 'block';
              return;
