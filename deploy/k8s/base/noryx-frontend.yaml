              const username = (authMode === 'oidc')
                ? ((keycloak.tokenParsed && keycloak.tokenParsed.preferred_username) || (keycloak.tokenParsed && keycloak.tokenParsed.email) || 'user')
                : currentLabUser();
              await callJSON('/api/v1/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: 'My First Project - ' + username })
              });
              body = await callJSON('/api/v1/projects');
            }
            state.projects = ensureArray(body.items);
            renderAll();
            return body;
          }

