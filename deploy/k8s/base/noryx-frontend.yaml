          projectFilesUp.onclick = async () => {
            projectFilesCurrentPath = String(projectFilesCurrentPath || '').split('/').slice(0, -1).join('/');
            await refreshProjectFiles();
          };
          projectFilesNewFolder.onclick = async () => {
            const name = prompt('Nom du nouveau dossier');
            if (!name) return;
            const path = [projectFilesCurrentPath, name.trim()].filter(Boolean).join('/');
            await callJSON('/api/v1/projects/' + encodeURIComponent(selectedProjectId()) + '/folders', {
              method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify({ path })
            });
            await refreshProjectFiles();
          };
