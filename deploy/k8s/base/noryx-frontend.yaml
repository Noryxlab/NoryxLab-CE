          function datasetSubjectCandidates(subjectType) {
            const candidates = [];
            const seen = new Set();
            const add = (id, label, searchValues) => {
              const normalizedID = String(id || '').trim();
              if (!normalizedID || seen.has(normalizedID)) return;
              seen.add(normalizedID);
              candidates.push({
                id: normalizedID,
                label: String(label || normalizedID).trim(),
                search: ensureArray(searchValues).map((value) => String(value || '').trim().toLowerCase()).filter(Boolean)
              });
            };
            if (subjectType === 'organization') {
              ensureArray(state.availableOrganizations).forEach((organization) => add(
                organization.id,
                organization.name || organization.alias || organization.id,
                [organization.id, organization.name, organization.alias]
              ));
            } else {
              ensureArray(state.adminInventory.users).forEach((user) => add(
                user.id || user.username || user.email,
                user.username || user.email || user.id,
                [user.id, user.username, user.email, user.firstName, user.lastName]
              ));
              ensureArray(state.datasetAccess).filter((access) => (access.subjectType || 'user') === 'user').forEach((access) => add(
                access.subjectId || access.userId,
                access.subjectId || access.userId,
                [access.subjectId, access.userId]
              ));
            }
            return candidates;
          }

          function updateDatasetSubjectOptions(input, subjectType) {
            datasetSubjectOptions.innerHTML = '';
            const query = String(input && input.value || '').trim().toLowerCase();
            if (!query) return;
            datasetSubjectCandidates(subjectType)
              .filter((candidate) => candidate.search.some((value) => value.startsWith(query)))
              .slice(0, 20)
              .forEach((candidate) => {
                const option = document.createElement('option');
                option.value = candidate.label;
                option.label = candidate.id;
                datasetSubjectOptions.appendChild(option);
              });
          }

          function resolveDatasetSubjectID(value, subjectType) {
            const raw = String(value || '').trim();
            const normalized = raw.toLowerCase();
            const match = datasetSubjectCandidates(subjectType).find((candidate) =>
              candidate.id.toLowerCase() === normalized || candidate.label.toLowerCase() === normalized
            );
            return match ? match.id : raw;
          }

          function formatBytes(value) {
            const n = Number(value || 0);
            if (!Number.isFinite(n) || n <= 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let size = n;
            let idx = 0;
            while (size >= 1024 && idx < units.length - 1) {
              size /= 1024;
              idx += 1;
            }
            return (idx === 0 ? String(Math.round(size)) : size.toFixed(size >= 10 ? 1 : 2)) + ' ' + units[idx];
          }
          function formatUptime(createdAt, status) {
            if (!String(status || '').toLowerCase().includes('run')) return '-';
            const started = new Date(createdAt || '').getTime();
            if (!Number.isFinite(started)) return '-';
            let seconds = Math.max(0, Math.floor((Date.now() - started) / 1000));
            const days = Math.floor(seconds / 86400);
            seconds %= 86400;
            const hours = Math.floor(seconds / 3600);
            seconds %= 3600;
            const minutes = Math.floor(seconds / 60);
            const parts = [];
            if (days) parts.push(days + ' j');
            if (hours || days) parts.push(hours + ' h');
            parts.push(minutes + ' min');
            return parts.join(' ');
          }
          function setDatasetTransfer(label, loaded, total, indeterminate) {
            datasetTransfer.style.display = '';
            datasetTransfer.classList.toggle('is-indeterminate', !!indeterminate);
            datasetTransferLabel.textContent = label || 'Transfert';
            if (indeterminate || !total) {
              datasetTransferValue.textContent = loaded ? formatBytes(loaded) : 'Preparation...';
              datasetTransferBar.style.width = '';
              return;
            }
            const percent = Math.min(100, Math.round((loaded / total) * 100));
            datasetTransferValue.textContent = percent + '% · ' + formatBytes(loaded) + ' / ' + formatBytes(total);
            datasetTransferBar.style.width = percent + '%';
          }
          function finishDatasetTransfer(label) {
            datasetTransfer.classList.remove('is-indeterminate');
            datasetTransferLabel.textContent = label || 'Transfert termine';
            datasetTransferValue.textContent = '100%';
            datasetTransferBar.style.width = '100%';
          }
          function failDatasetTransfer() {
            datasetTransfer.classList.remove('is-indeterminate');
            datasetTransferLabel.textContent = 'Echec du transfert';
          }

          function escapeHTML(value) {
            return String(value == null ? '' : value)
              .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
          }

          function normalizeSlug(value) {
            return String(value == null ? '' : value)
              .normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .slice(0, 32)
              .replace(/-+$/g, '');
          }

          function renderDatasetObjectsTable() {
            if (!datasetObjectRows) return;
            const selected = state.datasets.find((d) => d.id === selectedDatasetID);
            const canWrite = !!selected && (selected.accessRole === 'owner' || selected.accessRole === 'writer' || isAdminUser());
            uploadDatasetObjectBtn.disabled = !canWrite;
            datasetUploadPathInput.disabled = !canWrite;
            datasetUploadFileInput.disabled = !canWrite;
            datasetCreateFolder.disabled = !canWrite;
            datasetDeleteSelected.disabled = !canWrite;
            datasetFolderUp.disabled = !datasetCurrentPath;
            if (datasetSelectedTitle) {
