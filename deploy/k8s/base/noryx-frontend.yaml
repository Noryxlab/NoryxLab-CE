            statBuilds.textContent = String(state.builds.length);
          }

          async function refreshVersions() {
            let backVersion = 'unknown';
            let frontVersion = 'unknown';
            try {
              const bust = String(Date.now());
              const [frontRes, backRes] = await Promise.all([
                fetch('/version.json?nocache=' + bust, { cache: 'no-store' }),
                fetch('/api/v1/version?nocache=' + bust, { cache: 'no-store' })
              ]);
              if (frontRes.ok) {
                const f = await frontRes.json();
                if (f && f.version) frontVersion = String(f.version);
              }
              if (backRes.ok) {
                const b = await backRes.json();
                platformEdition = String((b && b.edition) || '').toLowerCase() || 'community';
                document.body.classList.toggle('is-enterprise', platformEdition === 'enterprise');
                applyRoleVisibility();
                if (b && b.backendVersion) backVersion = String(b.backendVersion);
                if (backVersion === 'unknown' && b && b.version) backVersion = String(b.version);
                if (b && b.defaultTheme) {
                  adminDefaultTheme = normalizeTheme(b.defaultTheme);
                  if (!localStorage.getItem(THEME_KEY)) {
                    currentTheme = applyTheme(adminDefaultTheme);
                  }
                }
              }
            } catch (_) {}
            versionsNode.textContent = 'front: ' + frontVersion + ' | back: ' + backVersion;
          }

