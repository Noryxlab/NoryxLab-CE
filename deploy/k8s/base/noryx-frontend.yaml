          uploadDatasetObjectBtn.onclick = async () => {
            try {
              const datasetID = (datasetUploadTarget.value || '').trim();
              const file = datasetUploadFileInput.files && datasetUploadFileInput.files[0];
              const requestedPath = (datasetUploadPathInput.value || '').trim() || (file && file.name) || '';
              const objectPath = datasetCurrentPath && requestedPath && !requestedPath.startsWith(datasetCurrentPath + '/')
                ? datasetCurrentPath + '/' + requestedPath
                : requestedPath;
              if (!datasetID || !objectPath || !file) throw { error: 'Selectionnez un fichier a televerser.' };
              uploadDatasetObjectBtn.disabled = true;
              datasetUploadStatus.style.display = '';
              datasetUploadStatus.textContent = 'Televersement de ' + file.name + ' en cours...';
              if ((keycloak && keycloak.authenticated)) {
                try { await keycloak.updateToken(30); } catch (_) {}
              }
              setDatasetTransfer('Televersement · ' + file.name, 0, file.size, false);
              const body = await new Promise((resolve, reject) => {
                const request = new XMLHttpRequest();
                request.open('PUT', '/api/v1/datasets/' + encodeURIComponent(datasetID) + '/objects/' + encodeURIComponent(objectPath));
                Object.entries({ ...authHeader(), 'Content-Type':file.type || 'application/octet-stream' }).forEach(([name, value]) => request.setRequestHeader(name, value));
                request.upload.onprogress = (event) => setDatasetTransfer('Televersement · ' + file.name, event.loaded, event.lengthComputable ? event.total : file.size, !event.lengthComputable);
                request.onerror = () => reject({ error:'network upload failed' });
                request.onload = () => {
                  let responseBody = {};
                  try { responseBody = JSON.parse(request.responseText || '{}'); } catch (_) {}
                  if (request.status >= 200 && request.status < 300) resolve(responseBody);
                  else reject(responseBody.error ? responseBody : { error:'upload failed' });
                };
                request.send(file);
              });
              datasetUploadPathInput.value = '';
              datasetUploadFileInput.value = '';
              selectedDatasetID = datasetID;
              await refreshDatasetObjects(datasetID);
              datasetUploadStatus.textContent = file.name + ' a ete televerse avec succes.';
              finishDatasetTransfer('Televersement termine · ' + file.name);
            } catch (e) {
              datasetUploadStatus.style.display = '';
              datasetUploadStatus.textContent = 'Echec du televersement : ' + String((e && e.error) || e || 'erreur inconnue');
              failDatasetTransfer();
            } finally {
              const selected = state.datasets.find((d) => d.id === selectedDatasetID);
              uploadDatasetObjectBtn.disabled = !(selected && (selected.accessRole === 'owner' || selected.accessRole === 'writer' || isAdminUser()));
            }
          };

