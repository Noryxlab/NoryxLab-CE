apiVersion: v1
kind: ConfigMap
metadata:
  name: noryx-frontend
  namespace: noryx-ce
  labels:
    app: noryx-frontend
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>NoryxLab CE</title>
        <style>
          :root {
            --bg: #eef2f7;
            --surface: #ffffff;
            --surface-soft: #f7f9fc;
            --line: #d7dee9;
            --line-strong: #b7c2d4;
            --text: #142033;
            --muted: #5f6f86;
            --nav-bg: #0a1526;
            --nav-bg-2: #13263f;
            --nav-text: #dce8fa;
            --nav-muted: #96a9c8;
            --brand: #0a6ae8;
            --brand-soft: #deebff;
            --ok: #0f7a4d;
            --warn: #9a5a0f;
            --bad: #ad1f2d;
            --font: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
          }
          * { box-sizing: border-box; }
          body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: var(--font);
            background:
              radial-gradient(1100px 600px at 20% -10%, #dfeaff 0%, transparent 70%),
              radial-gradient(1000px 700px at 90% 120%, #e9f5ec 0%, transparent 60%),
              var(--bg);
          }
          .layout {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr;
          }
          .sidebar {
            padding: 24px 18px;
            color: var(--nav-text);
            background: linear-gradient(180deg, var(--nav-bg) 0%, var(--nav-bg-2) 100%);
            border-right: 1px solid #0f2037;
          }
          .brand {
            font-size: 25px;
            font-weight: 800;
            letter-spacing: .02em;
            margin-bottom: 2px;
          }
          .edition {
            font-size: 12px;
            color: var(--nav-muted);
            margin-bottom: 8px;
          }
          .versions {
            font-size: 11px;
            color: #b4c4df;
            margin-bottom: 14px;
          }
          .who {
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.14);
            border-radius: 12px;
            padding: 10px;
            font-size: 13px;
            margin-bottom: 18px;
          }
          .menu-title {
            margin: 12px 0 7px;
            color: var(--nav-muted);
            font-size: 11px;
            letter-spacing: .1em;
            text-transform: uppercase;
          }
          .menu {
            display: grid;
            gap: 7px;
            margin-bottom: 12px;
          }
          .tab-btn {
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 10px;
            padding: 9px 10px;
            background: rgba(255,255,255,.04);
            color: var(--nav-text);
            text-align: left;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
          }
          .tab-btn:hover { background: rgba(255,255,255,.1); }
          .tab-btn.active {
            background: linear-gradient(90deg, #14468f 0%, #1a6bda 100%);
            border-color: #2a77de;
          }
          .sidebar a {
            color: #c9defb;
            text-decoration: none;
            font-weight: 700;
          }
          .content {
            padding: 18px;
          }
          .topbar {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 18px rgba(18, 34, 57, .05);
          }
          .title {
            margin: 0;
            font-size: 23px;
            letter-spacing: .01em;
          }
          .subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 14px;
          }
          .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
          }
          .btn {
            border: 1px solid var(--line-strong);
            background: #f4f7fb;
            color: #102039;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 800;
            cursor: pointer;
          }
          .btn:hover { background: #e8eef8; }
          .btn.primary {
            background: var(--brand);
            border-color: var(--brand);
            color: #fff;
          }
          .btn.good {
            background: #e9fbf2;
            color: var(--ok);
            border-color: #b8e9cf;
          }
          .btn.warn {
            background: #fff6e8;
            color: var(--warn);
            border-color: #f6dab0;
          }
          .btn.danger {
            background: #fef0f2;
            color: var(--bad);
            border-color: #f7c8ce;
          }
          .btn:disabled { opacity: .55; cursor: default; }
          .stats {
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
          }
          .stat {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px;
          }
          .stat .k { font-size: 12px; color: var(--muted); }
          .stat .v { font-size: 22px; font-weight: 900; margin-top: 6px; }
          .views { margin-top: 12px; }
          .view { display: none; }
          .view.active { display: block; }
          .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px; }
          .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px;
          }
          .card h3 {
            margin: 0 0 8px;
            font-size: 15px;
            letter-spacing: .02em;
          }
          .span-8 { grid-column: span 8; }
          .span-7 { grid-column: span 7; }
          .span-6 { grid-column: span 6; }
          .span-5 { grid-column: span 5; }
          .span-4 { grid-column: span 4; }
          .span-12 { grid-column: span 12; }
          .hint {
            margin-bottom: 10px;
            border: 1px solid #bdd8ff;
            background: var(--brand-soft);
            color: #19428c;
            border-radius: 10px;
            padding: 9px 10px;
            font-size: 13px;
          }
          .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 9px; }
          input, select {
            border: 1px solid var(--line-strong);
            border-radius: 10px;
            padding: 9px 10px;
            min-width: 170px;
            color: #0f213c;
            background: #fff;
          }
          table { width: 100%; border-collapse: collapse; font-size: 13px; }
          th, td {
            text-align: left;
            border-bottom: 1px solid #e8edf4;
            padding: 8px 6px;
            vertical-align: top;
          }
          th { color: #4a5d78; font-weight: 800; }
          .badge {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 800;
          }
          .b-ok { background: #d8fae8; color: #17603f; }
          .b-mid { background: #fff0d7; color: #8f520d; }
          .b-info { background: #ddebff; color: #1b4698; }
          pre {
            margin: 0;
            border: 1px solid #132541;
            background: #0e1a2d;
            color: #d4e5ff;
            border-radius: 10px;
            padding: 10px;
            min-height: 130px;
            overflow: auto;
            font-size: 12px;
          }
          @media (max-width: 1240px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { border-right: none; border-bottom: 1px solid #203657; }
            .span-8, .span-7, .span-6, .span-5, .span-4 { grid-column: span 12; }
            .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
          }
          @media (max-width: 720px) {
            .stats { grid-template-columns: 1fr; }
          }
        </style>
        <script src="/auth/js/keycloak.js"></script>
      </head>
      <body>
        <div class="layout">
          <aside class="sidebar">
            <div class="brand">NoryxLab</div>
            <div class="edition">Community Edition Console</div>
            <div id="versions" class="versions">front: loading | back: loading</div>
            <div id="meta" class="who">Not authenticated</div>

            <div class="menu-title">Workspace Hub</div>
            <div class="menu">
              <button class="tab-btn active" data-tab="projects">Projects</button>
              <button class="tab-btn" data-tab="workspaces">Workspaces</button>
              <button class="tab-btn" data-tab="environments">Environments</button>
              <button class="tab-btn" data-tab="workloads">Workloads</button>
              <button class="tab-btn" data-tab="ops">Ops</button>
            </div>

            <div class="menu-title">Platform</div>
            <div class="menu">
              <a href="/swagger" target="_blank" rel="noopener noreferrer">OpenAPI Swagger</a>
            </div>
          </aside>

          <main class="content">
            <section class="topbar">
              <div>
                <h1 class="title">NoryxLab Datalab Workspace Hub</h1>
                <p class="subtitle">Projects own workloads. Environments are reusable build artifacts.</p>
              </div>
              <div class="actions">
                <button id="login" class="btn primary">Login Keycloak</button>
                <button id="logout" class="btn">Logout</button>
                <button id="loadModules" class="btn good">Modules</button>
                <button id="loadUsers" class="btn good">Users</button>
              </div>
            </section>

            <section class="stats">
              <article class="stat"><div class="k">Projects</div><div id="statProjects" class="v">0</div></article>
              <article class="stat"><div class="k">Workspaces</div><div id="statWorkspaces" class="v">0</div></article>
              <article class="stat"><div class="k">Builds</div><div id="statBuilds" class="v">0</div></article>
              <article class="stat"><div class="k">Active Tab</div><div id="statTab" class="v" style="font-size:18px">Projects</div></article>
            </section>

            <section class="views">
              <section class="view active" id="view-projects">
                <div class="grid">
                  <article class="card span-8">
                    <h3>Projects</h3>
                    <div class="hint">Premier login: un projet est créé automatiquement pour démarrer vite.</div>
                    <div class="row">
                      <select id="projectSelect"></select>
                      <input id="projectName" placeholder="New project name" />
                      <button id="createProject" class="btn primary">Create Project</button>
                      <button id="loadProjects" class="btn">Refresh Projects</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>ID</th></tr></thead>
                      <tbody id="projectRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-4">
                    <h3>Project Context</h3>
                    <div class="hint">Le projet sélectionné sert de scope pour Workspaces, Builds et Workloads.</div>
                    <pre id="projectOut">-</pre>
                  </article>
                </div>
              </section>

              <section class="view" id="view-workspaces">
                <div class="grid">
                  <article class="card span-7">
                    <h3>Workspace Launcher</h3>
                    <div class="hint">IDE: Jupyter or VSCode, fixed profile: 500m CPU / 512Mi RAM. Storage default: 10Gi.</div>
                    <div class="row">
                      <select id="workspaceIde">
                        <option value="jupyter">jupyter</option>
                        <option value="vscode">vscode</option>
                      </select>
                      <input id="workspaceName" placeholder="Workspace name (optional)" />
                      <input id="workspaceStorageSize" placeholder="Storage size (optional, e.g. 10Gi)" value="10Gi" />
                      <button id="createWorkspace" class="btn primary">Launch Workspace</button>
                      <button id="loadWorkspaces" class="btn">Refresh Workspaces</button>
                    </div>
                    <table>
                      <thead>
                        <tr><th>Name</th><th>IDE</th><th>Pod</th><th>Volume</th><th>Status</th><th>Access</th><th>Actions</th></tr>
                      </thead>
                      <tbody id="workspaceRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-5">
                    <h3>Selected Project Workspaces</h3>
                    <div class="hint">Vue filtrée par projet actif.</div>
                    <pre id="workspaceOut">-</pre>
                  </article>
                </div>
              </section>

              <section class="view" id="view-environments">
                <div class="grid">
                  <article class="card span-7">
                    <h3>Environment Catalog</h3>
                    <div class="hint">Builds Kaniko vers Harbor pour images réutilisables.</div>
                    <div class="row">
                      <input id="envGitRepo" value="git://github.com/Noryxlab/NoryxLab-CE.git" />
                      <input id="envGitRef" value="main" />
                    </div>
                    <div class="row">
                      <input id="envDockerfile" value="environments/noryx-python/Dockerfile" />
                      <input id="envContext" value="." />
                    </div>
                    <div class="row">
                      <input id="envDestination" value="harbor.lan/noryx-environments/noryx-python:0.2.2" />
                      <button id="buildEnv" class="btn warn">Build Environment</button>
                    </div>
                    <table>
                      <thead><tr><th>Name</th><th>Image</th><th>Latest</th><th>Revisions</th><th>Actions</th></tr></thead>
                      <tbody id="environmentRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-5">
                    <h3>Environment Detail</h3>
                    <div class="hint">Révisions et Dockerfile du build sélectionné.</div>
                    <pre id="buildOut">-</pre>
                    <h3>Dockerfile</h3>
                    <pre id="dockerfileOut">-</pre>
                  </article>
                </div>
              </section>

              <section class="view" id="view-workloads">
                <div class="grid">
                  <article class="card span-8">
                    <h3>Workloads</h3>
                    <div class="hint">Agrégation des workspaces actifs et jobs de build récents.</div>
                    <table>
                      <thead><tr><th>Type</th><th>Name</th><th>Status</th></tr></thead>
                      <tbody id="workloadRows"></tbody>
                    </table>
                  </article>

                  <article class="card span-4">
                    <h3>Policy Baseline</h3>
                    <div class="hint">request=limit pour des workloads prévisibles.</div>
                    <pre>Workspace profile | CPU: 500m | Memory: 512Mi | Storage: PVC (longhorn) | Namespace runtime: noryx-loads</pre>
                  </article>
                </div>
              </section>

              <section class="view" id="view-ops">
                <div class="grid">
                  <article class="card span-6">
                    <h3>Modules</h3>
                    <pre id="modulesOut">-</pre>
                  </article>
                  <article class="card span-6">
                    <h3>Users</h3>
                    <pre id="usersOut">-</pre>
                  </article>
                </div>
              </section>
            </section>
          </main>
        </div>

        <script>
          const keycloak = new Keycloak({
            url: window.location.origin + '/auth',
            realm: 'noryx',
            clientId: 'noryx-api'
          });

          const meta = document.getElementById('meta');
          const usersOut = document.getElementById('usersOut');
          const modulesOut = document.getElementById('modulesOut');
          const projectOut = document.getElementById('projectOut');
          const workspaceOut = document.getElementById('workspaceOut');
          const buildOut = document.getElementById('buildOut');
          const dockerfileOut = document.getElementById('dockerfileOut');

          const loginBtn = document.getElementById('login');
          const logoutBtn = document.getElementById('logout');
          const usersBtn = document.getElementById('loadUsers');
          const modulesBtn = document.getElementById('loadModules');

          const projectSelect = document.getElementById('projectSelect');
          const projectNameInput = document.getElementById('projectName');
          const createProjectBtn = document.getElementById('createProject');
          const loadProjectsBtn = document.getElementById('loadProjects');
          const projectRows = document.getElementById('projectRows');

          const workspaceNameInput = document.getElementById('workspaceName');
          const workspaceIdeInput = document.getElementById('workspaceIde');
          const workspaceStorageSizeInput = document.getElementById('workspaceStorageSize');
          const createWorkspaceBtn = document.getElementById('createWorkspace');
          const loadWorkspacesBtn = document.getElementById('loadWorkspaces');
          const workspaceRows = document.getElementById('workspaceRows');

          const envGitRepo = document.getElementById('envGitRepo');
          const envGitRef = document.getElementById('envGitRef');
          const envDockerfile = document.getElementById('envDockerfile');
          const envContext = document.getElementById('envContext');
          const envDestination = document.getElementById('envDestination');
          const buildEnvBtn = document.getElementById('buildEnv');
          const environmentRows = document.getElementById('environmentRows');

          const workloadRows = document.getElementById('workloadRows');
          const tabButtons = [...document.querySelectorAll('.tab-btn')];
          const views = {
            projects: document.getElementById('view-projects'),
            workspaces: document.getElementById('view-workspaces'),
            environments: document.getElementById('view-environments'),
            workloads: document.getElementById('view-workloads'),
            ops: document.getElementById('view-ops')
          };

          const statProjects = document.getElementById('statProjects');
          const statWorkspaces = document.getElementById('statWorkspaces');
          const statBuilds = document.getElementById('statBuilds');
          const statTab = document.getElementById('statTab');
          const versionsNode = document.getElementById('versions');

          const state = {
            projects: [],
            workspaces: [],
            builds: [],
            environments: [],
            activeTab: 'projects'
          };
          const FRONT_VERSION = 'ce-web-0.6.24';
          let selectedEnvironmentID = '';
          let openingWorkspaceId = null;
          const LOCALES = {
            en: {
              open: 'Open',
              launching: 'Launching...',
              readyMsg: 'Workspace ready. Click Open.',
              launchingMsg: 'Workspace is launching... Open will be enabled automatically.'
            },
            fr: {
              open: 'Ouvrir',
              launching: 'Lancement...',
              readyMsg: 'Workspace pret. Clique sur Ouvrir.',
              launchingMsg: 'Le workspace demarre... Ouvrir sera active automatiquement.'
            }
          };
          const locale = (navigator.language || 'en').toLowerCase().startsWith('fr') ? 'fr' : 'en';
          function t(key) {
            return (LOCALES[locale] && LOCALES[locale][key]) || LOCALES.en[key] || key;
          }
          let workspacesAutoRefreshTimer = null;
          function setMeta(text) { meta.textContent = text; }
          function pretty(node, data) { node.textContent = JSON.stringify(data, null, 2); }
          function authHeader() { return { Authorization: 'Bearer ' + keycloak.token }; }
          function selectedProjectId() { return projectSelect.value || ''; }
          function ensureArray(v) { return Array.isArray(v) ? v : []; }

          function setButtons(enabled) {
            logoutBtn.disabled = !enabled;
            usersBtn.disabled = !enabled;
            modulesBtn.disabled = !enabled;
            loadProjectsBtn.disabled = !enabled;
            createProjectBtn.disabled = !enabled;
            loadWorkspacesBtn.disabled = !enabled;
            createWorkspaceBtn.disabled = !enabled;
            buildEnvBtn.disabled = !enabled;
          }

          function badge(status) {
            const s = String(status || '').toLowerCase();
            if (s.includes('run') || s.includes('complete') || s.includes('succeed') || s.includes('ready')) return '<span class="badge b-ok">' + status + '</span>';
            if (s.includes('submit') || s.includes('pending') || s.includes('queue')) return '<span class="badge b-mid">' + status + '</span>';
            return '<span class="badge b-info">' + (status || 'unknown') + '</span>';
          }

          function displayAccessUrl(raw) {
            if (!raw) return '-';
            const s = String(raw);
            const idx = s.indexOf('?');
            return idx === -1 ? s : s.slice(0, idx) + '?...';
          }

          function switchTab(tab) {
            state.activeTab = tab;
            tabButtons.forEach((btn) => {
              const on = btn.getAttribute('data-tab') === tab;
              btn.classList.toggle('active', on);
            });
            Object.keys(views).forEach((name) => {
              views[name].classList.toggle('active', name === tab);
            });
            statTab.textContent = tab.charAt(0).toUpperCase() + tab.slice(1);
          }

          tabButtons.forEach((btn) => {
            btn.onclick = () => switchTab(btn.getAttribute('data-tab'));
          });

          async function callJSON(url, options = {}) {
            if (keycloak?.authenticated) {
              try { await keycloak.updateToken(30); } catch (_) {}
            }
            const headers = { ...(options.headers || {}), ...authHeader() };
            const res = await fetch(url, { ...options, headers });
            const body = await res.json().catch(() => ({}));
            if (!res.ok) throw body;
            return body;
          }

          async function ensureWebSession() {
            await callJSON('/api/v1/auth/session', { method: 'POST' });
          }

          async function waitWorkspaceReady(workspaceID, timeoutMs = 30000) {
            const started = Date.now();
            while ((Date.now() - started) < timeoutMs) {
              await refreshWorkspaces();
              const ws = state.workspaces.find((w) => w.id === workspaceID);
              if (ws && String(ws.status || '').toLowerCase().includes('run')) return true;
              await new Promise((resolve) => setTimeout(resolve, 1500));
            }
            return false;
          }

          function updateStats() {
            statProjects.textContent = String(state.projects.length);
            statWorkspaces.textContent = String(state.workspaces.length);
            statBuilds.textContent = String(state.builds.length);
          }

          async function refreshVersions() {
            let backVersion = 'unknown';
            try {
              const res = await fetch('/swagger/openapi.yaml');
              if (res.ok) {
                const yaml = await res.text();
                const match = yaml.match(/^\s*version:\s*(.+)\s*$/m);
                if (match && match[1]) backVersion = match[1].trim();
              }
            } catch (_) {}
            versionsNode.textContent = 'front: ' + FRONT_VERSION + ' | back: ' + backVersion;
          }

          function renderProjectOptions() {
            const current = selectedProjectId();
            projectSelect.innerHTML = '';
            for (const p of state.projects) {
              const opt = document.createElement('option');
              opt.value = p.id;
              opt.textContent = p.name;
              projectSelect.appendChild(opt);
            }
            if (current && state.projects.some(p => p.id === current)) {
              projectSelect.value = current;
            }
          }

          function renderProjectsTable() {
            projectRows.innerHTML = '';
            if (state.projects.length === 0) {
              projectRows.innerHTML = '<tr><td colspan="2">No project yet.</td></tr>';
              return;
            }
            for (const p of state.projects) {
              const tr = document.createElement('tr');
              tr.innerHTML = '<td><strong>' + p.name + '</strong></td><td><code>' + p.id + '</code></td>';
              projectRows.appendChild(tr);
            }
          }

          function renderWorkspacesTable() {
            const pid = selectedProjectId();
            const items = state.workspaces.filter(w => !pid || w.projectId === pid);
            workspaceRows.innerHTML = '';
            if (items.length === 0) {
              workspaceRows.innerHTML = '<tr><td colspan="7">No workspace for selected project.</td></tr>';
              workspaceOut.textContent = '-';
              return;
            }
            workspaceOut.textContent = JSON.stringify(items, null, 2);
            for (const w of items) {
              const tr = document.createElement('tr');
              const statusValue = String(w.status || 'submitted').toLowerCase();
              const ready = statusValue.includes('run');
              const openLabel = ready ? t('open') : t('launching');
              const openBtn = w.accessUrl
                ? '<button type="button" class="btn' + (ready ? '' : ' warn') + '" data-open="' + w.id + '"' + (ready ? '' : ' disabled') + '>' + openLabel + '</button>'
                : '';
              tr.innerHTML =
                '<td><strong>' + (w.name || w.id) + '</strong><br/><span style="color:#667a98">' + w.id + '</span></td>' +
                '<td><code>' + (w.kind || 'jupyter') + '</code></td>' +
                '<td><code>' + (w.podName || '-') + '</code></td>' +
                '<td><code>' + (w.pvcName || '-') + '</code><br/><span style="color:#667a98">' + (w.pvcSize || '') + '</span></td>' +
                '<td>' + badge(w.status || 'submitted') + '</td>' +
                '<td>' + displayAccessUrl(w.accessUrl) + '</td>' +
                '<td>' + openBtn + ' <button type="button" class="btn danger" data-del="' + w.id + '">Delete</button></td>';
              workspaceRows.appendChild(tr);
            }
          }

          function renderEnvironmentsTable() {
            const pid = selectedProjectId();
            const items = state.environments.filter((env) => !pid || env.projectId === pid);
            environmentRows.innerHTML = '';
            if (items.length === 0) {
              environmentRows.innerHTML = '<tr><td colspan="5">No environment yet for selected project.</td></tr>';
              buildOut.textContent = '-';
              dockerfileOut.textContent = '-';
              selectedEnvironmentID = '';
              return;
            }
            if (!selectedEnvironmentID || !items.some((env) => env.id === selectedEnvironmentID)) {
              selectedEnvironmentID = items[0].id;
            }
            const selected = items.find((env) => env.id === selectedEnvironmentID) || items[0];
            buildOut.textContent = JSON.stringify(selected, null, 2);

            for (const env of items.slice(0, 20)) {
              const tr = document.createElement('tr');
              const selectedClass = env.id === selectedEnvironmentID ? ' style="outline:1px solid #f4c542"' : '';
              const revCount = Array.isArray(env.revisions) ? env.revisions.length : 0;
              const latestRef = env.latestGitRef || '-';
              const selectID = encodeURIComponent(env.id || '');
              const dockerBtn = env.latestBuildId
                ? '<button type="button" class="btn" data-docker="' + env.latestBuildId + '">Dockerfile</button>'
                : '';
              tr.innerHTML =
                '<td' + selectedClass + '><strong>' + (env.name || 'environment') + '</strong></td>' +
                '<td' + selectedClass + '><code>' + (env.destinationImage || '-') + '</code></td>' +
                '<td' + selectedClass + '>' + badge(env.latestStatus || 'submitted') + '<br/><span style="color:#667a98">' + latestRef + '</span></td>' +
                '<td' + selectedClass + '>' + String(revCount) + '</td>' +
                '<td' + selectedClass + '><button type="button" class="btn" data-select="' + selectID + '">Details</button> ' + dockerBtn + '</td>';
              environmentRows.appendChild(tr);
            }
          }

          function renderWorkloadsTable() {
            const pid = selectedProjectId();
            const ws = state.workspaces.filter(w => !pid || w.projectId === pid);
            const bs = state.builds.filter(b => !pid || b.projectId === pid);
            const rows = [];
            ws.forEach(w => rows.push({ type: 'Workspace', name: w.name || w.id, status: w.status || 'submitted' }));
            bs.forEach(b => rows.push({ type: 'Build', name: b.jobName || b.destinationImage || 'build', status: b.status || 'submitted' }));
            workloadRows.innerHTML = '';
            if (rows.length === 0) {
              workloadRows.innerHTML = '<tr><td colspan="3">No workload yet for selected project.</td></tr>';
              return;
            }
            rows.slice(0, 24).forEach((r) => {
              const tr = document.createElement('tr');
              tr.innerHTML = '<td>' + r.type + '</td><td>' + r.name + '</td><td>' + badge(r.status) + '</td>';
              workloadRows.appendChild(tr);
            });
          }

          function renderProjectContext() {
            const pid = selectedProjectId();
            const p = state.projects.find((x) => x.id === pid) || null;
            projectOut.textContent = JSON.stringify({ selectedProject: p }, null, 2);
          }

          function renderAll() {
            renderProjectOptions();
            renderProjectsTable();
            renderProjectContext();
            renderWorkspacesTable();
            renderEnvironmentsTable();
            renderWorkloadsTable();
            updateStats();
          }

          async function refreshProjects() {
            let body = await callJSON('/api/v1/projects');
            if (!Array.isArray(body?.items) || body.items.length === 0) {
              const username = keycloak.tokenParsed?.preferred_username || keycloak.tokenParsed?.email || 'user';
              await callJSON('/api/v1/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: 'My First Project - ' + username })
              });
              body = await callJSON('/api/v1/projects');
            }
            state.projects = ensureArray(body.items);
            renderAll();
            return body;
          }

          async function refreshWorkspaces() {
            const body = await callJSON('/api/v1/workspaces');
            state.workspaces = ensureArray(body.items);
            renderAll();
            return body;
          }

          async function refreshBuilds() {
            const body = await callJSON('/api/v1/builds');
            state.builds = ensureArray(body.items);
            renderAll();
            return body;
          }

          async function refreshEnvironments() {
            const pid = selectedProjectId();
            const query = pid ? ('?projectId=' + encodeURIComponent(pid)) : '';
            const body = await callJSON('/api/v1/environments' + query);
            state.environments = ensureArray(body.items);
            renderAll();
            return body;
          }

          function stopWorkspacesAutoRefresh() {
            if (workspacesAutoRefreshTimer) {
              clearInterval(workspacesAutoRefreshTimer);
              workspacesAutoRefreshTimer = null;
            }
          }

          function startWorkspacesAutoRefresh() {
            if (workspacesAutoRefreshTimer) return;
            workspacesAutoRefreshTimer = setInterval(async () => {
              try {
                await refreshWorkspaces();
                if (state.activeTab === 'environments' || state.activeTab === 'workloads') {
                  await Promise.all([refreshBuilds(), refreshEnvironments()]);
                }
              } catch (_) {}
            }, 5000);
          }

          loginBtn.onclick = () => keycloak.login();
          logoutBtn.onclick = async () => {
            stopWorkspacesAutoRefresh();
            try { await fetch('/api/v1/auth/session', { method: 'DELETE' }); } catch (_) {}
            keycloak.logout({ redirectUri: window.location.origin + '/' });
          };

          usersBtn.onclick = async () => {
            try { pretty(usersOut, await callJSON('/api/v1/admin/users')); }
            catch (e) { pretty(usersOut, e); }
          };

          modulesBtn.onclick = async () => {
            try { pretty(modulesOut, await callJSON('/api/v1/admin/modules')); }
            catch (e) { pretty(modulesOut, e); }
          };

          loadProjectsBtn.onclick = async () => {
            try { await refreshProjects(); }
            catch (e) { pretty(usersOut, e); switchTab('ops'); }
          };

          createProjectBtn.onclick = async () => {
            try {
              const name = projectNameInput.value.trim();
              if (!name) throw { error: 'projectName is required' };
              await callJSON('/api/v1/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
              });
              projectNameInput.value = '';
              await refreshProjects();
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          projectSelect.onchange = async () => {
            try {
              await Promise.all([refreshBuilds(), refreshEnvironments()]);
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          loadWorkspacesBtn.onclick = async () => {
            try { await refreshWorkspaces(); }
            catch (e) { pretty(usersOut, e); switchTab('ops'); }
          };

          createWorkspaceBtn.onclick = async () => {
            try {
              const projectId = selectedProjectId();
              if (!projectId) throw { error: 'select a project first' };
              const payload = { projectId };
              const ide = workspaceIdeInput.value.trim();
              if (ide) payload.ide = ide;
              const name = workspaceNameInput.value.trim();
              if (name) payload.name = name;
              const storageSize = workspaceStorageSizeInput.value.trim();
              if (storageSize) payload.storageSize = storageSize;
              const created = await callJSON('/api/v1/workspaces', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              await ensureWebSession();
              await refreshWorkspaces();
              switchTab('workspaces');
              if (created.accessUrl) {
                usersOut.textContent = t('launchingMsg');
                const ready = await waitWorkspaceReady(created.id, 60000);
                usersOut.textContent = ready ? t('readyMsg') : t('launchingMsg');
                await refreshWorkspaces();
              }
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          buildEnvBtn.onclick = async () => {
            try {
              const projectId = selectedProjectId();
              if (!projectId) throw { error: 'select a project first' };
              const payload = {
                projectId,
                gitRepository: envGitRepo.value.trim(),
                gitRef: envGitRef.value.trim() || 'main',
                dockerfilePath: envDockerfile.value.trim() || 'Dockerfile',
                contextPath: envContext.value.trim(),
                destinationImage: envDestination.value.trim()
              };
              if (!payload.gitRepository || !payload.destinationImage) {
                throw { error: 'gitRepository and destinationImage are required' };
              }
              await callJSON('/api/v1/builds', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              dockerfileOut.textContent = '-';
              await Promise.all([refreshBuilds(), refreshEnvironments()]);
              switchTab('environments');
            } catch (e) {
              pretty(usersOut, e);
              switchTab('ops');
            }
          };

          environmentRows.onclick = async (event) => {
            const selectID = event.target?.getAttribute('data-select');
            const dockerBuildID = event.target?.getAttribute('data-docker');

            if (selectID) {
              event.preventDefault();
              event.stopPropagation();
              selectedEnvironmentID = decodeURIComponent(selectID);
              renderEnvironmentsTable();
              return;
            }

            if (dockerBuildID) {
              event.preventDefault();
              event.stopPropagation();
              try {
                const body = await callJSON('/api/v1/builds/' + encodeURIComponent(dockerBuildID) + '/dockerfile');
                dockerfileOut.textContent = String(body.content || '-');
                buildOut.textContent = JSON.stringify(body, null, 2);
              } catch (e) {
                pretty(usersOut, e);
                switchTab('ops');
              }
            }
          };

          workspaceRows.onclick = async (event) => {
            const openId = event.target?.getAttribute('data-open');
            const delId = event.target?.getAttribute('data-del');
            if (openId) {
              event.preventDefault();
              event.stopPropagation();
              if (openingWorkspaceId === openId) return;
              const ws = state.workspaces.find(w => w.id === openId);
              if (ws?.accessUrl) {
                const ready = String(ws.status || '').toLowerCase().includes('run');
                if (!ready) {
                  usersOut.textContent = t('launchingMsg');
                  return;
                }
                openingWorkspaceId = openId;
                const targetUrl = window.location.origin + (ws.accessUrl || ('/workspaces/' + encodeURIComponent(ws.id) + '/lab?reset'));
                const wsTab = window.open('about:blank', '_blank');
                try {
                  if (!wsTab) {
                    usersOut.textContent = 'Popup blocked by browser. Allow popups for this site.';
                    openingWorkspaceId = null;
                    return;
                  }
                  wsTab.document.write('<!doctype html><html><head><meta charset="utf-8"><title>Noryx Workspace</title></head><body style="font-family: sans-serif; padding: 1rem;">Launching workspace...</body></html>');
                  wsTab.document.close();
                  // Must complete before navigating workspace URL (proxy requires noryx_session cookie).
                  await ensureWebSession();
                  await new Promise((resolve) => setTimeout(resolve, 120));
                  wsTab.location.assign(targetUrl);
                  openingWorkspaceId = null;
                } catch (e) {
                  if (wsTab && !wsTab.closed) wsTab.close();
                  openingWorkspaceId = null;
                  pretty(usersOut, e);
                  switchTab('ops');
                }
              }
              return;
            }
            if (delId) {
              event.preventDefault();
              event.stopPropagation();
              try {
                const res = await fetch('/api/v1/workspaces/' + encodeURIComponent(delId), {
                  method: 'DELETE',
                  headers: authHeader()
                });
                if (!res.ok) throw await res.json().catch(() => ({ error: 'delete failed' }));
                await refreshWorkspaces();
              } catch (e) {
                pretty(usersOut, e);
                switchTab('ops');
              }
            }
          };

          keycloak.init({ onLoad: 'check-sso', pkceMethod: 'S256', checkLoginIframe: false }).then((authenticated) => {
            if (!authenticated) {
              stopWorkspacesAutoRefresh();
              setMeta('Not authenticated');
              setButtons(false);
              switchTab('projects');
              return;
            }
            setMeta('Authenticated as ' + (keycloak.tokenParsed?.preferred_username || keycloak.tokenParsed?.email || keycloak.tokenParsed?.sub));
            setButtons(true);
            startWorkspacesAutoRefresh();
            ensureWebSession()
              .then(() => refreshProjects())
              .then(() => Promise.all([refreshWorkspaces(), refreshBuilds(), refreshEnvironments()]))
              .catch((err) => {
                pretty(usersOut, { sessionError: String(err) });
                switchTab('ops');
              });
          }).catch((err) => {
            stopWorkspacesAutoRefresh();
            setMeta('Keycloak init error');
            pretty(usersOut, { error: String(err) });
            setButtons(false);
            switchTab('ops');
          });

          refreshVersions();
        </script>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noryx-frontend
  namespace: noryx-ce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noryx-frontend
  template:
    metadata:
      labels:
        app: noryx-frontend
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: noryx-frontend
          image: harbor.lan/noryx-ce/noryx-frontend:ce-web-0.6.24
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: front-content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: front-content
          configMap:
            name: noryx-frontend
---
apiVersion: v1
kind: Service
metadata:
  name: noryx-frontend
  namespace: noryx-ce
spec:
  selector:
    app: noryx-frontend
  ports:
    - port: 80
      targetPort: 80
