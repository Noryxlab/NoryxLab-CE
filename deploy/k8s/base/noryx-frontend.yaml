          async function loadSelectedDockerfile() {
            const buildID = selectedEnvironmentBuildID || ((state.environments.find((e) => e.id === selectedEnvironmentID) || {}).latestBuildId || '');
            if (!buildID) {
              dockerfileOut.textContent = '-';
              dockerfileEditor.value = '';
              return;
            }
            try {
              const body = await callJSON('/api/v1/builds/' + encodeURIComponent(buildID) + '/dockerfile');
              const content = String(body.content || '-');
              dockerfileOut.textContent = content;
              dockerfileEditor.value = content === '-' ? '' : content;
              if (body.gitRepository) envGitRepo.value = String(body.gitRepository);
              if (body.gitRef) envGitRef.value = String(body.gitRef);
              if (body.dockerfilePath) envDockerfile.value = String(body.dockerfilePath);
              if (body.contextPath) envContext.value = String(body.contextPath);
            } catch (_) {
              dockerfileOut.textContent = '-';
              dockerfileEditor.value = '';
            }
          }
          async function loadDockerfileByBuildID(buildID) {
            const bid = String(buildID || '').trim();
            if (!bid) return;
            const body = await callJSON('/api/v1/builds/' + encodeURIComponent(bid) + '/dockerfile');
            const content = String(body.content || '');
            dockerfileOut.textContent = content || '-';
            dockerfileEditor.value = content;
            if (body.gitRepository) envGitRepo.value = String(body.gitRepository);
            if (body.gitRef) envGitRef.value = String(body.gitRef);
            if (body.dockerfilePath) envDockerfile.value = String(body.dockerfilePath);
            if (body.contextPath) envContext.value = String(body.contextPath);
          }

