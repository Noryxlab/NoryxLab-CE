          async function refreshProjects() {
            let body = await callJSON('/api/v1/projects');
            if (!Array.isArray(body?.items) || body.items.length === 0) {
              const username = keycloak.tokenParsed?.preferred_username || keycloak.tokenParsed?.email || 'user';
              await callJSON('/api/v1/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: 'My First Project - ' + username })
              });
              body = await callJSON('/api/v1/projects');
            }
            state.projects = ensureArray(body.items);
            renderAll();
            return body;
          }

          async function refreshWorkspaces() {
            const body = await callJSON('/api/v1/workspaces');
            state.workspaces = ensureArray(body.items);
            renderAll();
            return body;
          }

          async function refreshJobs() {
            const pid = selectedProjectId();
            const query = pid ? ('?projectId=' + encodeURIComponent(pid)) : '';
            const body = await callJSON('/api/v1/jobs' + query);
            state.jobs = ensureArray(body.items);
            renderAll();
            return body;
          }

          async function refreshApps() {
            const pid = selectedProjectId();
            const query = pid ? ('?projectId=' + encodeURIComponent(pid)) : '';
            const body = await callJSON('/api/v1/apps' + query);
            state.apps = ensureArray(body.items);
            renderAll();
            return body;
          }

          async function refreshSecrets() {
            const body = await callJSON('/api/v1/secrets');
            state.secrets = ensureArray(body.items);
            renderAll();
            return body;
          }

          async function refreshDatasets() {
            const body = await callJSON('/api/v1/datasets');
            state.datasets = ensureArray(body.items);
            renderAll();
            return body;
          }

          async function refreshRepositories() {
            const body = await callJSON('/api/v1/repositories');
            state.repositories = ensureArray(body.items);
            renderAll();
            return body;
          }

          async function refreshDatasources() {
            const body = await callJSON('/api/v1/datasources');
            state.datasources = ensureArray(body.items);
            renderAll();
            return body;
          }

          async function refreshBuilds() {
            const body = await callJSON('/api/v1/builds');
            state.builds = ensureArray(body.items);
            renderAll();
            return body;
          }

          async function refreshEnvironments() {
            const pid = selectedProjectId();
            const query = pid ? ('?projectId=' + encodeURIComponent(pid)) : '';
            const body = await callJSON('/api/v1/environments' + query);
            state.environments = ensureArray(body.items);
            renderAll();
            return body;
          }

          async function refreshProjectResources() {
            const pid = selectedProjectId();
            if (!pid) {
              state.projectDatasets = [];
              state.projectRepositories = [];
              state.projectDatasources = [];
              renderAll();
              return;
            }
            const [datasetsBody, repositoriesBody] = await Promise.all([
              callJSON('/api/v1/projects/' + encodeURIComponent(pid) + '/datasets'),
              callJSON('/api/v1/projects/' + encodeURIComponent(pid) + '/repositories')
            ]);
            const datasourcesBody = await callJSON('/api/v1/projects/' + encodeURIComponent(pid) + '/datasources');
            state.projectDatasets = ensureArray(datasetsBody.items);
            state.projectRepositories = ensureArray(repositoriesBody.items);
            state.projectDatasources = ensureArray(datasourcesBody.items);
            renderAll();
          }

          function stopWorkspacesAutoRefresh() {
            if (workspacesAutoRefreshTimer) {
              clearInterval(workspacesAutoRefreshTimer);
              workspacesAutoRefreshTimer = null;
            }
          }

          function startWorkspacesAutoRefresh() {
            if (workspacesAutoRefreshTimer) return;
            workspacesAutoRefreshTimer = setInterval(async () => {
              try {
                await Promise.all([refreshWorkspaces(), refreshJobs(), refreshApps()]);
                if (state.activeTab === 'environments' || state.activeTab === 'workloads') {
                  await Promise.all([refreshBuilds(), refreshEnvironments()]);
                }
              } catch (_) {}
            }, 5000);
          }

