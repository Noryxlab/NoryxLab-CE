                const isActive = revBuildID === selectedEnvironmentBuildID;
                const tr = document.createElement('tr');
                if (isActive) tr.className = 'env-rev-active';
                tr.innerHTML =
                  '<td><button type="button" class="btn env-rev-id" data-select-revision="' + revID + '">' + (revBuildID || '-') + '</button></td>' +
