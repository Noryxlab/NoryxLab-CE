apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: noryx-back
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`datalab.noryxlab.ai`) && PathPrefix(`/auth`)
      kind: Rule
      services:
        - name: keycloak
          port: 8080
    - match: Host(`datalab.noryxlab.ai`) && (PathPrefix(`/api`) || PathPrefix(`/swagger`) || PathPrefix(`/workspaces`) || Path(`/healthz`))
      kind: Rule
      services:
        - name: noryx-back
          port: 8080
    - match: Host(`datalab.noryxlab.ai`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: noryx-front
          port: 80
  tls:
    certResolver: le
