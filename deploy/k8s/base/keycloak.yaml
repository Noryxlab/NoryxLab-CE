apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: noryx-ce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: keycloak
          image: harbor.lan/noryx-ce/keycloak:24.0
          args:
            - "start-dev"
            - "--http-relative-path=/auth"
            - "--proxy-headers=xforwarded"
            - "--hostname=datalab.noryxlab.ai"
            - "--hostname-strict=false"
          ports:
            - containerPort: 8080
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: noryx-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres:5432/noryx
            - name: KC_DB_USERNAME
              value: noryx
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: noryx-secrets
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: noryx-ce
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
