apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: noryx-ce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: keycloak
          image: harbor.lan/noryx-ce/keycloak:26.6.2
          args:
            - "start-dev"
            - "--http-relative-path=/auth"
            - "--features=organization"
            - "--proxy-headers=xforwarded"
            - "--hostname=datalab.noryxlab.ai"
            - "--hostname-strict=false"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /auth/realms/master
              port: 8080
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /auth/realms/master
              port: 8080
            periodSeconds: 10
            failureThreshold: 6
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: noryx-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres:5432/noryx
            - name: KC_DB_USERNAME
              value: noryx
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: noryx-secrets
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: noryx-ce
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
