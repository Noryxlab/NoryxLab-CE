openapi: 3.0.3
info:
  title: Noryx API
  version: 0.5.149
  description: |
    Noryx CE backend API contract.

    Authentication modes:
    - `Bearer` token (OIDC / Keycloak)
    - bootstrap compatibility header `X-Noryx-User` (lab mode)
servers:
  - url: /

tags:
  - name: Health
  - name: Projects
  - name: RBAC
  - name: Environments
  - name: Workloads
  - name: Secrets
  - name: Datasets
  - name: Repositories
  - name: Auth
  - name: Admin

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    xNoryxUser:
      type: apiKey
      in: header
      name: X-Noryx-User

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Project:
      type: object
      required: [id, name, ownerType, ownerId, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        ownerType:
          type: string
          enum: [user, organization]
        ownerId: { type: string }
        canManageOwner: { type: boolean }
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time
        runningApps: { type: integer }
        runningJobs: { type: integer }
        runningWorkspaces: { type: integer }

    ProjectListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Project'

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Fraud Analysis
        description:
          type: string
          example: Evaluation and deployment of fraud detection models.

    SetProjectOwnerRequest:
      type: object
      required: [ownerType, ownerId]
      properties:
        ownerType:
          type: string
          enum: [user, organization]
        ownerId:
          type: string

    SetRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [viewer, editor, admin]

    SetRoleResponse:
      type: object
      required: [projectId, userId, role]
      properties:
        projectId: { type: string }
        userId: { type: string }
        role:
          type: string
          enum: [viewer, editor, admin]

    Build:
      type: object
      required: [id, projectId, gitRepository, destinationImage, jobName, status, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        gitRepository: { type: string }
        gitRef: { type: string }
        dockerfilePath: { type: string }
        dockerfileContent: { type: string }
        contextPath: { type: string }
        destinationImage: { type: string }
        jobName: { type: string }
        status: { type: string }
        createdAt:
          type: string
          format: date-time

    BuildListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Build'

    CreateBuildRequest:
      type: object
      required: [projectId, gitRepository, destinationImage]
      properties:
        projectId:
          type: string
        gitRepository:
          type: string
          example: https://github.com/Noryxlab/NoryxLab-CE.git
        gitRef:
          type: string
          example: main
        dockerfilePath:
          type: string
          example: environments/noryx-python/Dockerfile
        dockerfileContent:
          type: string
          description: Optional inline Dockerfile content (used instead of fetching from repository path).
        contextPath:
          type: string
          example: .
        destinationImage:
          type: string
          example: harbor.lan/noryx-environments/noryx-python:0.2.2

    BuildDockerfileResponse:
      type: object
      required: [buildId, projectId, gitRepository, dockerfilePath, sourceUrl, content]
      properties:
        buildId: { type: string }
        projectId: { type: string }
        gitRepository: { type: string }
        gitRef: { type: string }
        dockerfilePath: { type: string }
        sourceUrl: { type: string }
        content:
          type: string

    EnvironmentRevision:
      type: object
      required: [buildId, destinationImage, status, createdAt]
      properties:
        buildId: { type: string }
        jobName: { type: string }
        status: { type: string }
        gitRepository: { type: string }
        gitRef: { type: string }
        dockerfilePath: { type: string }
        contextPath: { type: string }
        destinationImage: { type: string }
        createdAt:
          type: string
          format: date-time

    Environment:
      type: object
      required: [id, projectId, name, destinationImage, revisions]
      properties:
        id: { type: string }
        projectId: { type: string }
        name: { type: string }
        destinationImage: { type: string }
        latestBuildId: { type: string }
        latestStatus: { type: string }
        latestGitRepository: { type: string }
        latestGitRef: { type: string }
        latestDockerfilePath: { type: string }
        updatedAt:
          type: string
          format: date-time
        revisions:
          type: array
          items:
            $ref: '#/components/schemas/EnvironmentRevision'

    EnvironmentListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Environment'

    PodLaunch:
      type: object
      required: [id, projectId, podName, image, status, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        podName: { type: string }
        image: { type: string }
        command:
          type: array
          items: { type: string }
        args:
          type: array
          items: { type: string }
        env:
          type: object
          additionalProperties:
            type: string
        status: { type: string }
        createdAt:
          type: string
          format: date-time

    PodLaunchListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PodLaunch'

    CreatePodRequest:
      type: object
      required: [projectId, image]
      properties:
        projectId: { type: string }
        podName: { type: string }
        image: { type: string }
        command:
          type: array
          items: { type: string }
        args:
          type: array
          items: { type: string }
        env:
          type: object
          additionalProperties:
            type: string

    Workspace:
      type: object
      required: [id, projectId, kind, name, image, podName, serviceName, status, accessUrl, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        kind:
          type: string
          enum: [jupyter, vscode, rstudio]
        name: { type: string }
        image: { type: string }
        podName: { type: string }
        serviceName: { type: string }
        pvcName: { type: string }
        pvcClass: { type: string }
        pvcSize: { type: string }
        pvcMountPath: { type: string }
        cpu: { type: string }
        memory: { type: string }
        status: { type: string }
        accessUrl: { type: string }
        createdAt:
          type: string
          format: date-time

    HardwareTier:
      type: object
      required: [id, name, cpuLimit, memoryLimit, ephemeralStorageLimit, default]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        cpuLimit: { type: string }
        memoryLimit: { type: string }
        ephemeralStorageLimit: { type: string }
        default: { type: boolean }

    WorkspaceListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'

    CreateWorkspaceRequest:
      type: object
      required: [projectId]
      properties:
        projectId: { type: string }
        name: { type: string }
        ide:
          type: string
          enum: [jupyter, vscode, rstudio]
          example: jupyter
        storageSize:
          type: string
          description: PVC size override, e.g. `20Gi`.
          example: 20Gi
        hardwareTier:
          type: string
          description: Hardware tier identifier. Defaults to the platform default tier.

    Secret:
      type: object
      required: [id, name, type, isExpired, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        expiresAt:
          type: string
          format: date-time
          nullable: true
        isExpired:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SecretReveal:
      type: object
      required: [id, name, type, value, isExpired, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        value: { type: string }
        expiresAt:
          type: string
          format: date-time
          nullable: true
        isExpired:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SecretListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Secret'

    UpsertSecretRequest:
      type: object
      required: [name, value]
      properties:
        name:
          type: string
          example: git-token
        type:
          type: string
          example: pat
        value:
          type: string
          example: ghp_xxx
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Optional expiration date-time (RFC3339, UTC recommended).

    Dataset:
      type: object
      required: [id, ownerUserId, name, bucket, prefix, provider, classification, createdAt, updatedAt]
      properties:
        id: { type: string }
        ownerUserId: { type: string }
        name: { type: string }
        description: { type: string }
        bucket: { type: string }
        prefix: { type: string }
        provider:
          type: string
          enum: [minio, s3, clever-cloud]
        classification:
          type: string
          enum: [non-hds]
          description: CE supports standard non-HDS datasets. Regulated HDS dataset management is an Enterprise Edition extension.
        endpoint:
          type: string
          description: External S3 endpoint. Empty for platform-managed MinIO datasets.
        region:
          type: string
          description: External S3 region.
        accessRole:
          type: string
          enum: [owner, writer, reader]
          description: Effective permission of the current user.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DatasetListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Dataset'

    DatasetObject:
      type: object
      required: [path, key, size, lastModified]
      properties:
        path: { type: string }
        key: { type: string }
        size:
          type: integer
          format: int64
        lastModified:
          type: string
          format: date-time
        contentType: { type: string }

    DatasetObjectListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DatasetObject'

    DatasetAccess:
      type: object
      required: [datasetId, userId, role, createdAt, updatedAt]
      properties:
        datasetId: { type: string }
        userId: { type: string }
        role:
          type: string
          enum: [owner, writer, reader]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateDatasetRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: fraud-training
        description:
          type: string
        bucket:
          type: string
          example: fraud-analysis-ds
        prefix:
          type: string
          example: raw/2026
        provider:
          type: string
          enum: [minio, s3, clever-cloud]
          default: minio
        classification:
          type: string
          enum: [non-hds]
          default: non-hds
        endpoint:
          type: string
          example: https://cellar-c2.services.clever-cloud.com
        region:
          type: string
          example: custom
        accessKey:
          type: string
          writeOnly: true
        secretKey:
          type: string
          writeOnly: true

    DatasetUploadResponse:
      type: object
      required: [bucket, key, size]
      properties:
        bucket: { type: string }
        key: { type: string }
        size:
          type: integer

    Repository:
      type: object
      required: [id, ownerUserId, name, url, createdAt, updatedAt]
      properties:
        id: { type: string }
        ownerUserId: { type: string }
        name: { type: string }
        url: { type: string }
        defaultRef: { type: string }
        authSecretName: { type: string }
        authType:
          type: string
          enum: [none, persat, prat]
        gitAuthorName: { type: string }
        gitAuthorEmail: { type: string }
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RepositoryListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Repository'

    CreateRepositoryRequest:
      type: object
      required: [name, url]
      properties:
        name:
          type: string
          example: NoryxLab-CE
        url:
          type: string
          example: https://github.com/Noryxlab/NoryxLab-CE.git
        defaultRef:
          type: string
          example: main
        authSecretName:
          type: string
          example: git-token
        authType:
          type: string
          enum: [none, persat, prat]
        gitAuthorName:
          type: string
          example: Stephane Renouard
        gitAuthorEmail:
          type: string
          example: stephane@example.org

    RepositoryValidationResponse:
      type: object
      required: [repositoryId, reachable, checkedAt]
      properties:
        repositoryId: { type: string }
        reachable: { type: boolean }
        error: { type: string }
        checkedAt:
          type: string
          format: date-time

    SessionCreateResponse:
      type: object
      required: [expiresAt]
      properties:
        expiresAt:
          type: string
          format: date-time

    AdminUsersResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true

    AdminModulesResponse:
      type: object
      properties:
        deployments:
          type: array
          items:
            type: object
            additionalProperties: true

    AuditEvent:
      type: object
      properties:
        id: { type: string }
        occurredAt:
          type: string
          format: date-time
        actorUserId: { type: string }
        actorIp: { type: string }
        actorUserAgent: { type: string }
        action: { type: string }
        resourceType: { type: string }
        resourceId: { type: string }
        projectId: { type: string }
        outcome: { type: string }
        errorCode: { type: string }
        details:
          type: object
          additionalProperties: true

    AdminAuditResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
        services:
          type: array
          items:
            type: object
            additionalProperties: true

  responses:
    BadRequest:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Not enough permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UpstreamError:
      description: Upstream dependency error (Kubernetes, Keycloak, storage, git)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  /api/v1/hardware-tiers:
    get:
      summary: List available hardware tiers
      responses:
        '200':
          description: Hardware tier catalog
  /api/v1/platform/overview:
    get:
      tags: [Platform]
      summary: Return aggregate platform activity metrics for the home page
      description: Returns aggregate counts, workload requests and measurable non-HDS S3 storage without exposing resource details.
      security:
        - bearerAuth: []
        - xNoryxUser: []
      responses:
        '200':
          description: Aggregate platform overview
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /healthz:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: OK

  /api/v1/projects:
    get:
      tags: [Projects]
      summary: List user projects (auto-create default project on first access)
      security:
        - bearerAuth: []
        - xNoryxUser: []
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Projects]
      summary: Create project
      security:
        - bearerAuth: []
        - xNoryxUser: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/projects/{projectID}:
    put:
      tags: [Projects]
      summary: Update project name and description
      security:
        - bearerAuth: []
        - xNoryxUser: []
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Projects]
      summary: Delete project
      security:
        - bearerAuth: []
        - xNoryxUser: []
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Project deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /api/v1/projects/{projectID}/members/{userID}/role:
    put:
      tags: [RBAC]
      summary: Set project member role
      security:
        - bearerAuth: []
        - xNoryxUser: []
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
        - in: path
          name: userID
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRoleRequest'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetRoleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/projects/{projectID}/ownership:
    put:
      tags: [Projects]
      summary: Transfer project ownership to a user or organization
      security:
        - bearerAuth: []
        - xNoryxUser: []
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetProjectOwnerRequest'
      responses:
        '200':
          description: Project owner updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/projects/{projectID}/files:
    get:
      tags: [Projects]
      summary: List files at the root of the persistent project volume
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Project files
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/projects/{projectID}/files/{path}:
    get:
      tags: [Projects]
      summary: List a project folder or download a project file
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
        - in: path
          name: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Folder listing or file content
    put:
      tags: [Projects]
      summary: Create or replace a project file
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
        - in: path
          name: path
          required: true
          schema: { type: string }
      responses:
        '201':
          description: File saved
    delete:
      tags: [Projects]
      summary: Delete a project file or folder
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
        - in: path
          name: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: File or folder deleted

  /api/v1/projects/{projectID}/folders:
    post:
      tags: [Projects]
      summary: Create a folder in the persistent project volume
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
      responses:
        '201':
          description: Folder created

  /api/v1/builds:
    get:
      tags: [Environments]
      summary: List build submissions
      security:
        - bearerAuth: []
        - xNoryxUser: []
      parameters:
        - in: query
          name: projectId
          schema: { type: string }
      responses:
        '200':
          description: Build list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Environments]
      summary: Submit image build
      security:
        - bearerAuth: []
        - xNoryxUser: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBuildRequest'
      responses:
        '201':
          description: Build submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Build'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
