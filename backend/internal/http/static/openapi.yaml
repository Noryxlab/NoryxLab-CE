openapi: 3.0.3
info:
  title: Noryx API
  version: 0.5.36
  description: |
    Noryx CE backend API contract.

    Authentication modes:
    - `Bearer` token (OIDC / Keycloak)
    - bootstrap compatibility header `X-Noryx-User` (lab mode)
servers:
  - url: /

tags:
  - name: Health
  - name: Projects
  - name: RBAC
  - name: Environments
  - name: Workloads
  - name: Secrets
  - name: Datasets
  - name: Repositories
  - name: Auth
  - name: Admin

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    xNoryxUser:
      type: apiKey
      in: header
      name: X-Noryx-User

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Project:
      type: object
      required: [id, name, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        createdAt:
          type: string
          format: date-time

    ProjectListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Project'

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Premyom Fraud

    SetRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [viewer, editor, admin]

    SetRoleResponse:
      type: object
      required: [projectId, userId, role]
      properties:
        projectId: { type: string }
        userId: { type: string }
        role:
          type: string
          enum: [viewer, editor, admin]

    Build:
      type: object
      required: [id, projectId, gitRepository, destinationImage, jobName, status, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        gitRepository: { type: string }
        gitRef: { type: string }
        dockerfilePath: { type: string }
        contextPath: { type: string }
        destinationImage: { type: string }
        jobName: { type: string }
        status: { type: string }
        createdAt:
          type: string
          format: date-time

    BuildListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Build'

    CreateBuildRequest:
      type: object
      required: [projectId, gitRepository, destinationImage]
      properties:
        projectId:
          type: string
        gitRepository:
          type: string
          example: https://github.com/Noryxlab/NoryxLab-CE.git
        gitRef:
          type: string
          example: main
        dockerfilePath:
          type: string
          example: environments/noryx-python/Dockerfile
        contextPath:
          type: string
          example: .
        destinationImage:
          type: string
          example: harbor.lan/noryx-environments/noryx-python:0.2.2

    BuildDockerfileResponse:
      type: object
      required: [buildId, projectId, gitRepository, dockerfilePath, sourceUrl, content]
      properties:
        buildId: { type: string }
        projectId: { type: string }
        gitRepository: { type: string }
        gitRef: { type: string }
        dockerfilePath: { type: string }
        sourceUrl: { type: string }
        content:
          type: string

    EnvironmentRevision:
      type: object
      required: [buildId, destinationImage, status, createdAt]
      properties:
        buildId: { type: string }
        jobName: { type: string }
        status: { type: string }
        gitRepository: { type: string }
        gitRef: { type: string }
        dockerfilePath: { type: string }
        contextPath: { type: string }
        destinationImage: { type: string }
        createdAt:
          type: string
          format: date-time

    Environment:
      type: object
      required: [id, projectId, name, destinationImage, revisions]
      properties:
        id: { type: string }
        projectId: { type: string }
        name: { type: string }
        destinationImage: { type: string }
        latestBuildId: { type: string }
        latestStatus: { type: string }
        latestGitRepository: { type: string }
        latestGitRef: { type: string }
        latestDockerfilePath: { type: string }
        updatedAt:
          type: string
          format: date-time
        revisions:
          type: array
          items:
            $ref: '#/components/schemas/EnvironmentRevision'

    EnvironmentListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Environment'

    PodLaunch:
      type: object
      required: [id, projectId, podName, image, status, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        podName: { type: string }
        image: { type: string }
        command:
          type: array
          items: { type: string }
        args:
          type: array
          items: { type: string }
        env:
          type: object
          additionalProperties:
            type: string
        status: { type: string }
        createdAt:
          type: string
          format: date-time

    PodLaunchListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PodLaunch'

    CreatePodRequest:
      type: object
      required: [projectId, image]
      properties:
        projectId: { type: string }
        podName: { type: string }
        image: { type: string }
        command:
          type: array
          items: { type: string }
        args:
          type: array
          items: { type: string }
        env:
          type: object
          additionalProperties:
            type: string

    Workspace:
      type: object
      required: [id, projectId, kind, name, image, podName, serviceName, status, accessUrl, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        kind:
          type: string
          enum: [jupyter, vscode]
        name: { type: string }
        image: { type: string }
        podName: { type: string }
        serviceName: { type: string }
        pvcName: { type: string }
        pvcClass: { type: string }
        pvcSize: { type: string }
        pvcMountPath: { type: string }
        cpu: { type: string }
        memory: { type: string }
        status: { type: string }
        accessUrl: { type: string }
        createdAt:
          type: string
          format: date-time

    WorkspaceListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'

    CreateWorkspaceRequest:
      type: object
      required: [projectId]
      properties:
        projectId: { type: string }
        name: { type: string }
        ide:
          type: string
          enum: [jupyter, vscode]
          example: jupyter
        storageSize:
          type: string
          description: PVC size override, e.g. `20Gi`.
          example: 20Gi

    Secret:
      type: object
      required: [id, name, type, isExpired, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        expiresAt:
          type: string
          format: date-time
          nullable: true
        isExpired:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SecretReveal:
      type: object
      required: [id, name, type, value, isExpired, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        value: { type: string }
        expiresAt:
          type: string
          format: date-time
          nullable: true
        isExpired:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SecretListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Secret'

    UpsertSecretRequest:
      type: object
      required: [name, value]
      properties:
        name:
          type: string
          example: git-token
        type:
          type: string
          example: pat
        value:
          type: string
          example: ghp_xxx
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Optional expiration date-time (RFC3339, UTC recommended).

    Dataset:
      type: object
      required: [id, ownerUserId, name, bucket, prefix, createdAt, updatedAt]
      properties:
        id: { type: string }
        ownerUserId: { type: string }
        name: { type: string }
        description: { type: string }
        bucket: { type: string }
        prefix: { type: string }
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DatasetListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Dataset'

    CreateDatasetRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: fraud-training
        description:
          type: string
        bucket:
          type: string
          example: premyom-fraud-ds
        prefix:
          type: string
          example: raw/2026

    DatasetUploadResponse:
      type: object
      required: [bucket, key, size]
      properties:
        bucket: { type: string }
        key: { type: string }
        size:
          type: integer

    Repository:
      type: object
      required: [id, ownerUserId, name, url, createdAt, updatedAt]
      properties:
        id: { type: string }
        ownerUserId: { type: string }
        name: { type: string }
        url: { type: string }
        defaultRef: { type: string }
        authSecretName: { type: string }
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RepositoryListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Repository'

    CreateRepositoryRequest:
      type: object
      required: [name, url]
      properties:
        name:
          type: string
          example: NoryxLab-CE
        url:
          type: string
          example: https://github.com/Noryxlab/NoryxLab-CE.git
        authSecretName:
          type: string
          example: git-token

    RepositoryValidationResponse:
      type: object
      required: [repositoryId, reachable, checkedAt]
      properties:
        repositoryId: { type: string }
        reachable: { type: boolean }
        error: { type: string }
        checkedAt:
          type: string
          format: date-time

    SessionCreateResponse:
      type: object
      required: [expiresAt]
      properties:
        expiresAt:
          type: string
          format: date-time

    AdminUsersResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true

    AdminModulesResponse:
      type: object
      properties:
        deployments:
          type: array
          items:
            type: object
            additionalProperties: true
        services:
          type: array
          items:
            type: object
            additionalProperties: true

  responses:
    BadRequest:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Not enough permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UpstreamError:
      description: Upstream dependency error (Kubernetes, Keycloak, storage, git)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: OK

  /api/v1/projects:
    get:
      tags: [Projects]
      summary: List user projects (auto-create default project on first access)
      security:
        - bearerAuth: []
        - xNoryxUser: []
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Projects]
      summary: Create project
      security:
        - bearerAuth: []
        - xNoryxUser: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/projects/{projectID}/members/{userID}/role:
    put:
      tags: [RBAC]
      summary: Set project member role
      security:
        - bearerAuth: []
        - xNoryxUser: []
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
        - in: path
          name: userID
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRoleRequest'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetRoleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/builds:
    get:
      tags: [Environments]
      summary: List build submissions
      security:
        - bearerAuth: []
        - xNoryxUser: []
      parameters:
        - in: query
          name: projectId
          schema: { type: string }
      responses:
        '200':
          description: Build list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Environments]
      summary: Submit image build
      security:
        - bearerAuth: []
        - xNoryxUser: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBuildRequest'
      responses:
        '201':
          description: Build submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Build'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/UpstreamError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/builds/{buildID}/dockerfile:
    get:
      tags: [Environments]
      summary: Fetch Dockerfile content for one build revision
      security:
        - bearerAuth: []
        - xNoryxUser: []
      parameters:
        - in: path
          name: buildID
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Dockerfile content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildDockerfileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/UpstreamError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/environments:
    get:
      tags: [Environments]
      summary: List environment entries and revisions
      security:
        - bearerAuth: []
        - xNoryxUser: []
      parameters:
        - in: query
          name: projectId
          schema: { type: string }
      responses:
        '200':
          description: Environment catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/pods:
    get:
      tags: [Workloads]
      summary: List pod launches (current implementation is not auth-filtered)
      responses:
        '200':
          description: Pod launch list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodLaunchListResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Workloads]
      summary: Launch pod in a project
      security:
        - bearerAuth: []
        - xNoryxUser: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePodRequest'
      responses:
        '201':
          description: Pod launch submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodLaunch'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/UpstreamError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/workspaces:
    get:
      tags: [Workloads]
      summary: List accessible workspaces
      security:
        - bearerAuth: []
        - xNoryxUser: []
      responses:
        '200':
          description: Workspace list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Workloads]
      summary: Launch workspace (jupyter/vscode)
      security:
        - bearerAuth: []
        - xNoryxUser: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '201':
          description: Workspace submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/UpstreamError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/workspaces/{workspaceID}:
    delete:
      tags: [Workloads]
      summary: Stop and delete workspace
      security:
        - bearerAuth: []
        - xNoryxUser: []
      parameters:
        - in: path
          name: workspaceID
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Workspace deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/secrets:
    get:
      tags: [Secrets]
      summary: List current user secrets (metadata only)
      security:
        - bearerAuth: []
        - xNoryxUser: []
      responses:
        '200':
          description: Secret list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Secrets]
      summary: Create or update user secret
      security:
        - bearerAuth: []
        - xNoryxUser: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertSecretRequest'
            examples:
              gitPAT:
                value:
                  name: git-token
                  type: pat
                  value: ghp_xxx
      responses:
        '201':
          description: Secret created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Secret'
        '200':
          description: Secret updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Secret'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/secrets/{name}:
    get:
      tags: [Secrets]
      summary: Get one user secret including decrypted value
      security:
        - bearerAuth: []
        - xNoryxUser: []
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Secret details with value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretReveal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Secrets]
      summary: Delete user secret
      security:
        - bearerAuth: []
        - xNoryxUser: []
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Secret deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/datasets:
    get:
      tags: [Datasets]
      summary: List datasets owned by current user
      security:
        - bearerAuth: []
        - xNoryxUser: []
      responses:
        '200':
          description: Dataset list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Datasets]
      summary: Create dataset (bucket + optional prefix)
      security:
        - bearerAuth: []
        - xNoryxUser: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatasetRequest'
      responses:
        '201':
          description: Dataset created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/UpstreamError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/datasets/{datasetID}:
    delete:
      tags: [Datasets]
      summary: Delete one dataset owned by current user
      security:
        - bearerAuth: []
        - xNoryxUser: []
      parameters:
        - in: path
          name: datasetID
          required: true
          schema: { type: string }
      responses:
        '204':
