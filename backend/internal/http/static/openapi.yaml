openapi: 3.0.3
info:
  title: Noryx API
  version: 0.5.31
servers:
  - url: /
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api/v1/projects:
    get:
      summary: List user projects (auto-create one on first access)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of projects
    post:
      summary: Create project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Project created
  /api/v1/projects/{projectID}/members/{userID}/role:
    put:
      summary: Set project member role
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
        - in: path
          name: userID
          required: true
          schema: { type: string }
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [viewer, editor, admin]
      responses:
        '200':
          description: Role updated
  /api/v1/builds:
    get:
      summary: List build submissions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of builds
    post:
      summary: Submit a build
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId, gitRepository, destinationImage]
              properties:
                projectId: { type: string }
                gitRepository: { type: string }
                gitRef: { type: string }
                dockerfilePath: { type: string }
                contextPath: { type: string }
                destinationImage: { type: string }
      responses:
        '201':
          description: Build submitted
  /api/v1/builds/{buildID}/dockerfile:
    get:
      summary: Fetch Dockerfile content for one build revision
      parameters:
        - in: path
          name: buildID
          required: true
          schema: { type: string }
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dockerfile content
  /api/v1/environments:
    get:
      summary: List environment entries and build revisions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of environments
  /api/v1/pods:
    get:
      summary: List launched pods
      responses:
        '200':
          description: List of pod launches
    post:
      summary: Launch a pod
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId, image]
              properties:
                projectId: { type: string }
                podName: { type: string }
                image: { type: string }
                command:
                  type: array
                  items: { type: string }
                args:
                  type: array
                  items: { type: string }
                env:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        '201':
          description: Pod launch submitted
  /api/v1/workspaces:
    get:
      summary: List project workspaces
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of workspaces
    post:
      summary: Launch a workspace (jupyter or vscode, fixed 500m/512Mi)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId]
              properties:
                projectId: { type: string }
                name: { type: string }
                ide:
                  type: string
                  enum: [jupyter, vscode]
                  description: Optional IDE type. Defaults to jupyter.
                  example: vscode
                storageSize:
                  type: string
                  description: Optional PVC size override for the workspace volume. Defaults to server config (10Gi by default).
                  example: 20Gi
      responses:
        '201':
          description: Workspace submitted
  /api/v1/workspaces/{workspaceID}:
    delete:
      summary: Stop and delete a workspace
      parameters:
        - in: path
          name: workspaceID
          required: true
          schema: { type: string }
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Workspace deleted
  /api/v1/secrets:
    get:
      summary: List current user secrets (metadata only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of secrets
    post:
      summary: Create or update a user secret
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, value]
              properties:
                name: { type: string }
                type: { type: string }
                value: { type: string }
      responses:
        '201':
          description: Secret created
        '200':
          description: Secret updated
  /api/v1/secrets/{name}:
    delete:
      summary: Delete a user secret
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Secret deleted
  /api/v1/datasets:
    get:
      summary: List datasets owned by current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of datasets
    post:
      summary: Create a dataset (backed by S3 bucket/prefix)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                bucket: { type: string }
                prefix: { type: string }
      responses:
        '201':
          description: Dataset created
  /api/v1/datasets/{datasetID}/objects/{path}:
    put:
      summary: Upload raw object bytes into a dataset
      parameters:
        - in: path
          name: datasetID
          required: true
          schema: { type: string }
        - in: path
          name: path
          required: true
          schema: { type: string }
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Object uploaded
  /api/v1/repositories:
    get:
      summary: List repositories owned by current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of repositories
    post:
      summary: Register a git repository
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, url]
              properties:
                name: { type: string }
                url: { type: string }
                defaultRef: { type: string }
                authSecretName: { type: string }
      responses:
        '201':
          description: Repository created
  /api/v1/projects/{projectID}/datasets:
    get:
      summary: List datasets attached to one project
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Project datasets
  /api/v1/projects/{projectID}/datasets/{datasetID}:
    put:
      summary: Attach dataset to project
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
        - in: path
          name: datasetID
          required: true
          schema: { type: string }
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Attached
    delete:
      summary: Detach dataset from project
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
        - in: path
          name: datasetID
          required: true
          schema: { type: string }
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Detached
  /api/v1/projects/{projectID}/repositories:
    get:
      summary: List repositories attached to one project
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Project repositories
  /api/v1/projects/{projectID}/repositories/{repositoryID}:
    put:
      summary: Attach repository to project
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
        - in: path
          name: repositoryID
          required: true
          schema: { type: string }
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Attached
    delete:
      summary: Detach repository from project
      parameters:
        - in: path
          name: projectID
          required: true
          schema: { type: string }
        - in: path
          name: repositoryID
          required: true
          schema: { type: string }
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Detached
  /api/v1/auth/session:
    post:
      summary: Exchange bearer token for web session cookie
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Web session created
    delete:
      summary: Logout web session cookie
      responses:
        '204':
          description: Web session deleted
  /api/v1/admin/users:
    get:
      summary: List users from Keycloak realm
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
  /api/v1/admin/modules:
    get:
      summary: List installed modules/services status from Kubernetes namespace
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Modules and services status
